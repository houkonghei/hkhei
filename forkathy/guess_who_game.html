<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猜猜我是誰 - 語言表達遊戲</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-flipped {
            transform: scale(0.92);
            opacity: 0.25;
            filter: grayscale(100%);
        }
    </style>
</head>
<body class="bg-gradient-to-b from-amber-50 to-orange-100 min-h-screen font-sans text-gray-800 pb-12">

    <header class="bg-red-600 text-white shadow-md p-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-2">
            <h1 class="text-2xl font-bold tracking-wider flex items-center gap-2">
                <span>🎭</span> 猜猜我是誰 - 語言表達遊戲
            </h1>
            <div class="flex items-center gap-4 text-sm sm:text-base">
                <span class="bg-red-700 px-3 py-1 rounded-full font-semibold" id="level-display">關卡: 1 / 100</span>
                <button onclick="resetGameProgress()" class="text-xs bg-red-800 hover:bg-red-900 transition px-2 py-1 rounded">重置進度</button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <section class="md:col-span-1 flex flex-col gap-4">
            <div class="bg-white rounded-2xl shadow-xl p-5 border-2 border-orange-200">
                <h2 class="text-lg font-bold text-orange-700 mb-3 flex items-center gap-2">
                    <span>💡</span> 本局線索牆
                </h2>
                
                <div class="flex justify-between items-center mb-4 bg-orange-50 p-2 rounded-lg text-sm">
                    <span class="font-medium text-gray-600">當前提示次數:</span>
                    <span id="clue-count" class="font-bold text-red-600 text-lg">1 / 7</span>
                </div>

                <div id="clues-container" class="space-y-2 max-h-64 overflow-y-auto mb-4 pr-1">
                    </div>

                <hr class="border-orange-100 my-4">

                <div class="flex flex-col gap-2">
                    <button id="next-clue-btn" onclick="showNextClue()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-4 rounded-xl shadow transition duration-200 flex justify-center items-center gap-2">
                        <span>🔍</span> 下一條提示
                    </button>
                    
                    <button id="guess-mode-btn" onclick="toggleGuessMode()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow transition duration-200 flex justify-center items-center gap-2">
                        <span id="guess-btn-icon">🎯</span> <span id="guess-btn-text">我要猜測！</span>
                    </button>
                </div>
                
                <p id="mode-tip" class="text-xs text-center text-gray-500 mt-3 hidden">
                    💡 猜測模式已開啟！請在右側面板點擊你認為正確的 Emoji。
                </p>
            </div>
            
            <div class="bg-stone-800 text-stone-300 rounded-2xl p-4 text-xs space-y-1.5 shadow-md">
                <p class="font-bold text-amber-400 text-sm mb-1">🎮 遊戲規則說明：</p>
                <p>1. 觀察左側提示，在右側點擊卡牌可將其「折疊/排除」。</p>
                <p>2. 若線索不足，可點擊「下一條提示」進入下一輪（最高7條）。</p>
                <p>3. 準備好觸發最終答案時，點擊「我要猜測」，再點選目標卡牌。</p>
                <p>4. 超過 7 條提示仍未猜出，或猜錯目標，即視為本關失敗！</p>
            </div>
        </section>

        <section class="md:col-span-2">
            <div class="bg-red-700 rounded-3xl p-4 sm:p-6 shadow-2xl border-4 border-red-800">
                <div id="game-board" class="grid grid-cols-4 sm:grid-cols-6 gap-3 sm:gap-4">
                    </div>
            </div>
        </section>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 hidden px-4">
        <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full p-6 text-center transform scale-95 transition-all">
            <div id="modal-icon" class="text-6xl mb-4">🎉</div>
            <h3 id="modal-title" class="text-2xl font-bold mb-2">恭喜過關！</h3>
            <p id="modal-message" class="text-gray-600 mb-6">你成功的猜出了答案！</p>
            <button id="modal-action-btn" onclick="closeModal()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl transition shadow-lg">
                進入下一關
            </button>
        </div>
    </div>

            { id: "baby", emoji: "👶", name: "嬰兒", clues: ["我是一個人類，但我是所有人裡面年紀最小、最稚嫩的。", "我的頭上光溜溜的，只倔強地長著一根細細的捲髮。", "我現在還完全不會雙腳站立行走，只能在地上爬行。", "我還不會說人類的完整語言，只會發出呀呀的聲音。", "當我肚子餓、受驚嚇或是尿布濕了，我會大聲啼哭。", "我最喜歡喝牛奶，睡覺或安撫時嘴裡還含著奶嘴。", "我是剛出生不久、咬著奶嘴爬行的可愛小嬰兒！"] },
            { id: "police", emoji: "👮", name: "警察", clues: ["我是一位維護社會治安、執行法律的人類公務人員。", "我頭上戴著一頂非常威嚴、正氣的大蓋帽（警帽）。", "我身穿筆挺的制服，胸前佩戴著一枚閃亮的警徽。", "我的隨身配備通常有手銬、警棍、對講機甚至是配槍。", "當你在街上迷路或遇到壞人時，找我幫忙絕對沒錯。", "我開著閃爍紅藍警燈、會發出警笛聲的帥氣巡邏車。", "我是維持社會正義、專門抓捕壞人的正義警察！"] },
            { id: "doctor", emoji: "👩‍⚕️", name: "醫生", clues: ["我是一位在醫療機構工作的人類女性專業醫護人員。", "我的外衣通常是一件非常乾淨整潔的白色長大褂（白大衣）。", "我的脖子上經常掛著一個用來聆聽心跳的專業聽診器。", "我的神聖工作是幫生病的人看病、開藥方或者做手術。", "大家都希望看到我獲得健康，但平時又希望不需要找我。", "我會溫柔地叮嚀你要多喝水、按時吃藥、千萬別熬夜。", "我是身穿白大衣、手持聽診器、救死扶傷的女性醫生！"] }
        ];

        // ======= 遊戲運行狀態變數 =======
        let currentLevel = 1;         // 當前關卡 (1-100)
        let boardCharacters = [];     // 當前棋盤上的卡牌順序 (每關隨機洗牌)
        let targetCharacter = null;   // 本關謎底角色
        let cluesShown = 1;           // 當前已解鎖的提示數量 (1-7)
        let isGuessMode = false;      // 是否開啟猜測模式
        let eliminatedIds = new Set();// 玩家手動翻倒/排除的角色 ID 集合

        // 初始化加載
        window.onload = function() {
            // 從瀏覽器緩存讀取進度
            const savedLevel = localStorage.getItem('guess_who_level');
            if (savedLevel && parseInt(savedLevel) <= 100) {
                currentLevel = parseInt(savedLevel);
            }
            initLevel();
        };

        // ======= 初始化關卡核心邏輯 =======
        function initLevel() {
            eliminatedIds.clear();
            cluesShown = 1;
            isGuessMode = false;
            updateGuessModeUI();

            // 100關機制的設計：根據關卡數決定謎底 (24個角色循環)
            // 這樣就算只有24個基礎角色，配合每關大洗牌，也能產生100種不同的局勢體驗！
            const targetIndex = (currentLevel - 1) % charactersData.length;
            targetCharacter = charactersData[targetIndex];

            // 複製一份完整池，並進行隨機洗牌(Shuffle)，讓卡牌在棋盤上的位置每關都不同
            boardCharacters = [...charactersData];
            for (let i = boardCharacters.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [boardCharacters[i], boardCharacters[j]] = [boardCharacters[j], boardCharacters[i]];
            }

            // 更新 UI 數據顯示
            document.getElementById('level-display').innerText = `關卡: ${currentLevel} / 100`;
            document.getElementById('next-clue-btn').disabled = false;
            document.getElementById('next-clue-btn').classList.remove('opacity-50', 'cursor-not-allowed');

            renderClues();
            renderBoard();
        }

        // ======= 渲染左側提示區 =======
        function renderClues() {
            document.getElementById('clue-count').innerText = `${cluesShown} / 7`;
            const container = document.getElementById('clues-container');
            container.innerHTML = '';

            // 根據目前已解鎖的數量，逐條渲染提示
            for (let i = 0; i < cluesShown; i++) {
                const clueText = targetCharacter.clues[i];
                const clueDiv = document.createElement('div');
                clueDiv.className = `p-3 rounded-xl text-sm border font-medium transition-all duration-300 transform translate-x-0 ${
                    i === cluesShown - 1 
                    ? 'bg-amber-100 border-amber-400 text-amber-900 font-semibold shadow-sm scale-102' 
                    : 'bg-gray-50 border-gray-200 text-gray-600'
                }`;
                clueDiv.innerHTML = `<span class="text-orange-500 font-bold mr-1">#${i+1}</span> ${clueText}`;
                container.appendChild(clueDiv);
            }
            
            // 自動滾動到最新提示
            container.scrollTop = container.scrollHeight;
        }

        // ======= 渲染右側棋盤區 =======
        function renderBoard() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';

            boardCharacters.forEach((char) => {
                const isEliminated = eliminatedIds.has(char.id);
                
                const card = document.createElement('button');
                // 復古塑膠框卡牌樣式設計
                card.className = `bg-amber-50 rounded-xl p-3 flex flex-col items-center justify-center border-2 shadow-md transition-all duration-200 hover:scale-105 active:scale-95 ${
                    isEliminated ? 'card-flipped border-gray-400' : 'border-amber-200'
                }`;
                card.onclick = () => handleCardClick(char);

                // 卡牌內部：大 Emoji 與名字標籤
                card.innerHTML = `
                    <div class="text-4xl sm:text-5xl mb-2 select-none">${isEliminated ? '❌' : char.emoji}</div>
                    <div class="bg-amber-100 text-amber-900 text-xs font-bold px-2 py-0.5 rounded border border-amber-300 w-full text-center truncate shadow-inner">
                        ${char.name}
                    </div>
                `;
                board.appendChild(card);
            });
        }

        // ======= 卡牌點擊事件 (翻牌排查 vs 提交答案) =======
        function handleCardClick(char) {
            if (isGuessMode) {
                // 【猜測模式】：判定答案
                processGuess(char);
            } else {
                // 【正常模式】：翻轉卡牌（手動排除法）
                if (eliminatedIds.has(char.id)) {
                    eliminatedIds.delete(char.id); // 反轉還原
                } else {
                    eliminatedIds.add(char.id);    // 倒下排除
                }
                renderBoard();
            }
        }

        // ======= 下一條提示功能 =======
        function showNextClue() {
            if (cluesShown < 7) {
                cluesShown++;
                renderClues();
                
                // 如果已經到第7個提示，禁用按鈕
                if (cluesShown === 7) {
                    const nextBtn = document.getElementById('next-clue-btn');
                    nextBtn.disabled = true;
                    nextBtn.classList.add('opacity-50', 'cursor-not-allowed');
                }
            }
        }

        // ======= 切換猜測模式狀態 =======
        function toggleGuessMode() {
            isGuessMode = !isGuessMode;
            updateGuessModeUI();
        }

        function updateGuessModeUI() {
            const btn = document.getElementById('guess-mode-btn');
            const icon = document.getElementById('guess-btn-icon');
            const text = document.getElementById('guess-btn-text');
            const tip = document.getElementById('mode-tip');
            const boardContainer = document.getElementById('game-board').parentElement;

            if (isGuessMode) {
                btn.className = "w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-4 rounded-xl shadow transition duration-200 flex justify-center items-center gap-2 animate-pulse";
                icon.innerText = "❌";
                text.innerText = "取消猜測模式";
                tip.classList.remove('hidden');
                boardContainer.classList.remove('border-red-800', 'bg-red-700');
                boardContainer.classList.add('border-blue-500', 'bg-blue-900'); // 猜測狀態切換為亮藍色背景
            } else {
                btn.className = "w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow transition duration-200 flex justify-center items-center gap-2";
                icon.innerText = "🎯";
                text.innerText = "我要猜測！";
                tip.classList.add('hidden');
                boardContainer.classList.remove('border-blue-500', 'bg-blue-900');
                boardContainer.classList.add('border-red-800', 'bg-red-700');
            }
        }

        // ======= 驗證猜測結果 =======
        function processGuess(selectedChar) {
            // 關閉猜測模式
            isGuessMode = false;
            updateGuessModeUI();

            if (selectedChar.id === targetCharacter.id) {
                // 【猜對了】：晉級
                showModal(true, `🎉 挑戰成功！`, `你使用了 ${cluesShown} 個提示，成功找出了神秘人：【${targetCharacter.emoji} ${targetCharacter.name}】！`);
            } else {
                // 【猜錯了】：本關判定失敗
                showModal(false, `💥 猜錯了，挑戰失敗！`, `很遺憾，你猜測的是【${selectedChar.emoji} ${selectedChar.name}】，但真正的答案是【${targetCharacter.emoji} ${targetCharacter.name}】。再接再厲！`);
            }
        }

        // ======= 處理 7 次提示用盡仍沒猜出的極端失敗狀況 =======
        // 規則規定：7個提示下都猜不到，算失敗。
        // 當顯示第7個提示時，玩家必須點擊「我要猜測」並點中正確卡牌。
        // 為了讓體驗更直觀，如果7條提示都出了，玩家再次點擊「下一條提示」或直接放棄時，會在驗證處判定，也可以藉由在猜錯或提示耗盡時引導。
        // 在此機制中，第7條提示出現後按鈕會變灰色，如果此時選錯就直接進失敗結算。

        // ======= 結算彈窗控制機制 =======
        let isWinState = true;
        function showModal(isWin, title, msg) {
            isWinState = isWin;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = msg;
            
            const icon = document.getElementById('modal-icon');
            const actionBtn = document.getElementById('modal-action-btn');
            
            if (isWin) {
                icon.innerText = "👑";
                actionBtn.innerText = currentLevel >= 100 ? "重新通關100關！" : "進入下一關";
                actionBtn.className = "w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition shadow-lg";
            } else {
                icon.innerText = "👻";
                actionBtn.innerText = "重新挑戰本關";
                actionBtn.className = "w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl transition shadow-lg";
            }

            const modal = document.getElementById('modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.children[0].classList.remove('scale-95');
                modal.children[0].classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.children[0].classList.remove('scale-100');
            modal.children[0].classList.add('scale-95');
            modal.classList.add('hidden');

            if (isWinState) {
                // 成功過關，前進下一關
                if (currentLevel >= 100) {
                    currentLevel = 1;
                } else {
                    currentLevel++;
                }
                // 保存關卡進度至瀏覽器
                localStorage.setItem('guess_who_level', currentLevel);
                initLevel();
            } else {
                // 失敗，原地重試本關
                initLevel();
            }
        }

        // 重置進度功能
        function resetGameProgress() {
            if (confirm("確定要重置所有關卡進度，回到第 1 關嗎？")) {
                currentLevel = 1;
                localStorage.setItem('guess_who_level', currentLevel);
                initLevel();
            }
        }
    </script>
</body>
</html>
