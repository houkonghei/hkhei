<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猜猜我是誰 🎨 幼兒廣東話語音版</title>
    <!-- 引入 Tailwind CSS 提供繽紛多彩的 UI 介面 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 幼兒卡牌 3D 輕微浮動效果與排除灰色效果 */
        .card-active {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card-eliminated {
            transform: scale(0.9) rotate(2deg);
            opacity: 0.2;
            filter: grayscale(100%);
        }
        /* 繽紛漸變背景與可愛字體 */
        body {
            background: linear-gradient(135deg, #fef08a 0%, #f97316 100%);
            font-family: 'PingFang HK', 'Heiti TC', sans-serif;
        }
    </style>
</head>
<body class="min-h-screen pb-12 overflow-x-hidden relative">

    <!-- 用於慶祝過關的 Canvas 五彩紙屑畫布 -->
    <canvas id="confetti-canvas" class="fixed inset-0 pointer-events-none z-50 w-full h-full"></canvas>

    <!-- 頂部繽紛標題欄 -->
    <header class="bg-white/95 backdrop-blur-md border-b-4 border-yellow-400 shadow-lg p-4 sticky top-0 z-40">
        <div class="max-w-5xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-3">
            <div class="flex items-center gap-3">
                <span class="text-4xl animate-bounce">🎨</span>
                <div>
                    <h1 class="text-2xl sm:text-3xl font-extrabold text-orange-600 tracking-wider">
                        猜猜我是誰 <span class="text-blue-500 text-lg block sm:inline">(幼兒廣東話版)</span>
                    </h1>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <!-- 關卡指示器 -->
                <div class="bg-yellow-400 border-2 border-yellow-500 text-yellow-950 font-black px-4 py-1.5 rounded-full shadow-md text-base sm:text-lg">
                    第 <span id="level-num">1</span> / 100 關
                </div>
                
                <!-- TTS 語音狀態檢測標籤 -->
                <div id="tts-status" class="bg-emerald-100 text-emerald-800 text-xs font-bold px-3 py-1.5 rounded-full border border-emerald-300 flex items-center gap-1">
                    <span>🎤</span> 語音加載中...
                </div>
            </div>
        </div>
    </header>

    <!-- 主要遊戲區域 -->
    <main class="max-w-5xl mx-auto px-4 mt-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <!-- 左側：幼兒專屬提示控制台 (TTS核心) -->
        <section class="md:col-span-1 flex flex-col gap-4">
            
            <!-- 粵語提示面板 -->
            <div class="bg-white rounded-3xl shadow-xl p-5 border-4 border-orange-400 relative overflow-hidden">
                <div class="absolute -right-4 -top-4 w-12 h-12 bg-orange-400 rounded-full opacity-20"></div>
                
                <h2 class="text-xl font-black text-orange-600 mb-3 flex items-center gap-2">
                    <span>📢</span> 廣東話聽力線索
                </h2>

                <!-- 提示計數器 -->
                <div class="flex justify-between items-center mb-3 bg-orange-50 px-3 py-2 rounded-2xl border border-orange-100">
                    <span class="text-sm font-bold text-gray-600">已聽線索：</span>
                    <span class="bg-red-500 text-white font-extrabold px-3 py-0.5 rounded-full text-sm" id="clue-badge">1 / 7</span>
                </div>

                <!-- 提示內容顯示盒 -->
                <div id="clues-list" class="space-y-3 max-h-[280px] overflow-y-auto mb-4 p-1">
                    <!-- 由 JS 填充廣東話提示 -->
                </div>

                <!-- 超大聲音重播按鈕 (幼兒最愛) -->
                <button onclick="speakCurrentClue()" class="w-full bg-yellow-400 hover:bg-yellow-500 active:scale-95 border-b-4 border-yellow-600 text-yellow-950 font-black py-4 px-4 rounded-2xl shadow-lg transition duration-150 flex justify-center items-center gap-3 text-lg animate-pulse">
                    <span class="text-2xl">🔊</span> 點擊聽廣東話讀一次
                </button>

                <div class="grid grid-cols-2 gap-2 mt-3">
                    <!-- 下一個線索 -->
                    <button id="next-clue-btn" onclick="nextClue()" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-2 rounded-xl text-sm border-b-4 border-orange-700 active:scale-95 transition flex flex-col items-center justify-center">
                        <span class="text-xl">🔍</span>
                        <span>下一個線索</span>
                    </button>
                    <!-- 開啟猜測 -->
                    <button id="guess-mode-btn" onclick="toggleGuessMode()" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-2 rounded-xl text-sm border-b-4 border-blue-700 active:scale-95 transition flex flex-col items-center justify-center">
                        <span id="guess-btn-icon" class="text-xl">🎯</span>
                        <span id="guess-btn-text">我要猜答案！</span>
                    </button>
                </div>
                
                <div id="guess-instructions" class="hidden mt-3 p-2 bg-blue-50 border-2 border-blue-300 rounded-xl text-center text-xs text-blue-800 font-bold animate-bounce">
                    👈 請在右邊點選你認為正確的卡牌！
                </div>
            </div>

            <!-- 開發者調試工具箱 (方便你我一起調試) -->
            <div class="bg-stone-800 text-stone-300 rounded-2xl p-4 shadow-lg border-2 border-stone-700 text-xs">
                <details open>
                    <summary class="font-bold text-yellow-400 cursor-pointer select-none flex justify-between items-center">
                        <span>🛠️ 開發者調試面板</span>
                        <span class="text-[10px] text-stone-400">點擊摺疊</span>
                    </summary>
                    <div class="mt-2 space-y-2 pt-2 border-t border-stone-700">
                        <div class="flex justify-between items-center">
                            <span>本關正確答案：</span>
                            <span class="bg-yellow-400 text-black px-2 py-0.5 rounded font-black text-sm" id="dev-answer-display">-</span>
                        </div>
                        <div class="grid grid-cols-2 gap-1.5">
                            <button onclick="revealAllClues()" class="bg-stone-700 hover:bg-stone-600 px-2 py-1.5 rounded text-white border border-stone-600">直接看全部提示</button>
                            <button onclick="forceSkipLevel()" class="bg-stone-700 hover:bg-stone-600 px-2 py-1.5 rounded text-white border border-stone-600">直接跳下一關</button>
                        </div>
                        <div class="flex items-center gap-1 text-[10px] text-stone-400">
                            <span>🔊 語音調試：</span>
                            <select id="voice-select" class="bg-stone-900 text-white rounded p-1 w-full text-[10px] border border-stone-700" onchange="changeVoice()">

                            </select>
                        </div>
                    </div>
                </details>
            </div>

        <section class="md:col-span-2">
            <div class="bg-red-600 rounded-[32px] p-4 sm:p-6 shadow-2xl border-8 border-red-700 relative">

                    Guess Who Gameboard
                </div>
                
                <div id="game-board" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-3 sm:gap-4 mt-2">
                    <!-- JS 動態生成 24 張卡牌 -->
                </div>
            </div>
        </section>
    </main>

    <!-- 幼兒專屬歡樂結算彈窗 -->

        <div class="bg-white rounded-[32px] shadow-2xl max-w-md w-full p-6 text-center transform scale-95 transition-all border-8 border-yellow-400">
            <div id="modal-emoji" class="text-8xl mb-3 animate-bounce">🎉</div>
            <h3 id="modal-title" class="text-3xl font-extrabold text-orange-600 mb-2">好叻呀！答啱咗！</h3>

                下一關繼續玩！🚀
            </button>
        </div>
    </div>

        // ======= 遊戲運行狀態變量 =======
        let currentLevel = 1;
        let boardCharacters = [];
        let targetCharacter = null;
        let cluesShown = 1;
        let isGuessMode = false;
        let eliminatedIds = new Set();
        let selectedVoice = null;

        // ======= TTS 音訊核心引擎 =======
        function initTTS() {
            if ('speechSynthesis' in window) {
                // 部分瀏覽器對 `getVoices` 實作非同步加載，需監聽觸發
                window.speechSynthesis.onvoiceschanged = () => {
                    populateVoiceList();
                };
                populateVoiceList();
            } else {
                const statusLabel = document.getElementById('tts-status');
                statusLabel.innerText = "❌ 瀏覽器不支援語音";
                statusLabel.className = "bg-red-100 text-red-800 text-xs font-bold px-3 py-1.5 rounded-full border border-red-300";
            }
        }

        function populateVoiceList() {
            if (!('speechSynthesis' in window)) return;
            const voices = window.speechSynthesis.getVoices();
            const voiceSelect = document.getElementById('voice-select');
            voiceSelect.innerHTML = '';

            // 篩選出廣東話/粵語語音 (zh-HK, zh-GND, Cantonese, Hong Kong)
            let cantoneseVoiceList = voices.filter(voice => 
                voice.lang.includes('zh-HK') || 
                voice.lang.includes('zh-GND') || 
                voice.name.toLowerCase().includes('cantonese') ||
                voice.name.toLowerCase().includes('hong kong')
            );

            // 若沒有找到粵語，則篩選任何中文 (zh-CN, zh-TW, zh)
            let finalVoices = cantoneseVoiceList.length > 0 ? cantoneseVoiceList : voices.filter(v => v.lang.startsWith('zh'));
            if (finalVoices.length === 0) finalVoices = voices; // 萬能兜底

            finalVoices.forEach((voice, index) => {
                const option = document.createElement('option');
                option.value = voice.name;
                option.innerText = `${voice.name} (${voice.lang})`;
                voiceSelect.appendChild(option);
            });

            // 預設選擇第一個找到的語音
            if (finalVoices.length > 0) {
                selectedVoice = finalVoices[0];
                const statusLabel = document.getElementById('tts-status');
                if (cantoneseVoiceList.length > 0) {
                    statusLabel.innerHTML = `<span>🎤</span> 粵語語音已就緒`;
                    statusLabel.className = "bg-emerald-100 text-emerald-800 text-xs font-bold px-3 py-1.5 rounded-full border border-emerald-300";
                } else {
                    statusLabel.innerHTML = `<span>⚠️</span> 系統缺廣東話，使用普通話`;
                    statusLabel.className = "bg-amber-100 text-amber-800 text-xs font-bold px-3 py-1.5 rounded-full border border-amber-300";
                }
            }
        }

        function changeVoice() {
            const voiceSelect = document.getElementById('voice-select');
            const voices = window.speechSynthesis.getVoices();
            selectedVoice = voices.find(v => v.name === voiceSelect.value);
            // 立即測試朗讀當前最新提示
            speakCurrentClue();
        }

        // 發聲函數
        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // 停止目前所有發聲
                const utterance = new SpeechSynthesisUtterance(text);
                
                if (selectedVoice) {
                    utterance.voice = selectedVoice;
                }
                
                // 幼兒專屬語速與音調微調
                utterance.rate = 0.8;  // 微慢速，方便理解
                utterance.pitch = 1.25; // 稍微高音，聽起來更親切活潑
                
                window.speechSynthesis.speak(utterance);
            }
        }

        function speakCurrentClue() {
            const currentClueText = targetCharacter.clues[cluesShown - 1];
            // 讀出前綴：「第 ${cluesShown} 個提示：」再加上線索主體
            speakText(`第 ${cluesShown} 個提示。${currentClueText}`);

        // ======= 初始化關卡核心邏輯 =======
        function initLevel() {
            eliminatedIds.clear();
            cluesShown = 1;
            isGuessMode = false;
            updateGuessModeUI();

            // 100關對應謎底機制 (24個角色循環)
            const targetIndex = (currentLevel - 1) % charactersData.length;
            targetCharacter = charactersData[targetIndex];

            // 洗牌打亂右側卡牌排列
            boardCharacters = [...charactersData];
            for (let i = boardCharacters.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [boardCharacters[i], boardCharacters[j]] = [boardCharacters[j], boardCharacters[i]];
            }

            // 更新 UI
            document.getElementById('level-num').innerText = currentLevel;
            document.getElementById('dev-answer-display').innerText = `${targetCharacter.emoji} ${targetCharacter.name}`;
            
            // 下一個提示按鈕重置
            const nextBtn = document.getElementById('next-clue-btn');
            nextBtn.disabled = false;
            nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');

            renderClues();
            renderBoard();

            // 當關卡初始化成功時，主動以粵語語音播報一次提示！
            setTimeout(() => {
                speakText(`小朋友，新一關開始喇！聽下第一個提示：`);
                setTimeout(() => {
                    speakCurrentClue();
                }, 2000);
            }, 500);
        }

        // ======= 渲染左側提示列表 =======
        function renderClues() {
            document.getElementById('clue-badge').innerText = `${cluesShown} / 7`;
            const list = document.getElementById('clues-list');
            list.innerHTML = '';

            for (let i = 0; i < cluesShown; i++) {
                const clueText = targetCharacter.clues[i];
                const card = document.createElement('div');
                const isNewest = (i === cluesShown - 1);
                
                // 新提示使用特別發光效果，方便幼兒識別
                card.className = `p-3 rounded-2xl border-2 transition-all duration-300 text-sm font-bold flex gap-2 items-start ${
                    isNewest 
                    ? 'bg-yellow-50 border-yellow-400 text-yellow-950 scale-102 shadow-md animate-pulse' 
                    : 'bg-stone-50 border-stone-200 text-stone-500'
                }`;
                card.innerHTML = `
                    <span class="bg-orange-500 text-white rounded-full text-xs w-5 h-5 flex items-center justify-center shrink-0 font-black">${i+1}</span>
                    <span>${clueText}</span>
                `;
                list.appendChild(card);
            }
            list.scrollTop = list.scrollHeight; // 自動向下滾動
        }

        // ======= 渲染 24 格大卡牌 =======
        function renderBoard() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';

            boardCharacters.forEach((char) => {
                const isEliminated = eliminatedIds.has(char.id);
                const button = document.createElement('button');
                
                // 幼兒友善：極大圓角、厚實邊框、鮮明按壓效果
                button.className = `card-active bg-yellow-50 rounded-2xl p-2 sm:p-4 border-4 flex flex-col items-center justify-center shadow-lg active:scale-90 ${
                    isEliminated 
                    ? 'card-eliminated border-stone-300' 
                    : isGuessMode 
                        ? 'border-blue-400 hover:border-blue-500 hover:bg-blue-50' 
                        : 'border-yellow-300 hover:border-yellow-400'
                }`;
                
                button.onclick = () => handleCardClick(char);

                // 卡牌大 Emoji
                button.innerHTML = `
                    <div class="text-5xl sm:text-6xl mb-2 select-none">${isEliminated ? '❌' : char.emoji}</div>
                    <div class="bg-amber-100 text-amber-950 text-xs sm:text-sm font-black px-3 py-1 rounded-xl border-2 border-amber-300 w-full text-center truncate">
                        ${char.name}
                    </div>
                `;
                board.appendChild(button);
            });
        }

        // 卡牌點擊
        function handleCardClick(char) {
            if (isGuessMode) {
                // 提交答案
                isGuessMode = false;
                updateGuessModeUI();
                processGuess(char);
            } else {
                // 翻轉卡片排除
                if (eliminatedIds.has(char.id)) {
                    eliminatedIds.delete(char.id);
                } else {
                    eliminatedIds.add(char.id);
                }
                renderBoard();
            }
        }

        // 下一條提示
        function nextClue() {
            if (cluesShown < 7) {
                cluesShown++;
                renderClues();
                speakCurrentClue(); // 自動語音播報新提示
                
                if (cluesShown === 7) {
                    const nextBtn = document.getElementById('next-clue-btn');
                    nextBtn.disabled = true;
                    nextBtn.classList.add('opacity-50', 'cursor-not-allowed');

                speakText("已經無多餘嘅線索喇，快啲猜測啦！");

        // 猜測模式切換
        function toggleGuessMode() {
            isGuessMode = !isGuessMode;

        function updateGuessModeUI() {
            const btn = document.getElementById('guess-mode-btn');
            const icon = document.getElementById('guess-btn-icon');

            const instructions = document.getElementById('guess-instructions');

            if (isGuessMode) {
                btn.className = "bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-2 rounded-xl text-sm border-b-4 border-red-700 active:scale-95 transition flex flex-col items-center justify-center animate-pulse";

                boardContainer.classList.add('border-blue-600', 'bg-blue-700'); // 改為炫亮藍底表示高亮選擇
                speakText("請點選你認為正確嘅卡牌！");
            } else {
                btn.className = "bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-2 rounded-xl text-sm border-b-4 border-blue-700 active:scale-95 transition flex flex-col items-center justify-center";
                icon.innerText = "🎯";
                text.innerText = "我要猜答案！";
                instructions.classList.add('hidden');

        // 處理猜測結果
        let wonThisRound = true;

            if (char.id === targetCharacter.id) {
                wonThisRound = true;
                triggerConfetti(); // 觸發過關彩帶特效
                speakText(`好叻呀！答啱咗！答案真係 ${targetCharacter.name}！`);
                showModal(true, `🎉 答啱咗喇！`, `你好叻呀！成功用咗 ${cluesShown} 個線索，估中咗神秘人就係：【${targetCharacter.emoji} ${targetCharacter.name}】！`);

                showModal(false, `💥 估錯咗喇！`, `答案其實係【${targetCharacter.emoji} ${targetCharacter.name}】，而你估咗【${char.emoji} ${char.name}】。唔好灰心，再試過！`);

        // 結算彈窗控制
        function showModal(isWin, title, msg) {
            const modal = document.getElementById('result-modal');

            if (isWin) {

                mBtn.innerText = currentLevel >= 100 ? "再挑戰100關！" : "下一關繼續玩！🚀";

                mEmoji.innerText = "🦁";

                mBtn.className = "w-full bg-orange-500 hover:bg-orange-600 text-white font-black py-4 rounded-2xl text-xl shadow-lg border-b-8 border-orange-700 active:scale-95 transition";
            }

        function closeModal() {
            document.getElementById('result-modal').classList.add('hidden');
            if (wonThisRound) {
                if (currentLevel >= 100) {
                    currentLevel = 1;
                } else {
                    currentLevel++;
                }
                localStorage.setItem('guess_who_level', currentLevel);
                initLevel();
            } else {
                initLevel();

        // ======= Canvas 精美五彩彩帶粒子效果 (自建免加載外部JS庫) =======
        const canvas = document.getElementById("confetti-canvas");
        const ctx = canvas.getContext("2d");
        let confetti = [];
        let animationFrameId = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        function triggerConfetti() {
            confetti = [];
            const colors = ["#f59e0b", "#ef4444", "#3b82f6", "#10b981", "#ec4899", "#8b5cf6"];
            for (let i = 0; i < 150; i++) {
                confetti.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    r: Math.random() * 6 + 4,
                    d: Math.random() * canvas.height,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    tilt: Math.random() * 10 - 5,
                    tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                    tiltAngle: 0
                });
            }
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            animateConfetti();
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let active = false;

            confetti.forEach((p, idx) => {
                p.tiltAngle += p.tiltAngleIncremental;
                p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                p.x += Math.sin(p.tiltAngle);
                p.tilt = Math.sin(p.tiltAngle - idx / 3) * 15;

                if (p.y < canvas.height) {
                    active = true;
                }

                ctx.beginPath();
                ctx.lineWidth = p.r;
                ctx.strokeStyle = p.color;
                ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                ctx.stroke();
            });

            if (active) {
                animationFrameId = requestAnimationFrame(animateConfetti);
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        // 頁面加載引導
        window.onload = function() {
            const savedLevel = localStorage.getItem('guess_who_level');
            if (savedLevel && parseInt(savedLevel) <= 100) {
                currentLevel = parseInt(savedLevel);
            }
            initTTS();
            initLevel();
        };
    </script>
</body>
</html>
