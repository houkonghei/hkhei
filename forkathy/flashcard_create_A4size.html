<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>A4 字卡專業生成器 Pro 2.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .no-print { background: #ffffff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 800px; margin: 0 auto 30px auto; }
        h2 { margin-top: 0; color: #1a73e8; text-align: center; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .full-width { grid-column: span 2; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        select, textarea { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        textarea { height: 120px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { padding: 14px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; border: none; transition: 0.2s; }
        #genBtn { background-color: #1a73e8; color: white; }
        #pdfBtn { background-color: #34a853; color: white; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        
        /* 預覽與 A4 樣式 */
        #previewContainer { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .a4-page { background: white; width: 210mm; height: 297mm; box-sizing: border-box; box-shadow: 0 0 10px rgba(0,0,0,0.1); display: grid; padding: 10mm; page-break-after: always; }
        .card { border: 1px dashed #ccc; display: flex; justify-content: center; align-items: center; text-align: center; font-weight: bold; padding: 10px; word-break: break-all; overflow: hidden; }

        @media print { .no-print { display: none !important; } body { background: none; padding: 0; } #previewContainer { gap: 0; } .a4-page { box-shadow: none; border: none; } }
    </style>
</head>
<body>

    <div class="no-print">
        <h2>🃏 A4 字卡專業生成器 Pro 2.0</h2>
        
        <div class="controls">
            <div>
                <label>1. 選擇每版格數：</label>
                <select id="cardCount">
                    <option value="8">8 格 (2x4)</option>
                    <option value="10">10 格 (2x5)</option>
                    <option value="12">12 格 (3x4)</option>
                    <option value="14">14 格 (2x7)</option>
                    <option value="16">16 格 (4x4)</option>
                    <option value="18">18 格 (3x6)</option>
                    <option value="20">20 格 (4x5)</option>
                    <option value="22">22 格 (2x11)</option>
                    <option value="24">24 格 (3x8)</option>
                    <option value="26">26 格 (2x13)</option>
                    <option value="28">28 格 (4x7)</option>
                    <option value="30">30 格 (3x10)</option>
                </select>
            </div>
            <div>
                <label>2. 選擇字體大小：</label>
                <select id="fontSize"></select>
            </div>
            <div class="full-width">
                <label>3. 輸入字詞 (每行一個)：</label>
                <textarea id="wordsInput" placeholder="請輸入字詞..."></textarea>
            </div>
        </div>
        
        <div class="btn-group">
            <button id="genBtn">⚡ 生成預覽</button>
            <button id="pdfBtn">📄 導出 PDF</button>
        </div>
    </div>

    <div id="previewContainer"></div>

    <script>
        const cardCountSelect = document.getElementById('cardCount');
        const fontSizeSelect = document.getElementById('fontSize');
        const gridLayouts = {
            8: {c:2, r:4}, 10: {c:2, r:5}, 12: {c:3, r:4}, 14: {c:2, r:7}, 16: {c:4, r:4},
            18: {c:3, r:6}, 20: {c:4, r:5}, 22: {c:2, r:11}, 24: {c:3, r:8}, 26: {c:2, r:13},
            28: {c:4, r:7}, 30: {c:3, r:10}
        };

        // 根據格數自動計算推薦字體大小
        function updateFontSizeOptions() {
            const count = parseInt(cardCountSelect.value);
            fontSizeSelect.innerHTML = '';
            
            // 基礎字體大小邏輯：格數越多，基礎字體越小
            let base = 48;
            if (count <= 10) base = 72;
            else if (count <= 16) base = 48;
            else if (count <= 22) base = 32;
            else base = 24;

            // 生成可選範圍 (base 的 60% 到 150%)
            for (let i = base - 12; i <= base + 36; i += 4) {
                if (i < 8) continue;
                let opt = new Option(`${i} px`, i);
                if (i === base) opt.selected = true;
                fontSizeSelect.add(opt);
            }
        }

        cardCountSelect.addEventListener('change', updateFontSizeOptions);
        updateFontSizeOptions(); // 初始化

        function generate() {
            const count = parseInt(cardCountSelect.value);
            const size = fontSizeSelect.value + 'px';
            const words = document.getElementById('wordsInput').value.split('\n').map(s=>s.trim()).filter(s=>s!=='');
            const container = document.getElementById('previewContainer');
            container.innerHTML = '';

            if (words.length === 0) return alert('請輸入字詞');

            const layout = gridLayouts[count];
            const pages = Math.ceil(words.length / count);

            for (let p = 0; p < pages; p++) {
                const page = document.createElement('div');
                page.className = 'a4-page';
                page.style.gridTemplateColumns = `repeat(${layout.c}, 1fr)`;
                page.style.gridTemplateRows = `repeat(${layout.r}, 1fr)`;

                for (let i = 0; i < count; i++) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style.fontSize = size;
                    const wordIdx = p * count + i;
                    card.textContent = words[wordIdx] || '';
                    page.appendChild(card);
                }
                container.appendChild(page);
            }
        }

        document.getElementById('genBtn').addEventListener('click', generate);

        document.getElementById('pdfBtn').addEventListener('click', () => {
            if (document.getElementById('previewContainer').innerHTML === '') {
                generate();
            }
            const element = document.getElementById('previewContainer');
            const opt = {
                margin: 0,
                filename: 'word_cards.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        });
    </script>
</body>
</html>
