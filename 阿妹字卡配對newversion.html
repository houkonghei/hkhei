        /* 魔法閃亮特效 */
        @keyframes sparkle {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        @keyframes bounce-win {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .card-container {
            perspective: 1000px;
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 140px;
            margin: 0 auto;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-inner.matched {
            animation: sparkle 1s ease-in-out infinite;
            cursor: default;
        }

        @keyframes fadeOutShrink {
            0% { transform: rotateY(180deg) scale(1); opacity: 1; }
            40% { transform: rotateY(180deg) scale(1.1); opacity: 1; }
            100% { transform: rotateY(180deg) scale(0); opacity: 0; }
        }

        .card-inner.vanished {
            animation: fadeOutShrink 0.8s forwards;
            pointer-events: none;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(255, 150, 200, 0.2);
            font-size: 2rem;
            border: 4px solid white;
            user-select: none;
        }

        .card-front {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            color: white;
            font-size: 3rem;
        }

        .card-back {
            background: white;
            color: #ff6b81;
            transform: rotateY(180deg);
            flex-direction: column;
            text-align: center;
            padding: 10px;
            word-break: break-word;

        .voice-card .card-back { font-size: 2.2rem; font-weight: 800; color: #9c27b0; }

        .star-particle {
            position: absolute;
            pointer-events: none;
            animation: float-up 1s ease-out forwards;
            font-size: 1.5rem;
        }

        @keyframes float-up {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.5); opacity: 0; }

            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }

            6% { transform: translate(-50%, -50%) scale(0.95) rotate(3deg); opacity: 1; }
            8% { transform: translate(-50%, -50%) scale(1.02) rotate(-1deg); opacity: 1; }
            10% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
            95% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0; }
        }

        @keyframes rainbowText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }

            position: fixed;

            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            pointer-events: auto; /* 攔截所有點擊 */

            flex-direction: column;
            align-items: center;
            justify-content: center;

            border: 8px solid #ff9a9e;
            box-shadow: 0 20px 50px rgba(255, 107, 129, 0.5), inset 0 0 30px rgba(255, 154, 158, 0.4);
            text-align: center;
            padding: 20px;
            overflow: hidden;

    <!-- 音效合成器 -->
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTone(freq, type, duration, vol = 0.1) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const sounds = {
            click: () => playTone(800, 'sine', 0.1, 0.05),
            pop: () => playTone(600, 'sine', 0.05, 0.05),
            match: () => {
                playTone(523.25, 'sine', 0.1, 0.1);
                setTimeout(() => playTone(659.25, 'sine', 0.1, 0.1), 100);
                setTimeout(() => playTone(783.99, 'sine', 0.2, 0.1), 200);
                setTimeout(() => playTone(1046.50, 'sine', 0.4, 0.15), 300);
            },
            mismatch: () => {
                playTone(300, 'triangle', 0.15, 0.05);
                setTimeout(() => playTone(250, 'triangle', 0.2, 0.05), 150);
            },
            win: () => {
                [0, 150, 300, 450].forEach((delay, i) => {
                    setTimeout(() => playTone(400 + (i * 100), 'sine', 0.2, 0.1), delay);
                });
            }
        };
    </script>

        function toggleTTS() {
            isTtsEnabled = !isTtsEnabled;
            const btn = document.getElementById('tts-btn');
            sounds.click();
            if (isTtsEnabled) {
                btn.innerHTML = '🔊 發音: 開';
                btn.className = 'text-sm bg-green-100 hover:bg-green-200 text-green-600 font-bold py-1 px-3 rounded-full flex items-center transition-colors shadow-sm active:scale-95';
            } else {
                btn.innerHTML = '🔇 發音: 關';
                btn.className = 'text-sm bg-red-100 hover:bg-red-200 text-red-600 font-bold py-1 px-3 rounded-full flex items-center transition-colors shadow-sm active:scale-95';
            }
        }

        function clearTextarea() {
            document.getElementById('word-list').value = '';
            sounds.click();
        }

        function openLibrary() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('library-modal').classList.remove('hidden');
            renderLibrary();
        }

        function closeLibrary() {
            sounds.click();
            document.getElementById('library-modal').classList.add('hidden');
        }

        function setLibLang(lang) {
            sounds.click();
            currentLibLang = lang;
            const btnZh = document.getElementById('lib-lang-zh');
            const btnEn = document.getElementById('lib-lang-en');
            if (lang === 'zh') {
                btnZh.className = 'px-6 py-2 rounded-full font-bold bg-pink-400 text-white shadow-md transition-colors transform active:scale-95';
                btnEn.className = 'px-6 py-2 rounded-full font-bold bg-gray-100 text-gray-500 hover:bg-pink-100 transition-colors transform active:scale-95';
            } else {
                btnEn.className = 'px-6 py-2 rounded-full font-bold bg-pink-400 text-white shadow-md transition-colors transform active:scale-95';
                btnZh.className = 'px-6 py-2 rounded-full font-bold bg-gray-100 text-gray-500 hover:bg-pink-100 transition-colors transform active:scale-95';
            }
            renderLibrary();
        }

        function renderLibrary() {
            const container = document.getElementById('library-content');
            container.innerHTML = '';
            libraryForUI.forEach(cat => {
                const catDiv = document.createElement('div');
                catDiv.className = 'mb-8';
                const title = document.createElement('h3');
                title.className = 'text-xl font-extrabold text-pink-500 border-b-2 border-pink-200 pb-2 mb-4 sticky top-0 bg-gray-50/95 backdrop-blur-sm z-10';
                title.innerText = cat.name;
                catDiv.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-3 sm:grid-cols-5 md:grid-cols-7 lg:grid-cols-9 gap-3';
                cat.words.forEach(wordObj => {
                    const btn = document.createElement('button');
                    btn.className = 'flex flex-col items-center justify-center p-3 bg-white border-2 border-pink-100 rounded-2xl hover:bg-pink-50 hover:border-pink-300 transition-all transform active:scale-90 shadow-sm';
                    const displayWord = currentLibLang === 'zh' ? wordObj.zh : wordObj.en;
                    btn.innerHTML = `<span class="text-4xl mb-2 drop-shadow-sm">${wordObj.emoji}</span><span class="text-sm font-bold text-gray-600 truncate w-full text-center">${displayWord}</span>`;
                    btn.onclick = () => {
                        addWordToTextarea(displayWord);
                        playLibraryTTS(displayWord);
                        const origBg = btn.style.backgroundColor;
                        const origBorder = btn.style.borderColor;
                        btn.style.backgroundColor = '#dcfce3';
                        btn.style.borderColor = '#86efac';
                        setTimeout(() => { btn.style.backgroundColor = origBg; btn.style.borderColor = origBorder; }, 200);
                    };
                    grid.appendChild(btn);
                });
                catDiv.appendChild(grid);
                container.appendChild(catDiv);
            });
        }

        let voices = [];
        window.speechSynthesis.onvoiceschanged = () => { voices = window.speechSynthesis.getVoices(); };

        function playLibraryTTS(word) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(word);
            if (currentLibLang === 'zh') {
                utterance.lang = 'zh-HK'; 
                let hkVoice = voices.find(v => (v.lang.includes('zh-HK') || v.name.includes('Hong Kong')) && (/female|tracy|sin-ji|女|google/i.test(v.name)));
                if (!hkVoice) hkVoice = voices.find(v => v.lang.includes('zh-HK') || v.name.includes('Hong Kong'));
                if (hkVoice) utterance.voice = hkVoice;
            } else {
                utterance.lang = 'en-US'; 
                const femaleVoice = voices.find(v => v.lang.includes('en') && (/female|samantha|zira|victoria/i.test(v.name)));
                if (femaleVoice) utterance.voice = femaleVoice;
            }
            utterance.rate = 0.95; utterance.pitch = 1.1;
            window.speechSynthesis.speak(utterance);
        }

        function addWordToTextarea(word) {
            const textarea = document.getElementById('word-list');
            const lines = textarea.value.split('\n').map(w => w.trim()).filter(w => w.length > 0);
            if (lines.length === 0 || lines[lines.length - 1] !== word) {
                textarea.value += (textarea.value.length > 0 && !textarea.value.endsWith('\n') ? '\n' : '') + word + '\n';
                sounds.pop();
                textarea.scrollTop = textarea.scrollHeight;
            }
        }

        // ==========================================
        // 遊戲核心狀態與邏輯
        // ==========================================
        let gameMode = 1; // 1: 配對模式, 2: 發音朗讀模式
        let currentLang = 'zh';
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let totalPairs = 0;
        let isProcessing = false;
        let activeHugeOverlay = null;

        // 語音辨識 API 初始化
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
        }

        function detectLanguage(word) { return /[\u4e00-\u9fa5]/.test(word) ? 'zh' : 'en'; }

        function speakWord3Times(word) {
            if (!isTtsEnabled) return;
            window.speechSynthesis.cancel();
            let playCount = 0;
            const maxPlays = 3;
            function playSingle() {
                if (playCount >= maxPlays) return;
                const utterance = new SpeechSynthesisUtterance(word);
                if (currentLang === 'zh') {
                    utterance.lang = 'zh-HK';
                    let hkVoice = voices.find(v => (v.lang.includes('zh-HK') || v.name.includes('Hong Kong')) && (/female|tracy|sin-ji|女|google/i.test(v.name)));
                    if (!hkVoice) hkVoice = voices.find(v => v.lang.includes('zh-HK') || v.name.includes('Hong Kong'));
                    if (hkVoice) utterance.voice = hkVoice;
                } else {
                    utterance.lang = 'en-US';
                    const femaleVoice = voices.find(v => v.lang.includes('en') && (/female|samantha|zira|victoria/i.test(v.name)));
                    if (femaleVoice) utterance.voice = femaleVoice;
                }
                utterance.rate = 0.9; utterance.pitch = 1.2;
                utterance.onend = () => { playCount++; if (playCount < maxPlays) setTimeout(playSingle, 600); };
                window.speechSynthesis.speak(utterance);
            }
            playSingle();
        }

        async function getFallbackImageURL(word) {
            try {
                let enWord = word.toLowerCase();
                if (/[\u4e00-\u9fa5]/.test(word)) {
                    const trRes = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=zh|en`);
                    const trData = await trRes.json();
                    if (trData && trData.responseData && trData.responseData.translatedText) {
                        let translated = trData.responseData.translatedText.toLowerCase();
                        if (!translated.includes("mymemory") && !translated.includes("warning")) { enWord = translated; }
                    }
                }
                let searchWord = enWord.replace(/[^a-z0-9\s-]/g, '').trim().replace(/\s+/g, '-');
                let imgUrl = await fetchIconify(searchWord);
                if (!imgUrl && searchWord.includes('-')) {
                    const parts = searchWord.split('-');
                    imgUrl = await fetchIconify(parts[parts.length - 1]);
                }
                return imgUrl;
            } catch(e) { console.error("搜尋失敗:", e); return null; }
        }

        async function fetchIconify(keyword) {
            if (!keyword) return null;
            try {
                const iconRes = await fetch(`https://api.iconify.design/search?query=${encodeURIComponent(keyword)}&limit=30`);
                const iconData = await iconRes.json();
                if (iconData.icons && iconData.icons.length > 0) {
                    const colorfulPrefixes = ['fluent-emoji', 'twemoji', 'noto', 'emojione', 'fxemoji', 'streamline-emojis', 'flat-color-icons', 'color'];
                    let chosenIcon = null;
                    for (let icon of iconData.icons) {
                        if (colorfulPrefixes.some(prefix => icon.startsWith(prefix))) { chosenIcon = icon; break; }
                    }
                    if (!chosenIcon) chosenIcon = iconData.icons[0];
                    const parts = chosenIcon.split(':');
                    if (parts.length === 2) return `https://api.iconify.design/${parts[0]}/${parts[1]}.svg?width=120&height=120`;
                }
            } catch(e) { console.error("Iconify 搜尋失敗:", e); }
            return null;
        }

        async function startGame(mode) {
            gameMode = mode;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const text = document.getElementById('word-list').value;
            const rawWords = text.split('\n').map(w => w.trim()).filter(w => w.length > 0);
            
            if (rawWords.length === 0) { alert("媽咪，忘記輸入單字囉！"); return; }
            if (gameMode === 2 && !SpeechRecognition) {
                alert("哎呀！您的瀏覽器不支援語音裁判魔法，建議使用 Google Chrome 瀏覽器來遊玩發音模式喔！");
                return;
            }

            if (gameMode === 2 && window.location.protocol === 'file:') {
                alert("溫馨提示：您目前是直接點擊檔案開啟 (file://)。\n基於 Chrome 瀏覽器的安全隱私限制，這個環境下每次翻卡都會重新詢問麥克風權限喔！\n\n建議將此檔案上傳到免費網頁空間 (如 tiiny.host)，或使用本機伺服器 (如 VS Code 的 Live Server) 來獲得順暢的遊玩體驗！");
            }

            const buttons = document.querySelectorAll('#setup-screen button');
            buttons.forEach(b => b.disabled = true);
            const statusBtn = gameMode === 1 ? buttons[3] : buttons[4];
            const originalText = statusBtn.innerText;
            statusBtn.innerHTML = '✨ 魔法精靈正在準備卡片... ✨';
            statusBtn.classList.add('animate-pulse');

            const words = rawWords.slice(0, 16);
            currentLang = detectLanguage(words[0]);

            cards = [];
            
            if (gameMode === 1) {
                for (let index = 0; index < words.length; index++) {
                    const word = words[index];
                    const key = word.toLowerCase();
                    let pic = imageDictionary[key];
                    let isUrl = false;
                    if (!pic) {
                        const onlinePic = await getFallbackImageURL(word);
                        if (onlinePic) { pic = onlinePic; isUrl = true; } else { pic = '🎁'; }
                    }
                    const id = `pair_${index}`;
                    // 修正：為文字卡加上 wordText 屬性，防止出現 undefined
                    cards.push({ id: id, type: 'word', content: word, wordText: word, isUrl: false });
                    cards.push({ id: id, type: 'pic', content: pic, wordText: word, isUrl: isUrl });
                }
                totalPairs = words.length;
            } else {
                for (let index = 0; index < words.length; index++) {
                    cards.push({ id: `voice_${index}`, type: 'voice', content: words[index], wordText: words[index], isUrl: false });
                }
                totalPairs = words.length;
            }

            cards.sort(() => Math.random() - 0.5);
            matchedPairs = 0;
            document.getElementById('score').innerText = '0';
            document.getElementById('total-score').innerText = totalPairs;
            
            if (gameMode === 1) {
                document.getElementById('cheer-text').innerText = currentLang === 'zh' ? '找找看一樣的！' : 'Find the match!';
            } else {
                document.getElementById('cheer-text').innerText = currentLang === 'zh' ? '大聲讀出來！' : 'Read it out loud!';
            }
            
            renderBoard();

            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('win-screen').classList.add('hidden');

            buttons.forEach(b => b.disabled = false);
            statusBtn.innerHTML = originalText;
            statusBtn.classList.remove('animate-pulse');
        }

        function renderBoard() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            
            cards.forEach((card, index) => {
                const cardEl = document.createElement('div');
                cardEl.className = 'card-container';
                
                const inner = document.createElement('div');
                inner.className = `card-inner ${card.type}-card`;
                inner.dataset.id = card.id;
                inner.dataset.index = index;
                // 修正：增加防呆機制，如果找不到 wordText 就使用 content
                inner.dataset.word = card.wordText || card.content;

                const front = document.createElement('div');
                front.className = 'card-face card-front';
                front.innerHTML = '✨';

                const back = document.createElement('div');
                back.className = 'card-face card-back';
                if (card.isUrl) {
                    back.innerHTML = `<img src="${card.content}" alt="${card.wordText}" style="width: 80%; height: 80%; object-fit: contain;">`;
                } else {
                    back.innerText = card.content;
                }

                inner.appendChild(front);
                inner.appendChild(back);
                cardEl.appendChild(inner);

                inner.addEventListener('click', () => {
                    if (gameMode === 1) handleMatchCardClick(inner);
                    else handleVoiceCardClick(inner);
                });
                board.appendChild(cardEl);
            });
        }

        function showHugeWordEffect(word) {
            const overlay = document.createElement('div');
            overlay.className = 'huge-word-overlay';
            
            const textSpan = document.createElement('span');
            textSpan.className = 'huge-word-text';
            textSpan.innerText = word;
            
            // 【關鍵修改】：根據字數動態調整視窗寬度佔比 (vw)
            // 假設最大佔比不超過 25vw，如果字數變多，就把寬度除以字數來縮小字體
            const wordLen = word.length;
            const vwSize = Math.min(25, 75 / wordLen); 
            textSpan.style.fontSize = `clamp(2rem, ${vwSize}vw, 15rem)`;
            
            overlay.appendChild(textSpan);
            document.body.appendChild(overlay);
            
            activeHugeOverlay = overlay;
            
            overlay.removeTimer = setTimeout(() => {
                if (document.body.contains(overlay)) overlay.remove();
                if (activeHugeOverlay === overlay) activeHugeOverlay = null;
            }, 8000); 
            
            return overlay;
        }

        function handleMatchCardClick(cardInner) {
            if (isProcessing) return;
            if (cardInner.classList.contains('flipped') || cardInner.classList.contains('matched')) return;

            sounds.click();
            cardInner.classList.add('flipped');
            flippedCards.push(cardInner);

            if (cardInner.classList.contains('word-card')) {
                const word = cardInner.dataset.word;
                speakWord3Times(word);
                showHugeWordEffect(word);
            }

            if (flippedCards.length === 2) {
                isProcessing = true;
                checkMatch();
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            const isMatch = card1.dataset.id === card2.dataset.id;

            if (isMatch) {
                sounds.match();
                matchedPairs++;
                document.getElementById('score').innerText = matchedPairs;
                
                const cheersZh = ['好叻女！', '太棒了！', '小公主真聰明！', '哇喔！'];
                const cheersEn = ['Great Job!', 'Excellent!', 'Smart Girl!', 'Wow!'];
                const cheers = currentLang === 'zh' ? cheersZh : cheersEn;
                document.getElementById('cheer-text').innerText = cheers[Math.floor(Math.random() * cheers.length)];

                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    createStars(card1);
                    createStars(card2);
                }, 300);

                const wordToSpeak = card1.dataset.word;
                speakWord3Times(wordToSpeak);

                flippedCards = [];
                isProcessing = false;

                setTimeout(() => {
                    card1.classList.remove('matched');
                    card1.classList.add('vanished');
                    card2.classList.remove('matched');
                    card2.classList.add('vanished');
                    if (matchedPairs === totalPairs) setTimeout(showWinScreen, 800);
                }, 1500);
            } else {
                sounds.mismatch();
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    isProcessing = false;
                }, 1000);
            }
        }

        function handleVoiceCardClick(cardInner) {
            if (isProcessing) return;
            if (cardInner.classList.contains('flipped') || cardInner.classList.contains('vanished')) return;

            sounds.click();
            cardInner.classList.add('flipped');
            isProcessing = true;

            const targetWord = cardInner.dataset.word;
            const overlay = showHugeWordEffect(targetWord);
            
            const micIndicator = document.createElement('div');
            micIndicator.className = 'listening-indicator';
            micIndicator.innerText = '🎤 聽緊你讀...';
            overlay.appendChild(micIndicator);

            // 新增：手動通過按鈕
            const manualBtn = document.createElement('button');
            manualBtn.className = 'manual-pass-btn';
            manualBtn.innerText = '✅ 手動通過';
            overlay.appendChild(manualBtn);

            startListening(targetWord, cardInner, overlay, manualBtn);
        }

        function startListening(targetWord, cardInner, overlay, manualBtn) {
            if (!recognition) {
                setTimeout(() => handleVoiceSuccess(cardInner, overlay), 2000);
                return;
            }

            recognition.lang = currentLang === 'zh' ? 'zh-HK' : 'en-US';
            let handled = false;

            // 綁定手動通過按鈕事件
            if (manualBtn) {
                manualBtn.onclick = () => {
                    if (handled) return;
                    handled = true;
                    try { recognition.stop(); } catch(e) {}
                    handleVoiceSuccess(cardInner, overlay);
                };
            }

            recognition.onresult = (event) => {
                if (handled) return;
                const transcript = event.results[0][0].transcript.toLowerCase().trim();
                const cleanTranscript = transcript.replace(/[.,!?。，！？]/g, '');
                const cleanWord = targetWord.toLowerCase().trim();

                if (cleanTranscript.includes(cleanWord) || (cleanWord.includes(cleanTranscript) && cleanTranscript.length > 0)) {
                    handled = true;
                    recognition.stop();
                    handleVoiceSuccess(cardInner, overlay);
                }
            };

            recognition.onerror = (event) => {
                if (handled) return;
                handled = true;
                handleVoiceFail(cardInner, overlay, targetWord);
            };

            recognition.onend = () => {
                if (handled) return;
                handled = true;
                handleVoiceFail(cardInner, overlay, targetWord);
            };

            try {
                recognition.start();
            } catch (e) {
                console.error(e);
                handleVoiceFail(cardInner, overlay, targetWord);
            }
        }

        function handleVoiceSuccess(cardInner, overlay) {
            sounds.match();
            matchedPairs++;
            document.getElementById('score').innerText = matchedPairs;
            
            const cheersZh = ['答對！'];
            const cheersEn = ['Correct!'];
            const cheers = currentLang === 'zh' ? cheersZh : cheersEn;
            document.getElementById('cheer-text').innerText = cheers[0];

            createStars(cardInner);
            
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(cheers[0]);
            if (currentLang === 'zh') {
                utterance.lang = 'zh-HK';
                let hkVoice = voices.find(v => (v.lang.includes('zh-HK') || v.name.includes('Hong Kong')) && (/female|tracy|sin-ji|女|google/i.test(v.name)));
                if (!hkVoice) hkVoice = voices.find(v => v.lang.includes('zh-HK') || v.name.includes('Hong Kong'));
                if (hkVoice) utterance.voice = hkVoice;
            } else {
                utterance.lang = 'en-US';
                const femaleVoice = voices.find(v => v.lang.includes('en') && (/female|samantha|zira|victoria/i.test(v.name)));
                if (femaleVoice) utterance.voice = femaleVoice;
            }
            window.speechSynthesis.speak(utterance);

            if (overlay && document.body.contains(overlay)) {
                overlay.remove();
            }

            cardInner.classList.add('matched');
            setTimeout(() => {
                cardInner.classList.remove('matched');
                cardInner.classList.add('vanished');
                isProcessing = false;
                if (matchedPairs === totalPairs) setTimeout(showWinScreen, 800);
            }, 1000);
        }

        function handleVoiceFail(cardInner, overlay, targetWord) {
            sounds.mismatch();
            document.getElementById('cheer-text').innerText = currentLang === 'zh' ? '聽聽正確發音！' : 'Listen and learn!';
            
            // 刪除冗長的前奏發音，直接呼叫核心函數重讀單字 3 次！
            speakWord3Times(targetWord);

            if (overlay && document.body.contains(overlay)) {
                clearTimeout(overlay.removeTimer);
                
                overlay.style.animation = 'none';
                void overlay.offsetHeight;
                overlay.style.animation = 'popOutHuge 8s ease-out forwards';
                
                overlay.removeTimer = setTimeout(() => {
                    if (document.body.contains(overlay)) overlay.remove();
                    if (activeHugeOverlay === overlay) activeHugeOverlay = null;
                }, 8000);
            }

            setTimeout(() => {
                cardInner.classList.remove('flipped');
                isProcessing = false;
            }, 8000);
        }

        function createStars(element) {
            const rect = element.getBoundingClientRect();
            for(let i=0; i<3; i++) {
                const star = document.createElement('div');
                star.className = 'star-particle';
                star.innerText = '⭐';
                star.style.left = (rect.left + Math.random() * rect.width) + 'px';
                star.style.top = (rect.top + Math.random() * rect.height) + 'px';
                document.body.appendChild(star);
                setTimeout(() => star.remove(), 1000);
            }
        }

        function showWinScreen() {
            sounds.win();
            window.speechSynthesis.cancel(); 
            
            const msg = gameMode === 1 ? "全部配對成功囉！" : "全部都讀對囉！發音好標準！";
            document.getElementById('win-message').innerText = msg;

            const cheerSpeech = new SpeechSynthesisUtterance(currentLang === 'zh' ? `小公主太棒了！${msg}` : "You did it! Great job princess!");
            cheerSpeech.lang = currentLang === 'zh' ? 'zh-HK' : 'en-US';
            window.speechSynthesis.speak(cheerSpeech);

            document.getElementById('win-screen').classList.remove('hidden');
            
            for(let i=0; i<20; i++) {
                setTimeout(() => {
                    const star = document.createElement('div');
                    star.className = 'star-particle';
                    star.innerText = ['🌸','✨','💖','👑'][Math.floor(Math.random()*4)];
                    star.style.left = (Math.random() * window.innerWidth) + 'px';
                    star.style.top = (window.innerHeight) + 'px';
                    document.body.appendChild(star);
                    setTimeout(() => star.remove(), 1000);
                }, i * 100);
            }
        }

        function backToSetup() {
            window.speechSynthesis.cancel();
            if (activeHugeOverlay && document.body.contains(activeHugeOverlay)) {
                activeHugeOverlay.remove();
            }
            if (recognition) {
                try { recognition.stop(); } catch(e){}
            }
            isProcessing = false;
            document.getElementById('setup-screen').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('win-screen').classList.add('hidden');
        }

    </script>
