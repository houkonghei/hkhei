<!DOCTYPE html>
<html lang="zh-TW" class="transition-colors duration-300 dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文學習輔助工具 - AI & OCR 版</title>
    <!-- 引入核心庫 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/tesseract.js@5.0.3/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
        // 設定 PDF.js 的 Worker 
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    </script>
    <style>
        :root { --highlight-bg: #00ff00; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; transition: background-color 0.3s, color 0.3s; }
        .clickable-word { cursor: pointer; border-bottom: 2px transparent solid; transition: all 0.2s; display: inline-block; }
        .clickable-word:hover { background-color: var(--highlight-bg); color: #000 !important; border-radius: 4px; }
        .active-word { background-color: var(--highlight-bg) !important; border-radius: 4px; color: #000 !important; }
        #studyContent { font-size: 1.25rem; line-height: 2; white-space: pre-wrap; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .ai-loading { display: inline-block; width: 1rem; height: 1rem; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: spin 0.75s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-950 text-gray-800 dark:text-gray-100">

    <div class="max-w-5xl mx-auto h-screen flex flex-col p-0 md:p-4">
        <!-- 頂部導覽 -->
        <header class="bg-white dark:bg-gray-900 shadow-sm md:rounded-2xl p-4 flex flex-wrap gap-4 border-b dark:border-gray-800 items-center mb-4 transition-colors">
            <h1 class="text-xl font-bold text-blue-600 dark:text-blue-400 mr-auto flex items-center gap-2">
                ✨ AI & OCR 學習助手
            </h1>
            
            <nav class="flex bg-gray-100 dark:bg-gray-800 p-1 rounded-xl order-3 w-full md:w-auto md:order-2">
                <button onclick="switchTab('input')" id="tab-input" class="px-4 py-1.5 rounded-lg text-sm font-bold transition-all">輸入</button>
                <button onclick="switchTab('study')" id="tab-study" class="px-4 py-1.5 rounded-lg text-sm font-bold transition-all hidden">學習</button>
                <button onclick="switchTab('vocab')" id="tab-vocab" class="px-4 py-1.5 rounded-lg text-sm font-bold transition-all">生詞</button>
                <button onclick="switchTab('textVocab')" id="tab-textVocab" class="px-4 py-1.5 rounded-lg text-sm font-bold transition-all">匯出</button>
            </nav>

            <div class="flex items-center gap-3 md:order-3 border-l pl-4 dark:border-gray-700">
                <input type="color" id="colorPicker" value="#00ff00" onchange="updateHighlightColor(this.value)" class="w-8 h-8 rounded-full border-none cursor-pointer">
                <button onclick="toggleTheme()" class="p-2 rounded-xl bg-gray-100 dark:bg-gray-800">
                    <span id="theme-icon">☀️</span>
                </button>
            </div>
        </header>

        <main class="bg-white dark:bg-gray-900 shadow-md md:rounded-3xl flex-grow overflow-hidden relative border border-gray-200 dark:border-gray-800">
            
            <!-- 視圖 1: 輸入文章與 OCR -->
            <div id="view-input" class="p-6 h-full flex flex-col">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
                    <div>
                        <h2 class="text-xl font-bold">1. 貼上文章或上傳檔案</h2>
                        <p class="text-sm text-gray-500">支援圖片辨識與 PDF 文字擷取</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <label class="bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-300 px-4 py-2 rounded-xl cursor-pointer hover:bg-blue-100 transition-all font-bold text-sm">
                            📁 上傳 圖片/PDF
                            <input type="file" id="fileInput" accept="image/*,application/pdf" class="hidden" onchange="handleFileUpload(this)">
                        </label>
                    </div>
                </div>

                <!-- OCR 進度條 -->
                <div id="ocrStatus" class="hidden mb-4 p-4 bg-blue-50 dark:bg-blue-900/20 border border-blue-100 dark:border-blue-800 rounded-xl">
                    <div class="flex items-center justify-between mb-2">
                        <span id="ocrStatusText" class="text-xs font-bold text-blue-600">正在處理檔案...</span>
                        <span id="ocrProgress" class="text-xs font-mono">0%</span>
                    </div>
                    <div class="w-full bg-blue-200 dark:bg-blue-800 rounded-full h-1.5 overflow-hidden">
                        <div id="ocrProgressBar" class="bg-blue-600 h-full transition-all" style="width: 0%"></div>
                    </div>
                </div>

                <textarea id="articleInput" class="w-full flex-grow p-5 border border-gray-200 dark:border-gray-800 rounded-2xl bg-gray-50 dark:bg-gray-950 text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-blue-500 focus:outline-none text-lg resize-none" placeholder="在此貼上文章內容..."></textarea>
                
                <button onclick="startLearning()" class="mt-6 bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-lg transition transform hover:scale-[1.01] active:scale-95">
                    🚀 開始分析文章
                </button>
            </div>

            <!-- 視圖 2: 學習模式 -->
            <div id="view-study" class="h-full flex flex-col hidden relative">
                <div class="p-4 border-b dark:border-gray-800 flex flex-wrap items-center gap-4 bg-gray-50/50 dark:bg-gray-800/50">
                    <button onclick="readWholeArticle()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold">▶ 朗讀全文</button>
                    <button onclick="stopReading()" class="bg-rose-500 text-white px-4 py-2 rounded-lg text-sm font-bold">■ 停止</button>
                    <button onclick="aiSummarize()" id="aiSummaryBtn" class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md flex items-center gap-2">
                        ✨ AI 總結
                    </button>
                    <div class="ml-auto flex items-center gap-2">
                        <span class="text-xs font-bold text-gray-500">語速</span>
                        <input type="range" id="speedSlider" min="0.5" max="1.5" step="0.1" value="0.8" class="w-20 accent-indigo-600">
                    </div>
                </div>
                
                <div id="summaryArea" class="hidden mx-8 mt-4 p-4 bg-purple-50 dark:bg-purple-900/20 border border-purple-100 dark:border-purple-800 rounded-2xl">
                    <div id="summaryContent" class="text-sm text-gray-600 dark:text-gray-300"></div>
                </div>

                <div class="overflow-y-auto p-8 pb-48 no-scrollbar" id="studyContent"></div>

                <!-- 單字操作面板 -->
                <div id="wordPanel" class="absolute bottom-6 left-6 right-6 bg-white dark:bg-gray-800 rounded-3xl border border-gray-200 dark:border-gray-700 p-6 shadow-2xl transform translate-y-[150%] transition-transform duration-500 z-30 flex flex-col gap-4">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div class="flex-grow">
                            <div class="flex items-center gap-3 mb-1">
                                <h3 id="currentWordText" class="text-3xl font-black text-blue-600 dark:text-blue-400 capitalize">Word</h3>
                                <button onclick="playPronunciation()" class="text-xl">🔊</button>
                            </div>
                            <p id="currentTranslation" class="text-lg font-medium text-gray-600 dark:text-gray-300 italic">翻譯載入中...</p>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            <button onclick="aiExplainWord()" id="aiExplainBtn" class="bg-purple-100 dark:bg-purple-900/40 text-purple-700 dark:text-purple-300 px-6 py-3 rounded-2xl font-bold text-sm">✨ AI 深度解釋</button>
                            <button onclick="addCurrentWordToVocab(event)" id="addVocabBtn" class="bg-slate-900 dark:bg-white dark:text-slate-900 text-white px-8 py-3 rounded-2xl font-bold text-sm">加入生詞本 (A)</button>
                            <button onclick="closeWordPanel()" class="p-3 text-gray-400">✕</button>
                        </div>
                    </div>
                    <div id="aiExplanationArea" class="hidden border-t dark:border-gray-700 pt-4">
                        <div id="aiExplanationContent" class="text-sm text-gray-700 dark:text-gray-300 whitespace-pre-wrap leading-relaxed"></div>
                    </div>
                </div>
            </div>

            <!-- 視圖 3: 生詞本 -->
            <div id="view-vocab" class="p-6 h-full flex flex-col hidden">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-bold">我的生詞本 <span id="vocabCount" class="ml-2 text-sm font-normal text-gray-400">0</span></h2>
                    <button onclick="clearAllVocab()" class="text-xs text-rose-500">清空全部</button>
                </div>
                <div class="overflow-y-auto flex-grow no-scrollbar">
                    <div id="vocabList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </div>

            <!-- 視圖 4: 匯出 -->
            <div id="view-textVocab" class="p-6 h-full flex flex-col hidden">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-2xl font-bold">純文本匯出</h2>
                    <button onclick="copyTextVocab()" id="copyBtn" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-sm font-bold">📋 複製內容</button>
                </div>
                <textarea id="plainTextOutput" readonly class="w-full flex-grow p-4 bg-gray-50 dark:bg-gray-950 border border-gray-200 dark:border-gray-800 rounded-xl font-mono"></textarea>
            </div>

        </main>
    </div>

    <script>
        const apiKey = ""; // Gemini API
        let vocabList = JSON.parse(localStorage.getItem('smartVocab_v4')) || [];
        let currentWord = "", currentMeaning = "", currentContext = "", isDark = localStorage.getItem('theme') !== 'light';

        window.onload = () => {
            if (isDark) document.documentElement.classList.add('dark');
            updateHighlightColor(localStorage.getItem('highlightColor') || '#00ff00', false);
            updateVocabCount();
        };

        // --- OCR 功能實作 ---

        async function handleFileUpload(input) {
            const file = input.files[0];
            if (!file) return;

            const statusArea = document.getElementById('ocrStatus');
            const statusText = document.getElementById('ocrStatusText');
            const progressBar = document.getElementById('ocrProgressBar');
            const progressText = document.getElementById('ocrProgress');
            const articleInput = document.getElementById('articleInput');

            statusArea.classList.remove('hidden');
            articleInput.value = "";

            try {
                if (file.type === 'application/pdf') {
                    statusText.innerText = "正在解析 PDF...";
                    await processPDF(file, (text) => {
                        articleInput.value += text + "\n";
                    }, (p) => {
                        progressBar.style.width = p + "%";
                        progressText.innerText = Math.round(p) + "%";
                    });
                } else {
                    statusText.innerText = "正在辨識圖片文字...";
                    const result = await Tesseract.recognize(file, 'eng', {
                        logger: m => {
                            if (m.status === 'recognizing text') {
                                progressBar.style.width = (m.progress * 100) + "%";
                                progressText.innerText = Math.round(m.progress * 100) + "%";
                            }
                        }
                    });
                    articleInput.value = result.data.text;
                }
                statusText.innerText = "辨識完成！";
                setTimeout(() => statusArea.classList.add('hidden'), 2000);
            } catch (err) {
                console.error(err);
                statusText.innerText = "辨識發生錯誤。";
            }
        }

        async function processPDF(file, pageCallback, progressCallback) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            const totalPages = pdf.numPages;

            for (let i = 1; i <= totalPages; i++) {
                const page = await pdf.getPage(i);
                
                // 優先提取 PDF 中的文字層
                const textContent = await page.getTextContent();
                const text = textContent.items.map(item => item.str).join(' ');
                
                if (text.trim().length > 10) {
                    pageCallback(text);
                } else {
                    // 如果沒有文字層（掃描檔），則進行 OCR
                    const viewport = page.getViewport({ scale: 2 });
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    
                    const result = await Tesseract.recognize(canvas, 'eng');
                    pageCallback(result.data.text);
                }
                progressCallback((i / totalPages) * 100);
            }
        }

        // --- Gemini AI 功能 ---

        async function callGemini(prompt, system = "You are a professional English teacher.") {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: system }] }
                    })
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (err) { return "AI 暫時無法連線。"; }
        }

        async function aiSummarize() {
            const text = document.getElementById('articleInput').value;
            const btn = document.getElementById('aiSummaryBtn');
            const area = document.getElementById('summaryArea');
            const content = document.getElementById('summaryContent');
            if (!text.trim()) return;
            area.classList.remove('hidden');
            content.innerHTML = '<span class="ai-loading"></span> 正在生成總結...';
            const res = await callGemini(`請用繁體中文總結這篇文章的 3 個重點：\n${text}`);
            content.innerText = res;
        }

        async function aiExplainWord() {
            const area = document.getElementById('aiExplanationArea');
            const content = document.getElementById('aiExplanationContent');
            area.classList.remove('hidden');
            content.innerHTML = '<span class="ai-loading"></span> AI 深度分析中...';
            const res = await callGemini(`請解釋單字 "${currentWord}" 在此句中的意義：\n"${currentContext}"\n請提供中文翻譯、用法說明與一個新例句。`);
            content.innerText = res;
        }

        // --- 基礎邏輯 ---

        function toggleTheme() {
            isDark = !isDark;
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
        }

        function updateHighlightColor(color, save = true) {
            document.documentElement.style.setProperty('--highlight-bg', color);
            if (save) localStorage.setItem('highlightColor', color);
        }

        function switchTab(tabId) {
            ['input', 'study', 'vocab', 'textVocab'].forEach(id => {
                document.getElementById(`view-${id}`).classList.add('hidden');
                document.getElementById(`tab-${id}`).classList.remove('bg-white', 'dark:bg-gray-700', 'shadow-sm', 'text-blue-600');
            });
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            document.getElementById(`tab-${tabId}`).classList.add('bg-white', 'dark:bg-gray-700', 'shadow-sm', 'text-blue-600');
            if (tabId === 'vocab') renderVocabList();
            if (tabId === 'textVocab') {
                document.getElementById('plainTextOutput').value = vocabList.map(v => v.word).join('\n');
            }
        }

        function startLearning() {
            const text = document.getElementById('articleInput').value;
            if (!text.trim()) return;
            const formatted = text.replace(/([a-zA-Z']+)/g, (m) => `<span class="clickable-word" onclick="handleWordClick(this, \`${m.replace(/'/g, "\\'")}\`)">${m}</span>`);
            document.getElementById('studyContent').innerHTML = formatted;
            document.getElementById('tab-study').classList.remove('hidden');
            switchTab('study');
        }

        function handleWordClick(el, word) {
            currentWord = word.toLowerCase();
            const text = document.getElementById('articleInput').value;
            const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
            currentContext = sentences.find(s => s.toLowerCase().includes(currentWord))?.trim() || "";
            document.querySelectorAll('.clickable-word').forEach(w => w.classList.remove('active-word'));
            el.classList.add('active-word');
            document.getElementById('currentWordText').innerText = word;
            document.getElementById('currentTranslation').innerText = "查詢中...";
            document.getElementById('wordPanel').classList.remove('translate-y-[150%]');
            document.getElementById('aiExplanationArea').classList.add('hidden');
            fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=en|zh-TW`)
                .then(r => r.json()).then(d => {
                    currentMeaning = d.responseData.translatedText;
                    document.getElementById('currentTranslation').innerText = currentMeaning;
                });
            playPronunciation();
        }

        function playPronunciation() {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(currentWord);
            u.lang = 'en-US'; u.rate = 0.8;
            window.speechSynthesis.speak(u);
        }

        function readWholeArticle() {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(document.getElementById('articleInput').value);
            u.lang = 'en-US'; u.rate = document.getElementById('speedSlider').value;
            window.speechSynthesis.speak(u);
        }

        function stopReading() { window.speechSynthesis.cancel(); }

        function addCurrentWordToVocab(e) {
            if (vocabList.some(v => v.word === currentWord)) return;
            vocabList.unshift({ word: currentWord, meaning: currentMeaning, context: currentContext });
            localStorage.setItem('smartVocab_v4', JSON.stringify(vocabList));
            updateVocabCount();
            e.currentTarget.innerText = "✅ 已加入";
            setTimeout(() => e.currentTarget.innerText = "加入生詞本 (A)", 1000);
        }

        function renderVocabList() {
            const container = document.getElementById('vocabList');
            container.innerHTML = vocabList.map(item => `
                <div class="bg-gray-50 dark:bg-gray-800 p-4 rounded-xl border border-gray-100 dark:border-gray-700 relative group">
                    <button onclick="deleteVocab('${item.word}')" class="absolute top-2 right-2 text-gray-300 opacity-0 group-hover:opacity-100">✕</button>
                    <h4 class="font-bold text-blue-600 dark:text-blue-400 capitalize">${item.word}</h4>
                    <p class="text-sm font-medium mb-1">${item.meaning}</p>
                    <p class="text-xs text-gray-400 italic">"${item.context}"</p>
                </div>
            `).join('') || '<p class="col-span-full text-center text-gray-400 py-10">尚無生詞</p>';
        }

        function deleteVocab(word) {
            vocabList = vocabList.filter(v => v.word !== word);
            localStorage.setItem('smartVocab_v4', JSON.stringify(vocabList));
            updateVocabCount(); renderVocabList();
        }

        function clearAllVocab() { if(confirm('清空？')) { vocabList = []; localStorage.removeItem('smartVocab_v4'); updateVocabCount(); renderVocabList(); } }
        function updateVocabCount() { document.getElementById('vocabCount').innerText = vocabList.length; }
        function closeWordPanel() { document.getElementById('wordPanel').classList.add('translate-y-[150%]'); }
        function copyTextVocab() { 
            const tx = document.getElementById('plainTextOutput'); tx.select(); 
            document.execCommand('copy'); 
            document.getElementById('copyBtn').innerText = "✅ 已複製";
        }
    </script>
</body>
</html>
