<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粵語諧音英語單詞記憶生成器</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
        }
        /* 自定義美化滾動條 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<!-- 嚴格的桌面端 App 佈局：鎖定全螢幕高度，不允許整個 body 滾動 -->
<body class="bg-slate-50 text-slate-800 flex flex-col lg:h-screen lg:overflow-hidden">

    <!-- Header (固定高度) -->
    <header class="shrink-0 bg-gradient-to-r from-indigo-600 to-purple-600 text-white shadow-md z-10">
        <div class="max-w-[1600px] w-full mx-auto px-4 sm:px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2.5 rounded-xl backdrop-blur-sm flex items-center justify-center">
                    <i data-lucide="brain-circuit" class="w-8 h-8 text-yellow-300"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-wider flex items-center flex-wrap gap-2">
                        粵英聯想記憶大師
                        <span class="text-xs bg-yellow-400 text-yellow-900 px-2.5 py-0.5 rounded-full font-bold flex items-center gap-1 shadow-sm">
                            <i data-lucide="volume-2" class="w-3 h-3"></i> 語音升級版
                        </span>
                    </h1>
                    <p class="text-xs text-indigo-100 mt-1">批量英語單詞 ➔ 粵語諧音 + 圖像故事記憶法生成器</p>
                </div>
            </div>
            <div class="flex items-center gap-2 bg-white/10 px-3 py-1.5 rounded-lg text-xs backdrop-blur-sm border border-white/10">
                <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                <span>DeepSeek API 官方驅動</span>
            </div>
        </div>
    </header>

    <!-- Main Content (動態填滿剩餘高度，內部限制 min-h-0) -->
    <main class="flex-1 w-full max-w-[1600px] mx-auto px-4 sm:px-6 py-5 flex flex-col min-h-0">
        <div class="flex flex-col lg:flex-row gap-6 flex-1 min-h-0">
            
            <!-- Left Panel: Input Area (佔據 1/3) -->
            <div class="w-full lg:w-1/3 flex flex-col min-h-0">
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex-1 flex flex-col min-h-0 relative">
                    <div class="shrink-0 flex justify-between items-center mb-3">
                        <div class="flex items-center gap-2">
                            <i data-lucide="file-text" class="w-5 h-5 text-indigo-500"></i>
                            <h2 class="font-bold text-lg text-slate-700">輸入英文單詞</h2>
                        </div>
                        <span class="text-xs font-semibold text-slate-400 bg-slate-100 px-2 py-1 rounded-md" id="wordCount">0 個單詞</span>
                    </div>
                    
                    <p class="shrink-0 text-xs text-slate-400 mb-3">每一行輸入一個英文單詞（按 Enter 換行）。支援同時處理大量單詞。</p>
                    
                    <!-- 輸入框在桌面端會自動拉伸填滿剩餘高度，並自帶滾動條 -->
                    <textarea id="wordsInput" 
                              class="w-full flex-1 p-4 bg-slate-50 border border-slate-200 rounded-xl text-base font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none transition-all focus:bg-white overflow-y-auto min-h-0 shadow-inner"
                              placeholder="例如：&#10;abandon&#10;ambulance&#10;bullet&#10;dangerous"
                              oninput="updateWordCount()"></textarea>
                    
                    <button id="btnGenerate" onclick="startGeneration()" 
                            class="shrink-0 w-full mt-4 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold py-3.5 px-6 rounded-xl shadow-lg shadow-indigo-200 transition-all transform active:scale-[0.98] flex items-center justify-center gap-2">
                        <i data-lucide="wand-2" class="w-5 h-5"></i>
                        <span class="tracking-wide">開始 AI 批次分析</span>
                    </button>
                </div>
            </div>

            <!-- Right Panel: Output & Controls (佔據 2/3) -->
            <div class="w-full lg:w-2/3 flex flex-col gap-4 min-h-0">
                
                <!-- 控制列 (固定高度不壓縮) -->
                <div class="shrink-0 bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div>
                            <h2 class="font-bold text-lg text-slate-700 flex items-center gap-2">
                                <i data-lucide="database" class="w-5 h-5 text-purple-500"></i>
                                分析結果
                            </h2>
                            <p class="text-xs text-slate-400 mt-1" id="statusText">等待生成中...</p>
                        </div>
                        <div class="flex gap-2 w-full sm:w-auto">
                            <button onclick="exportCSV()" id="btnExportCsv" disabled class="flex-1 sm:flex-initial flex items-center justify-center gap-1.5 px-4 py-2 bg-emerald-50 text-emerald-700 hover:bg-emerald-100 disabled:opacity-50 disabled:cursor-not-allowed rounded-lg text-sm font-semibold border border-emerald-200 transition-all shadow-sm">
                                <i data-lucide="file-spreadsheet" class="w-4 h-4"></i>
                                複製 CSV
                            </button>
                            <button onclick="exportText()" id="btnExportTxt" disabled class="flex-1 sm:flex-initial flex items-center justify-center gap-1.5 px-4 py-2 bg-slate-100 text-slate-700 hover:bg-slate-200 disabled:opacity-50 disabled:cursor-not-allowed rounded-lg text-sm font-semibold border border-slate-200 transition-all shadow-sm">
                                <i data-lucide="clipboard" class="w-4 h-4"></i>
                                複製純文字
                            </button>
                        </div>
                    </div>

                    <!-- Progress bar -->
                    <div class="w-full bg-slate-100 h-2 rounded-full mt-4 overflow-hidden hidden" id="progressContainer">
                        <div id="progressBar" class="bg-indigo-600 h-full w-0 transition-all duration-300"></div>
                    </div>
                </div>

                <!-- 大框架 + 滾動條 (嚴格限制高度 flex-1 min-h-0) -->
                <div id="scrollFrame" class="flex-1 min-h-0 overflow-y-auto bg-slate-200/50 border border-slate-300 rounded-2xl shadow-inner p-4 sm:p-6 relative">
                    
                    <div id="resultsContainer" class="flex flex-col gap-5">
                        <!-- Placeholder when empty -->
                        <div id="emptyState" class="flex-1 flex flex-col items-center justify-center py-24 text-center">
                            <div class="bg-white p-6 rounded-full mb-4 shadow-sm">
                                <i data-lucide="sparkles" class="w-10 h-10 text-indigo-400"></i>
                            </div>
                            <h3 class="font-bold text-slate-700 text-lg">尚未生成數據</h3>
                            <p class="text-slate-500 text-sm max-w-sm mt-2 leading-relaxed">在左側輸入英文單詞並點擊分析，AI 將在這裡為您構建爆笑好記的粵語諧音故事！</p>
                        </div>
                    </div>
                    
                </div>
            </div>

        </div>
    </main>

    <!-- Custom Notification Toast -->
    <div id="toast" class="hidden fixed bottom-6 right-6 bg-slate-900 text-white px-5 py-3.5 rounded-xl shadow-2xl flex items-center gap-3 z-50 transition-all">
        <i data-lucide="check-circle" class="w-5 h-5 text-emerald-400"></i>
        <span id="toastMsg" class="text-sm font-medium">複製成功！</span>
    </div>

    <!-- Footer -->
    <footer class="shrink-0 bg-white border-t border-slate-100 py-3">
        <div class="max-w-[1600px] w-full mx-auto px-4 sm:px-6 text-center text-xs text-slate-400 flex flex-col sm:flex-row justify-between items-center gap-2">
            <p>粵英聯想記憶大師 v2.5 (桌面特化版) &copy; 2026</p>
            <p class="text-[10px]">聲明：所有運算皆在客戶端與 DeepSeek 伺服器間進行，安全無虞。</p>
        </div>
    </footer>

    <script>
        // 配置區：隱藏在背景的金鑰與模型設定
        const API_CONFIG = {
            KEY: "sk-bd62115e6b424f17b69fb9cb09e65d85",
            MODEL: "deepseek-chat", 
            URL: "https://api.deepseek.com/chat/completions" 
        };

        // 初始化 Lucide 圖標
        lucide.createIcons();

        let analysisResults = [];

        // 初始化語音系統列表
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
        }

        window.onload = function() {
            updateWordCount();
        };

        // 語音朗讀：英語單詞 (慢速)
        function speakEnglish(index) {
            if (!('speechSynthesis' in window)) {
                showToast('❌ 您的瀏覽器不支援語音合成');
                return;
            }
            const text = analysisResults[index].word;
            window.speechSynthesis.cancel(); 
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.6; 
            window.speechSynthesis.speak(utterance);
        }

        // 語音朗讀：中文與故事 (粵語中速)
        function speakCantonese(index) {
            if (!('speechSynthesis' in window)) {
                showToast('❌ 您的瀏覽器不支援語音合成');
                return;
            }
            const text = analysisResults[index].translation + '。記憶法：' + analysisResults[index].memory_story;
            window.speechSynthesis.cancel(); 
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-HK'; 
            utterance.rate = 1.0; 
            
            const voices = window.speechSynthesis.getVoices();
            const hkVoice = voices.find(v => v.lang === 'zh-HK' || v.lang === 'yue-HK' || v.name.toLowerCase().includes('hong kong'));
            if (hkVoice) {
                utterance.voice = hkVoice;
            }
            
            window.speechSynthesis.speak(utterance);
        }

        function updateWordCount() {
            const input = document.getElementById('wordsInput').value;
            const words = input.split('\n').map(w => w.trim()).filter(w => w.length > 0);
            document.getElementById('wordCount').textContent = `${words.length} 個單詞`;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            toastMsg.textContent = message;
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }

        async function startGeneration() {
            const rawInput = document.getElementById('wordsInput').value;
            const words = rawInput.split('\n').map(w => w.trim()).filter(w => w.length > 0);
            
            if (words.length === 0) {
                showToast('❌ 請輸入至少一個英文單詞！');
                return;
            }

            const btnGenerate = document.getElementById('btnGenerate');
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const emptyState = document.getElementById('emptyState');
            const resultsContainer = document.getElementById('resultsContainer');
            const statusText = document.getElementById('statusText');
            const scrollFrame = document.getElementById('scrollFrame'); // 取出大框架

            btnGenerate.disabled = true;
            btnGenerate.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> <span class="tracking-wide">AI 正在全力分析中...</span>`;
            lucide.createIcons();

            progressContainer.classList.remove('hidden');
            progressBar.style.width = '0%';
            
            if (emptyState) {
                emptyState.remove();
            }

            resultsContainer.innerHTML = '';
            analysisResults = [];

            document.getElementById('btnExportCsv').disabled = true;
            document.getElementById('btnExportTxt').disabled = true;

            for (let i = 0; i < words.length; i++) {
                const word = words[i];
                statusText.textContent = `正在分析：${word} (${i + 1}/${words.length})`;
                
                const cardId = `card-${i}`;
                createLoadingCard(resultsContainer, cardId, word);

                // 自動將右側大框架滾動到底部
                if (scrollFrame) {
                    scrollFrame.scrollTop = scrollFrame.scrollHeight;
                }

                try {
                    const result = await fetchWordAnalysisWithRetry(word);
                    if (result) {
                        analysisResults.push(result);
                        updateCardWithData(cardId, result, analysisResults.length - 1);
                    } else {
                        updateCardWithError(cardId, word, '無法生成該單詞數據');
                    }
                } catch (error) {
                    console.error(error);
                    updateCardWithError(cardId, word, error.message || '連線錯誤');
                }

                const progressPercentage = ((i + 1) / words.length) * 100;
                progressBar.style.width = `${progressPercentage}%`;
            }

            btnGenerate.disabled = false;
            btnGenerate.innerHTML = `<i data-lucide="wand-2" class="w-5 h-5"></i> <span class="tracking-wide">重新 AI 批次分析</span>`;
            statusText.textContent = `分析完成！共生成了 ${analysisResults.length} 個單詞的記憶聯想。`;
            lucide.createIcons();

            if (analysisResults.length > 0) {
                document.getElementById('btnExportCsv').disabled = false;
                document.getElementById('btnExportTxt').disabled = false;
            }
        }

        async function fetchWordAnalysisWithRetry(word, retries = 5, delay = 1000) {
            for (let attempt = 1; attempt <= retries; attempt++) {
                try {
                    return await fetchWordAnalysis(word);
                } catch (error) {
                    if (attempt === retries) {
                        throw error;
                    }
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        }

        function cleanAndParseJSON(text) {
            let cleanText = text.trim();
            if (cleanText.startsWith("```json")) {
                cleanText = cleanText.substring(7);
            } else if (cleanText.startsWith("```")) {
                cleanText = cleanText.substring(3);
            }
            if (cleanText.endsWith("```")) {
                cleanText = cleanText.substring(0, cleanText.length - 3);
            }
            return JSON.parse(cleanText.trim());
        }

        async function fetchWordAnalysis(word) {
            const systemPrompt = `你是一個極具創意的英語與粵語雙語記憶大師。
你的任務是為用戶輸入的「英文單詞」生成一個方便粵語使用者（廣東話）速記的「粵語諧音故事記憶法」。

請輸出精確的 JSON 數據結構，切勿包含任何額外的解釋性文字。
JSON 結構必須為以下對象格式：
{
  "word": "英文單詞",
  "phonetic": "音標 (美音或英音，如: /əˈbændən/)",
  "translation": "中文繁體意思 (例如：動詞 v. 放棄、遺棄)",
  "cantonese_homophone": "粵語諧音 (用廣東話字詞拼湊出最接近該英文單詞發音的字)",
  "cantonese_pron": "諧音字的粵語拼音或讀音標註 (例如：aa1 ban1 dan1)",
  "memory_story": "故事性圖像畫面聯想記憶法：結合該英文單詞的【中文意思】與【粵語諧音】，編造一個非常荒謬、搞笑、有強烈畫面感的「廣東話」記憶小故事。字數控制在 60-120 字內。用詞請使用道地的粵語口語（例如：唔、喺、佢、咗、好似、一陣間等）。"
}`;

            const userPrompt = `請分析英文單詞: "${word}"`;

            const requestBody = {
                model: API_CONFIG.MODEL,
                messages: [
                    { role: "system", content: systemPrompt },
                    { role: "user", content: userPrompt }
                ],
                response_format: { type: "json_object" },
                temperature: 0.7
            };

            const response = await fetch(API_CONFIG.URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_CONFIG.KEY}`
                },
                body: JSON.stringify(requestBody)
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.error?.message || `HTTP 錯誤：${response.status}`);
            }

            const data = await response.json();
            const textResult = data.choices?.[0]?.message?.content;
            if (!textResult) {
                throw new Error('API 返回了空數據');
            }

            return cleanAndParseJSON(textResult);
        }

        function createLoadingCard(container, cardId, word) {
            const cardHtml = `
                <div id="${cardId}" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 animate-pulse flex flex-col gap-4">
                    <div class="flex justify-between items-center">
                        <div class="h-8 bg-slate-200 rounded-lg w-1/3"></div>
                        <div class="h-6 bg-slate-200 rounded-lg w-1/4"></div>
                    </div>
                    <div class="h-5 bg-slate-200 rounded-lg w-1/2"></div>
                    <div class="h-16 bg-slate-100 rounded-xl w-full mt-2"></div>
                    <div class="h-24 bg-slate-100 rounded-xl w-full mt-2"></div>
                    <div class="h-10 bg-slate-100 rounded-xl w-full mt-3"></div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', cardHtml);
        }

        function updateCardWithData(cardId, data, index) {
            const card = document.getElementById(cardId);
            if (!card) return;

            card.className = "bg-white p-6 rounded-2xl shadow-md border border-slate-100 hover:border-indigo-200 hover:shadow-lg transition-all flex flex-col gap-3 relative overflow-hidden group";
            card.innerHTML = `
                <!-- Accent Tag -->
                <div class="absolute left-0 top-0 bottom-0 w-2 bg-gradient-to-b from-indigo-500 to-purple-500"></div>
                
                <div class="pl-3 flex flex-col h-full justify-between">
                    <div>
                        <div class="flex flex-wrap justify-between items-baseline gap-2">
                            <div class="flex items-baseline gap-3">
                                <span class="text-3xl font-extrabold text-slate-800 tracking-wide">${data.word}</span>
                                <span class="text-base text-slate-400 font-mono">${data.phonetic}</span>
                            </div>
                            <span class="text-sm bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-full font-bold shadow-sm">${data.translation.split(' ')[0] || '意思'}</span>
                        </div>

                        <div class="mt-3 text-lg font-medium text-slate-600">
                            解釋：<span class="text-slate-800 font-semibold">${data.translation}</span>
                        </div>

                        <div class="mt-4 flex items-center gap-3 bg-gradient-to-r from-yellow-50 to-amber-50 border border-yellow-200/60 rounded-xl p-4 shadow-sm">
                            <div class="bg-yellow-400 text-yellow-950 rounded-lg p-2 px-3 font-black text-sm tracking-widest shrink-0 shadow-sm">
                                粵音諧音：${data.cantonese_homophone}
                            </div>
                            <div class="text-base font-mono text-amber-700 font-semibold italic">
                                [ ${data.cantonese_pron} ]
                            </div>
                        </div>

                        <div class="mt-5">
                            <div class="text-sm text-slate-500 font-bold mb-2 flex items-center gap-1.5">
                                <i data-lucide="image" class="w-4 h-4 text-indigo-500"></i>
                                圖像故事記憶法
                            </div>
                            <p class="text-base text-slate-700 leading-relaxed bg-slate-50 p-4 rounded-xl border border-slate-100 shadow-inner">
                                ${data.memory_story}
                            </p>
                        </div>
                    </div>

                    <!-- Action Buttons (TTS) -->
                    <div class="mt-6 pt-5 border-t border-slate-100 flex gap-4">
                        <button onclick="speakEnglish(${index})" class="flex-1 flex items-center justify-center gap-2 px-4 py-3 bg-blue-50 text-blue-700 hover:bg-blue-600 hover:text-white rounded-xl text-sm font-bold transition-all border border-blue-100 hover:border-blue-600 shadow-sm">
                            <i data-lucide="volume-1" class="w-5 h-5"></i>
                            聽單詞 (慢速)
                        </button>
                        <button onclick="speakCantonese(${index})" class="flex-1 flex items-center justify-center gap-2 px-4 py-3 bg-amber-50 text-amber-700 hover:bg-amber-500 hover:text-white rounded-xl text-sm font-bold transition-all border border-amber-100 hover:border-amber-500 shadow-sm">
                            <i data-lucide="volume-2" class="w-5 h-5"></i>
                            聽故事 (粵語)
                        </button>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function updateCardWithError(cardId, word, errorMsg) {
            const card = document.getElementById(cardId);
            if (!card) return;

            card.className = "bg-red-50 p-6 rounded-2xl border border-red-200 flex flex-col gap-2 shadow-sm";
            card.innerHTML = `
                <div class="flex items-center gap-2 text-red-700">
                    <i data-lucide="alert-triangle" class="w-5 h-5"></i>
                    <span class="font-bold text-lg">${word} - 生成失敗</span>
                </div>
                <p class="text-sm text-red-500">${errorMsg}，請檢查您的網路環境或稍後重試。</p>
            `;
            lucide.createIcons();
        }

        function copyToClipboard(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed'; 
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast('📋 已複製到剪貼簿！');
            } catch (err) {
                showToast('❌ 複製失敗，請手動複製。');
            }
            document.body.removeChild(textarea);
        }

        function exportCSV() {
            if (analysisResults.length === 0) return;
            const headers = ['單詞', '音標', '中文翻譯', '粵語諧音', '粵語拼音', '圖像聯想記憶法故事'];
            const escapeCSV = (str) => {
                if (!str) return '""';
                return `"${str.replace(/"/g, '""').replace(/\n/g, ' ')}"`;
            };
            const rows = analysisResults.map(item => [
                escapeCSV(item.word),
                escapeCSV(item.phonetic),
                escapeCSV(item.translation),
                escapeCSV(item.cantonese_homophone),
                escapeCSV(item.cantonese_pron),
                escapeCSV(item.memory_story)
            ]);
            const csvContent = "\ufeff" + [headers.join(','), ...rows.map(e => e.join(','))].join('\n');
            copyToClipboard(csvContent);
        }

        function exportText() {
            if (analysisResults.length === 0) return;
            let textContent = `===== 粵語諧音英語單詞記憶清單 =====\n\n`;
            analysisResults.forEach((item, index) => {
                textContent += `${index + 1}. 【${item.word}】 [${item.phonetic}]\n`;
                textContent += `   意思：${item.translation}\n`;
                textContent += `   粵音：${item.cantonese_homophone} (${item.cantonese_pron})\n`;
                textContent += `   記憶法：${item.memory_story}\n`;
                textContent += `--------------------------------------------------\n`;
            });
            copyToClipboard(textContent);
        }
    </script>
</body>
</html>
