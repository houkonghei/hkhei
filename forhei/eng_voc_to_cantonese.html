<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粵語諧音英語單詞記憶生成器</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2.5 rounded-xl backdrop-blur-sm">
                    <i data-lucide="brain-circuit" class="w-8 h-8 text-yellow-300"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-wider">粵英聯想記憶大師</h1>
                    <p class="text-xs text-indigo-100 mt-1">批量英語單詞 ➔ 粵語諧音 + 圖像故事記憶法生成器</p>
                </div>
            </div>
            <div class="flex items-center gap-2 bg-white/10 px-3 py-1.5 rounded-lg text-xs backdrop-blur-sm border border-white/10">
                <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                <span>DeepSeek API 官方驅動</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-6xl w-full mx-auto px-4 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Left Panel: Input & Settings -->
            <div class="lg:col-span-5 flex flex-col gap-6">
                <!-- Input Field Card -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex-grow flex flex-col min-h-[400px]">
                    <div class="flex justify-between items-center mb-3">
                        <div class="flex items-center gap-2">
                            <i data-lucide="file-text" class="w-5 h-5 text-indigo-500"></i>
                            <h2 class="font-bold text-lg text-slate-700">輸入英文單詞</h2>
                        </div>
                        <span class="text-xs text-slate-400" id="wordCount">0 個單詞</span>
                    </div>
                    
                    <p class="text-xs text-slate-400 mb-4">每一行輸入一個英文單詞（按 Enter 換行）。支持同時處理多個單詞。</p>
                    
                    <textarea id="wordsInput" 
                              class="w-full flex-grow p-4 bg-slate-50 border border-slate-200 rounded-xl text-base font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none transition-all focus:bg-white"
                              placeholder="例如：&#10;abandon&#10;ambulance&#10;bullet&#10;dangerous"
                              oninput="updateWordCount()"></textarea>
                    
                    <button id="btnGenerate" onclick="startGeneration()" 
                            class="w-full mt-4 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg shadow-indigo-200 transition-all transform active:scale-[0.98] flex items-center justify-center gap-2">
                        <i data-lucide="wand-2" class="w-5 h-5"></i>
                        <span>開始 AI 批次分析</span>
                    </button>
                </div>
            </div>

            <!-- Right Panel: Output & Controls -->
            <div class="lg:col-span-7 flex flex-col gap-6">
                <!-- Status & Export Controls -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div>
                            <h2 class="font-bold text-lg text-slate-700 flex items-center gap-2">
                                <i data-lucide="database" class="w-5 h-5 text-purple-500"></i>
                                分析結果
                            </h2>
                            <p class="text-xs text-slate-400 mt-1" id="statusText">等待生成中...</p>
                        </div>
                        <div class="flex gap-2 w-full sm:w-auto">
                            <button onclick="exportCSV()" id="btnExportCsv" disabled class="flex-1 sm:flex-initial flex items-center justify-center gap-1.5 px-3.5 py-2 bg-emerald-50 text-emerald-700 hover:bg-emerald-100 disabled:opacity-50 disabled:cursor-not-allowed rounded-lg text-xs font-semibold border border-emerald-200 transition-all">
                                <i data-lucide="file-spreadsheet" class="w-4 h-4"></i>
                                複製 CSV 數據
                            </button>
                            <button onclick="exportText()" id="btnExportTxt" disabled class="flex-1 sm:flex-initial flex items-center justify-center gap-1.5 px-3.5 py-2 bg-slate-100 text-slate-700 hover:bg-slate-200 disabled:opacity-50 disabled:cursor-not-allowed rounded-lg text-xs font-semibold border border-slate-200 transition-all">
                                <i data-lucide="clipboard" class="w-4 h-4"></i>
                                複製純文字
                            </button>
                        </div>
                    </div>

                    <!-- Progress bar -->
                    <div class="w-full bg-slate-100 h-2 rounded-full mt-4 overflow-hidden hidden" id="progressContainer">
                        <div id="progressBar" class="bg-indigo-600 h-full w-0 transition-all duration-300"></div>
                    </div>
                </div>

                <!-- Custom Notification Toast -->
                <div id="toast" class="hidden fixed bottom-5 right-5 bg-slate-900 text-white px-4 py-3 rounded-xl shadow-xl flex items-center gap-2 z-50 transition-all">
                    <i data-lucide="check-circle" class="w-5 h-5 text-emerald-400"></i>
                    <span id="toastMsg" class="text-sm">複製成功！</span>
                </div>

                <!-- Live Results View -->
                <div class="flex-grow flex flex-col gap-4 max-h-[600px] overflow-y-auto pr-2" id="resultsContainer">
                    <!-- Placeholder when empty -->
                    <div id="emptyState" class="flex-grow flex flex-col items-center justify-center py-20 text-center bg-white rounded-2xl border border-dashed border-slate-200">
                        <div class="bg-indigo-50 p-4 rounded-full mb-4">
                            <i data-lucide="sparkles" class="w-8 h-8 text-indigo-500"></i>
                        </div>
                        <h3 class="font-bold text-slate-700">尚未生成數據</h3>
                        <p class="text-slate-400 text-sm max-w-sm mt-1">在左側輸入英文單詞並點擊分析，AI 將在這裡為您構建爆笑好記的粵語諧音故事！</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-100 mt-12 py-6">
        <div class="max-w-6xl mx-auto px-4 text-center text-xs text-slate-400 space-y-2">
            <p>粵英聯想記憶大師 &copy; 2026 - 專為粵語使用者設計的圖像文字英語速記器</p>
            <p class="text-[10px]">聲明：所有運算皆在客戶端與 DeepSeek 伺服器間進行。</p>
        </div>
    </footer>

    <script>
        // 配置區：隱藏在背景的金鑰與模型設定
        const API_CONFIG = {
            KEY: "sk-bd62115e6b424f17b69fb9cb09e65d85",
            MODEL: "deepseek-chat", // 使用速度快且推薦的 V3 模型
            URL: "https://api.deepseek.com/chat/completions" // 絕對乾淨的 API 網址字串
        };

        // 初始化 Lucide 圖標
        lucide.createIcons();

        // 儲存解析結果的全局陣列
        let analysisResults = [];

        // 頁面加載時更新字數
        window.onload = function() {
            updateWordCount();
        };

        // 計算輸入框單詞數量
        function updateWordCount() {
            const input = document.getElementById('wordsInput').value;
            const words = input.split('\n').map(w => w.trim()).filter(w => w.length > 0);
            document.getElementById('wordCount').textContent = `${words.length} 個單詞`;
        }

        // 顯示通知自定義 Toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            toastMsg.textContent = message;
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }

        // 核心：開始批次分析
        async function startGeneration() {
            const rawInput = document.getElementById('wordsInput').value;
            const words = rawInput.split('\n').map(w => w.trim()).filter(w => w.length > 0);
            
            if (words.length === 0) {
                showToast('❌ 請輸入至少一個英文單詞！');
                return;
            }

            // UI 狀態切換
            const btnGenerate = document.getElementById('btnGenerate');
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const emptyState = document.getElementById('emptyState');
            const resultsContainer = document.getElementById('resultsContainer');
            const statusText = document.getElementById('statusText');

            btnGenerate.disabled = true;
            btnGenerate.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> <span>AI 正在全力分析中...</span>`;
            lucide.createIcons();

            progressContainer.classList.remove('hidden');
            progressBar.style.width = '0%';
            
            if (emptyState) {
                emptyState.remove();
            }

            // 清空先前的結果容器與數據陣列
            resultsContainer.innerHTML = '';
            analysisResults = [];

            // 禁用複製按鈕
            document.getElementById('btnExportCsv').disabled = true;
            document.getElementById('btnExportTxt').disabled = true;

            // 逐個單詞調用 API (避免併發過多導致 API 限流，同時能提供完美的實時反饋)
            for (let i = 0; i < words.length; i++) {
                const word = words[i];
                statusText.textContent = `正在分析：${word} (${i + 1}/${words.length})`;
                
                // 創建一個載入中的骨架屏卡片
                const cardId = `card-${i}`;
                createLoadingCard(resultsContainer, cardId, word);

                try {
                    const result = await fetchWordAnalysisWithRetry(word);
                    if (result) {
                        analysisResults.push(result);
                        updateCardWithData(cardId, result);
                    } else {
                        updateCardWithError(cardId, word, '無法生成該單詞數據');
                    }
                } catch (error) {
                    console.error(error);
                    updateCardWithError(cardId, word, error.message || '連線錯誤');
                }

                // 更新進度條
                const progressPercentage = ((i + 1) / words.length) * 100;
                progressBar.style.width = `${progressPercentage}%`;
            }

            // 結束後的 UI 更新
            btnGenerate.disabled = false;
            btnGenerate.innerHTML = `<i data-lucide="wand-2" class="w-5 h-5"></i> <span>重新 AI 批次分析</span>`;
            statusText.textContent = `分析完成！共生成了 ${analysisResults.length} 個單詞的記憶聯想。`;
            lucide.createIcons();

            if (analysisResults.length > 0) {
                document.getElementById('btnExportCsv').disabled = false;
                document.getElementById('btnExportTxt').disabled = false;
            }
        }

        // 帶有指數退避重試機制的 API 調用
        async function fetchWordAnalysisWithRetry(word, retries = 5, delay = 1000) {
            for (let attempt = 1; attempt <= retries; attempt++) {
                try {
                    return await fetchWordAnalysis(word);
                } catch (error) {
                    if (attempt === retries) {
                        throw error; // 到達最大重試次數，拋出異常
                    }
                    // 指數退避延遲
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        }

        // 輔助函數：從可能有 Markdown 標記的文本中安全提取 JSON
        function cleanAndParseJSON(text) {
            let cleanText = text.trim();
            // 去除 markdown 標籤
            if (cleanText.startsWith("```json")) {
                cleanText = cleanText.substring(7);
            } else if (cleanText.startsWith("```")) {
                cleanText = cleanText.substring(3);
            }
            if (cleanText.endsWith("```")) {
                cleanText = cleanText.substring(0, cleanText.length - 3);
            }
            return JSON.parse(cleanText.trim());
        }

        // 調用 DeepSeek API 獲取單個單詞聯想
        async function fetchWordAnalysis(word) {
            const systemPrompt = `你是一個極具創意的英語與粵語雙語記憶大師。
你的任務是為用戶輸入的「英文單詞」生成一個方便粵語使用者（廣東話）速記的「粵語諧音故事記憶法」。

請輸出精確的 JSON 數據結構，切勿包含任何額外的解釋性文字。
JSON 結構必須為以下對象格式：
{
  "word": "英文單詞",
  "phonetic": "音標 (美音或英音，如: /əˈbændən/)",
  "translation": "中文繁體意思 (例如：動詞 v. 放棄、遺棄)",
  "cantonese_homophone": "粵語諧音 (用廣東話字詞拼湊出最接近該英文單詞發音的字)",
  "cantonese_pron": "諧音字的粵語拼音或讀音標註 (例如：aa1 ban1 dan1)",
  "memory_story": "故事性圖像畫面聯想記憶法：結合該英文單詞的【中文意思】與【粵語諧音】，編造一個非常荒謬、搞笑、有強烈畫面感的「廣東話」記憶小故事。字數控制在 60-120 字內。用詞請使用道地的粵語口語（例如：唔、喺、佢、咗、好似、一陣間等）。"
}`;

            const userPrompt = `請分析英文單詞: "${word}"`;

            // DeepSeek API 標準請求體
            const requestBody = {
                model: API_CONFIG.MODEL,
                messages: [
                    { role: "system", content: systemPrompt },
                    { role: "user", content: userPrompt }
                ],
                response_format: { type: "json_object" },
                temperature: 0.7
            };

            // 直接呼叫預設好的乾淨 URL
            const response = await fetch(API_CONFIG.URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_CONFIG.KEY}`
                },
                body: JSON.stringify(requestBody)
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.error?.message || `HTTP 錯誤：${response.status}`);
            }

            const data = await response.json();
            const textResult = data.choices?.[0]?.message?.content;
            if (!textResult) {
                throw new Error('API 返回了空數據');
            }

            return cleanAndParseJSON(textResult);
        }

        // 創建加載中卡片
        function createLoadingCard(container, cardId, word) {
            const cardHtml = `
                <div id="${cardId}" class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 animate-pulse flex flex-col gap-3">
                    <div class="flex justify-between items-center">
                        <div class="h-6 bg-slate-200 rounded w-1/3"></div>
                        <div class="h-4 bg-slate-200 rounded w-1/4"></div>
                    </div>
                    <div class="h-4 bg-slate-200 rounded w-1/2"></div>
                    <div class="border-t border-dashed border-slate-100 my-1"></div>
                    <div class="h-4 bg-slate-200 rounded w-full"></div>
                    <div class="h-4 bg-slate-200 rounded w-5/6"></div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', cardHtml);
        }

        // 更新卡片內容為正式數據
        function updateCardWithData(cardId, data) {
            const card = document.getElementById(cardId);
            if (!card) return;

            card.className = "bg-white p-5 rounded-2xl shadow-sm border border-slate-100 hover:border-indigo-100 transition-all flex flex-col gap-3 relative overflow-hidden group";
            card.innerHTML = `
                <!-- Accent Tag -->
                <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-gradient-to-b from-indigo-500 to-purple-500"></div>
                
                <div class="pl-2">
                    <div class="flex flex-wrap justify-between items-baseline gap-2">
                        <div class="flex items-baseline gap-2">
                            <span class="text-xl font-extrabold text-slate-800 tracking-wide">${data.word}</span>
                            <span class="text-xs text-slate-400 font-mono">${data.phonetic}</span>
                        </div>
                        <span class="text-xs bg-indigo-50 text-indigo-700 px-2 py-0.5 rounded-full font-bold">${data.translation.split(' ')[0] || '意思'}</span>
                    </div>

                    <div class="mt-1 text-sm font-medium text-slate-600">
                        解釋：<span class="text-slate-800 font-semibold">${data.translation}</span>
                    </div>

                    <div class="mt-3 flex items-center gap-2 bg-yellow-50/70 border border-yellow-100 rounded-xl p-3">
                        <div class="bg-yellow-400 text-slate-900 rounded-lg p-1 px-2 font-black text-sm tracking-widest shrink-0">
                            粵音諧音：${data.cantonese_homophone}
                        </div>
                        <div class="text-xs font-mono text-amber-700 italic">
                            [ ${data.cantonese_pron} ]
                        </div>
                    </div>

                    <div class="mt-3">
                        <div class="text-xs text-slate-400 font-semibold mb-1 flex items-center gap-1">
                            <i data-lucide="image" class="w-3.5 h-3.5 text-indigo-400"></i>
                            圖像故事記憶法
                        </div>
                        <p class="text-sm text-slate-700 leading-relaxed bg-slate-50 p-3 rounded-xl border border-slate-100">
                            ${data.memory_story}
                        </p>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // 卡片渲染錯誤狀態
        function updateCardWithError(cardId, word, errorMsg) {
            const card = document.getElementById(cardId);
            if (!card) return;

            card.className = "bg-red-50 p-5 rounded-2xl border border-red-200 flex flex-col gap-2";
            card.innerHTML = `
                <div class="flex items-center gap-2 text-red-700">
                    <i data-lucide="alert-triangle" class="w-5 h-5"></i>
                    <span class="font-bold text-base">${word} - 生成失敗</span>
                </div>
                <p class="text-xs text-red-500">${errorMsg}，請檢查您的網路環境或稍後重試。</p>
            `;
            lucide.createIcons();
        }

        // 輔助函數：執行文本複製到剪貼簿 (高相容性做法)
        function copyToClipboard(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed'; // 避免頁面滾動
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast('📋 已複製到剪貼簿！');
            } catch (err) {
                showToast('❌ 複製失敗，請手動複製。');
            }
            document.body.removeChild(textarea);
        }

        // 導出/複製為 CSV
        function exportCSV() {
            if (analysisResults.length === 0) return;

            // 定義 CSV 標頭
            const headers = ['單詞', '音標', '中文翻譯', '粵語諧音', '粵語拼音', '圖像聯想記憶法故事'];
            
            // 將內容包裝在引號中並處理轉義
            const escapeCSV = (str) => {
                if (!str) return '""';
                return `"${str.replace(/"/g, '""').replace(/\n/g, ' ')}"`;
            };

            const rows = analysisResults.map(item => [
                escapeCSV(item.word),
                escapeCSV(item.phonetic),
                escapeCSV(item.translation),
                escapeCSV(item.cantonese_homophone),
                escapeCSV(item.cantonese_pron),
                escapeCSV(item.memory_story)
            ]);

            // UTF-8 BOM 避免亂碼
            const csvContent = "\ufeff" + [headers.join(','), ...rows.map(e => e.join(','))].join('\n');
            copyToClipboard(csvContent);
        }

        // 導出/複製為純文字 (更符合人類閱讀排版)
        function exportText() {
            if (analysisResults.length === 0) return;

            let textContent = `===== 粵語諧音英語單詞記憶清單 =====\n\n`;
            
            analysisResults.forEach((item, index) => {
                textContent += `${index + 1}. 【${item.word}】 [${item.phonetic}]\n`;
                textContent += `   意思：${item.translation}\n`;
                textContent += `   粵音：${item.cantonese_homophone} (${item.cantonese_pron})\n`;
                textContent += `   記憶法：${item.memory_story}\n`;
                textContent += `--------------------------------------------------\n`;
            });

            copyToClipboard(textContent);
        }
    </script>
</body>
</html>
