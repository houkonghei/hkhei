// --- 初始化 Speech Recognition ---
if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'zh-HK'; // 設定為粵語辨識
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = function() {
        isListening = true;
        document.getElementById('mic-btn').classList.add('mic-active');
        document.getElementById('mic-btn').classList.replace('bg-red-100', 'bg-red-500');
        document.getElementById('mic-btn').classList.replace('text-red-500', 'text-white');
        document.getElementById('mic-status-container').classList.remove('hidden');
        document.getElementById('mic-status-container').classList.add('flex');
    };

    recognition.onresult = function(event) {
        const transcript = event.results[0][0].transcript;
        document.getElementById('answer-input').value = transcript.replace(/[。，！？]/g, '');
        // 移除自動送出的代碼，讓用戶自己按「送出答案」
    };

    recognition.onerror = function(event) {
        console.error("Speech recognition error", event.error);
        isListening = false;
        stopMicVisuals();
    };

    recognition.onend = function() {
        isListening = false;
        stopMicVisuals();
    };
} else {
    // 瀏覽器不支援
    window.onload = () => {
        const micBtn = document.getElementById('mic-btn');
        if(micBtn) micBtn.style.display = 'none';
    };
}

function toggleMic() {
    if (!recognition) {
        alert("抱歉，您的瀏覽器不支援語音辨識，請使用文字輸入。");
        return;
    }
    
    if (isListening) {
        recognition.stop();
    } else {
        try {
            recognition.start();
            startAudioVisualizer();
            startCountdown();
        } catch (e) {
            console.warn("語音辨識已在運行中:", e);
        }
    }
}

function stopMicVisuals() {
    isListening = false;
    document.getElementById('mic-btn').classList.remove('mic-active');
    document.getElementById('mic-btn').classList.replace('bg-red-500', 'bg-red-100');
    document.getElementById('mic-btn').classList.replace('text-white', 'text-red-500');
    document.getElementById('mic-status-container').classList.add('hidden');
    document.getElementById('mic-status-container').classList.remove('flex');
    
    // 清除特效與計時器
    clearInterval(recCountdown);
    if (animationId) cancelAnimationFrame(animationId);
    if (audioStream) {
        audioStream.getTracks().forEach(track => track.stop());
        audioStream = null;
    }
}

// --- 錄音視覺特效與倒數功能 ---
async function startAudioVisualizer() {
    try {
        audioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        if (!audioCtxVisual) {
            audioCtxVisual = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtxVisual.state === 'suspended') {
            audioCtxVisual.resume();
        }
        analyser = audioCtxVisual.createAnalyser();
        const source = audioCtxVisual.createMediaStreamSource(audioStream);
        source.connect(analyser);
        analyser.fftSize = 64; // 取樣數量，越小柱子越粗
        analyser.smoothingTimeConstant = 0.5; // 降低平滑度，讓跳動反應更敏銳
        drawVisualizer();
    } catch (err) {
        console.warn("無法存取麥克風進行聲波顯示: ", err);
    }
}

function drawVisualizer() {
    if (!analyser || !isListening) return;
    const canvas = document.getElementById('audio-visualizer');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);
    
    analyser.getByteFrequencyData(dataArray);
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const barWidth = (canvas.width / bufferLength) * 2.5;
    let barHeight;
    let x = 0;
    
    for (let i = 0; i < bufferLength; i++) {
        // 將數值放大 2 倍，讓說話大小聲的視覺反饋更明顯
        let amplified = dataArray[i] * 2.0;
        if (amplified > 255) amplified = 255;
        
        barHeight = (amplified / 255) * canvas.height;
        // 確保至少有 2px 的高度，安靜時也有基礎波紋
        if (barHeight < 2) barHeight = 2;

        ctx.fillStyle = `rgb(239, 68, 68)`; // 對應 Tailwind 的 red-500
        // 將柱狀圖置中畫出 (由中間向上下延伸)
        const y = (canvas.height - barHeight) / 2;
        ctx.fillRect(x, y, barWidth - 1, barHeight);
        x += barWidth;
    }
    animationId = requestAnimationFrame(drawVisualizer);
}

function startCountdown() {
    let timeLeft = 60; // 6秒 (每100毫秒扣減一次，共60次)
    const bar = document.getElementById('countdown-bar');
    const text = document.getElementById('countdown-text');
    
    bar.style.width = '100%';
    text.innerText = `(6s)`;
    
    clearInterval(recCountdown);
    recCountdown = setInterval(() => {
        timeLeft--;
        bar.style.width = `${(timeLeft / 60) * 100}%`;
        text.innerText = `(${Math.ceil(timeLeft / 10)}s)`;
        
        if (timeLeft <= 0) {
            clearInterval(recCountdown);
            if (isListening && recognition) {
                recognition.stop(); // 倒數結束，強制停止錄音
            }
        }
    }, 100);
}

// --- 音效生成器 (Web Audio API) 無需外部資源 ---
const AudioContext = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioContext();

function playTone(freq, type, duration, vol=0.1) {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function playWinSound() {
    playTone(440, 'sine', 0.15);
    setTimeout(() => playTone(554, 'sine', 0.15), 150);
    setTimeout(() => playTone(659, 'sine', 0.15), 300);
    setTimeout(() => playTone(880, 'sine', 0.4), 450);
}

function playLoseSound() {
    playTone(300, 'sawtooth', 0.3);
    setTimeout(() => playTone(250, 'sawtooth', 0.5), 250);
}

function playClueSound() {
    playTone(600, 'sine', 0.1);
}

function playErrorSound() {
    playTone(200, 'square', 0.15);
}

// --- 語音合成 (TTS) 粵語 ---
function speakCantonese(text) {
    if (!('speechSynthesis' in window)) return;
    speechSynthesis.cancel(); 
    const utterance = new SpeechSynthesisUtterance(text);
    
    // 尋找粵語語音
    const voices = speechSynthesis.getVoices();
    const cantoneseVoice = voices.find(v => 
        v.lang === 'zh-HK' || 
        v.lang === 'yue-HK' || 
        v.name.includes('Cantonese') || 
        v.name.includes('Hong Kong') || 
        v.name.includes('HK') ||
        v.name.includes('粵語')
    );
    
    if (cantoneseVoice) {
        utterance.voice = cantoneseVoice;
    }
    utterance.lang = 'zh-HK'; 
    utterance.rate = 0.9; // 稍微放慢速度適合小朋友
    
    speechSynthesis.speak(utterance);
}

// 確保語音列表已載入
if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

function replayClue() {
    if(currentPuzzle && currentPuzzle.clues[currentClueIndex]) {
        speakCantonese(currentPuzzle.clues[currentClueIndex]);
    }
}

function startRandomGame() {
    document.getElementById('puzzle-select').value = 'random';
    startGame();
}

function startGame() {
    const selectVal = document.getElementById('puzzle-select').value;
    if (selectVal === 'random') {
        const randomIndex = Math.floor(Math.random() * puzzles.length);
        currentPuzzle = puzzles[randomIndex];
    } else {
        currentPuzzle = puzzles[parseInt(selectVal)];
    }

    currentClueIndex = 0;
    isPlaying = true;

    // UI切換
    document.getElementById('home-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    document.getElementById('end-screen').classList.add('hidden');
    
    // 清空狀態
    document.getElementById('answer-input').value = '';
    document.getElementById('clue-history').innerHTML = '';
    hideFeedback();

    updateClueDisplay();
}

function updateClueDisplay() {
    playClueSound();
    
    const clueText = currentPuzzle.clues[currentClueIndex];
    document.getElementById('clue-counter').innerText = `${currentClueIndex + 1}/10`;
    
    const clueEl = document.getElementById('current-clue');
    clueEl.textContent = clueText;
    
    // 播放粵語發音
    speakCantonese(clueText);

    // 動畫效果
    clueEl.classList.remove('bounce-in');
    void clueEl.offsetWidth; // trigger reflow
    clueEl.classList.add('bounce-in');

    // 聚焦輸入框
    setTimeout(() => {
        document.getElementById('answer-input').focus();
    }, 100);
}

function handleKeyPress(e) {
    if (e.key === 'Enter') {
        submitAnswer();
    }
}

function submitAnswer() {
    if (!isPlaying) return;

    const inputEl = document.getElementById('answer-input');
    let guess = inputEl.value.trim();
    
    // 處理使用者想不到直接留白送出的情況
    let isBlank = false;
    if (!guess) {
        isBlank = true;
        guess = "不知道";
    }

    // 清理字串進行比對
    const cleanGuess = guess.replace(/[\s。，！？]/g, '');
    const cleanAnswer = currentPuzzle.answer.replace(/[\s。，！？]/g, '');

    // 極度寬容比對邏輯：只要答案與輸入中有一個字相同就視為正確
    let isMatch = false;
    if (!isBlank) {
        for (let i = 0; i < cleanGuess.length; i++) {
            if (cleanAnswer.includes(cleanGuess[i])) {
                isMatch = true;
                break;
            }
        }
    }

    if (isMatch) {
        // 答對了
        gameWon();
    } else {
        // 答錯了
        inputEl.value = ''; // 清空輸入
        
        if (isBlank) {
            showFeedback(`想不到嗎？沒關係，看下一個提示！`, false);
        } else {
            showFeedback(`「${guess}」不對喔！`, false);
        }
        playErrorSound();

        // 加入歷史紀錄
        addHistory(currentPuzzle.clues[currentClueIndex]);

        currentClueIndex++;
        if (currentClueIndex >= 10) {
            gameLost();
        } else {
            setTimeout(() => {
                updateClueDisplay();
                hideFeedback();
            }, 1200);
        }
    }
}

function addHistory(text) {
    const historyDiv = document.getElementById('clue-history');
    const item = document.createElement('div');
    item.className = "py-1 border-b border-gray-100 last:border-0";
    item.innerHTML = `<span class="text-blue-500 font-bold mr-2">${currentClueIndex + 1}.</span> ${text}`;
    historyDiv.appendChild(item);
    // 滾動到底部
    historyDiv.scrollTop = historyDiv.scrollHeight;
}

function showFeedback(msg, isSuccess) {
    const fbEl = document.getElementById('feedback-msg');
    fbEl.textContent = msg;
    fbEl.className = `text-center font-bold text-lg p-2 rounded-xl mt-2 ${isSuccess ? 'text-green-600 bg-green-100' : 'text-red-600 bg-red-100'}`;
    fbEl.classList.remove('hidden');
    
    if(!isSuccess) {
        const gameContainer = document.getElementById('app-container');
        gameContainer.classList.add('shake');
        setTimeout(() => gameContainer.classList.remove('shake'), 500);
    }
}

function hideFeedback() {
    document.getElementById('feedback-msg').classList.add('hidden');
}

function gameWon() {
    isPlaying = false;
    if(window.speechSynthesis) speechSynthesis.cancel();
    playWinSound();
    fireConfetti();
    
    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('end-screen').classList.remove('hidden');
    
    document.getElementById('end-icon').innerHTML = '🎉🥳';
    document.getElementById('end-title').textContent = '太棒了！你答對了！';
    document.getElementById('end-title').className = "text-4xl sm:text-5xl font-black text-green-500";
    document.getElementById('end-answer').textContent = currentPuzzle.answer;
    document.getElementById('end-stats').textContent = `你只用了 ${currentClueIndex + 1} 個提示就猜到了！`;
}

function gameLost() {
    isPlaying = false;
    if(window.speechSynthesis) speechSynthesis.cancel();
    playLoseSound();

    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('end-screen').classList.remove('hidden');
    
    document.getElementById('end-icon').innerHTML = '😅💡';
    document.getElementById('end-title').textContent = '真可惜，提示用完了！';
    document.getElementById('end-title').className = "text-4xl sm:text-5xl font-black text-red-500";
    document.getElementById('end-answer').textContent = currentPuzzle.answer;
    document.getElementById('end-stats').textContent = `再挑戰一次吧！`;
}

function backToHome() {
    isPlaying = false;
    if(recognition) recognition.stop();
    if(window.speechSynthesis) speechSynthesis.cancel();
    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('end-screen').classList.add('hidden');
    document.getElementById('home-screen').classList.remove('hidden');
}

function fireConfetti() {
    var duration = 3 * 1000;
    var animationEnd = Date.now() + duration;
    var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

    function randomInRange(min, max) {
        return Math.random() * (max - min) + min;
    }

    var interval = setInterval(function() {
        var timeLeft = animationEnd - Date.now();

        if (timeLeft <= 0) {
            return clearInterval(interval);
        }

        var particleCount = 50 * (timeLeft / duration);
        confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
        confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
    }, 250);
}
</script>
