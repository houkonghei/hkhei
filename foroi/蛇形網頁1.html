<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>斜向蛇形矩陣演示</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }
        h1 {
            color: #333;
        }
        .controls {
            margin-bottom: 20px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        input[type="number"] {
            padding: 8px;
            font-size: 16px;
            width: 80px;
            margin-right: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 8px 16px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
        #matrix-container {
            display: grid;
            gap: 5px;
            margin-top: 20px;
        }
        .cell {
            width: 50px;
            height: 50px;
            background-color: #fff;
            border: 2px solid #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            color: transparent; /* 初始隱藏文字 */
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .cell.active {
            background-color: #e3f2fd;
            border-color: #2196f3;
            color: #1565c0;
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(33, 150, 243, 0.4);
        }
    </style>
</head>
<body>

    <h1>🐍 斜向蛇形矩陣演示</h1>
    
    <div class="controls">
        <label for="n-input">輸入矩陣大小 N (1~15): </label>
        <input type="number" id="n-input" value="5" min="1" max="15">
        <button onclick="startAnimation()">生成並演示</button>
    </div>

    <div id="matrix-container"></div>

    <script>
        // 這是我們剛剛推導出的核心邏輯，直接翻譯成 JavaScript
        function calculateMatrix(n) {
            let path = []; // 用來記錄每一步的座標和數字，方便做動畫
            let r = 0, c = 0;

            for (let i = 1; i <= n * n; i++) {
                path.push({ row: r, col: c, val: i });

                if ((r + c) % 2 === 1) { // 奇數：往斜右上
                    if (r === 0 && c < n - 1) {
                        c++;
                    } else if (c === n - 1) {
                        r++;
                    } else {
                        r--; c++;
                    }
                } else { // 偶數：往斜左下
                    if (c === 0 && r < n - 1) {
                        r++;
                    } else if (r === n - 1) {
                        c++;
                    } else if (i > 1) {
                        r++; c--;
                    } else {
                        r++;
                    }
                }
            }
            return path;
        }

        let animationTimeout;

        function startAnimation() {
            clearTimeout(animationTimeout); // 清除之前的動畫
            const n = parseInt(document.getElementById('n-input').value);
            if (isNaN(n) || n < 1 || n > 20) {
                alert('請輸入 1 到 20 之間的數字喔！');
                return;
            }

            const container = document.getElementById('matrix-container');
            container.innerHTML = ''; // 清空畫布
            container.style.gridTemplateColumns = `repeat(${n}, 50px)`; // 設定 CSS Grid 的欄數

            // 先建立空的格子
            const cells = [];
            for (let i = 0; i < n; i++) {
                cells[i] = [];
                for (let j = 0; j < n; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    container.appendChild(cell);
                    cells[i][j] = cell;
                }
            }

            // 取得計算好的路徑
            const path = calculateMatrix(n);
            let step = 0;

            // 動畫函數
            function animate() {
                if (step < path.length) {
                    const current = path[step];
                    const cellDOM = cells[current.row][current.col];
                    
                    cellDOM.textContent = current.val;
                    cellDOM.classList.add('active'); // 加入 CSS class 觸發變色特效

                    step++;
                    animationTimeout = setTimeout(animate, 150); // 每 150 毫秒走一步，可以修改這個數字調整速度
                }
            }

            animate(); // 啟動動畫
        }

        // 網頁載入時先自動跑一次 5x5 的演示
        window.onload = startAnimation;
    </script>

</body>
</html>
