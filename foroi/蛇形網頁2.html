<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>斜向蛇形矩陣：座標與對角線演示</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }
        h1 {
            color: #333;
        }
        .controls {
            margin-bottom: 20px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        input[type="number"] {
            padding: 8px;
            font-size: 16px;
            width: 80px;
            margin-right: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 8px 16px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
        #matrix-container {
            display: grid;
            gap: 5px;
            margin-top: 20px;
        }
        .cell {
            width: 80px;
            height: 80px;
            background-color: #fff;
            border: 2px solid #ddd;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            transition: all 0.2s ease;
            position: relative;
        }
        /* 格子內數字 (大字) */
        .cell-val {
            font-size: 24px;
            font-weight: bold;
            color: transparent; /* 初始隱藏 */
            transition: color 0.1s ease;
        }
        /* 座標 (左上角小字) */
        .cell-coord {
            position: absolute;
            top: 5px;
            left: 5px;
            font-size: 12px;
            color: #888;
        }
        /* 對角線總和 parity (右下角小字) */
        .cell-parity {
            position: absolute;
            bottom: 5px;
            right: 5px;
            font-size: 12px;
        }
        /* 偶數對角線底色 (藍色) */
        .cell.even-diagonal {
            background-color: #e3f2fd;
        }
        /* 奇數對角線底色 (黃色) */
        .cell.odd-diagonal {
            background-color: #fff9c4;
        }
        /* 動畫啟動時的 class */
        .cell.active {
            border-color: #2196f3;
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(33, 150, 243, 0.4);
        }
        .cell.active .cell-val {
            color: #1565c0;
        }
        /* 圖例 (Legend) */
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            font-size: 14px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .color-box {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

    <h1>🐍 斜向蛇形矩陣：座標與對角線演示</h1>
    
    <div class="controls">
        <label for="n-input">輸入 N (1~10): </label>
        <input type="number" id="n-input" value="5" min="1" max="10">
        <button onclick="startAnimation()">生成並演示</button>
        <div class="legend">
            <div class="legend-item">
                <div class="color-box even-diagonal"></div>
                <span>對角線偶數 (S: Even)</span>
            </div>
            <div class="legend-item">
                <div class="color-box odd-diagonal"></div>
                <span>對角線奇數 (S: Odd)</span>
            </div>
        </div>
    </div>

    <div id="matrix-container"></div>

    <script>
        function calculateMatrix(n) {
            let path = [];
            let r = 0, c = 0;

            for (let i = 1; i <= n * n; i++) {
                path.push({ row: r, col: c, val: i });

                if ((r + c) % 2 === 1) { // 奇數：往斜右上
                    if (r === 0 && c < n - 1) {
                        c++;
                    } else if (c === n - 1) {
                        r++;
                    } else {
                        r--; c++;
                    }
                } else { // 偶數：往斜左下
                    if (c === 0 && r < n - 1) {
                        r++;
                    } else if (r === n - 1) {
                        c++;
                    } else if (i > 1) {
                        r++; c--;
                    } else {
                        r++;
                    }
                }
            }
            return path;
        }

        let animationTimeout;

        function startAnimation() {
            clearTimeout(animationTimeout);
            const nInput = document.getElementById('n-input');
            let n = parseInt(nInput.value);
            if (isNaN(n) || n < 1) n = 1;
            if (n > 10) n = 10; // 限制大小，不然螢幕放不下
            nInput.value = n;

            const container = document.getElementById('matrix-container');
            container.innerHTML = '';
            container.style.gridTemplateColumns = `repeat(${n}, 80px)`; // 設定格子大小

            const cells = [];
            for (let i = 0; i < n; i++) {
                cells[i] = [];
                for (let j = 0; j < n; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';

                    // 加入座標 (r, c)
                    const coordSpan = document.createElement('span');
                    coordSpan.className = 'cell-coord';
                    coordSpan.textContent = `(${i}, ${j})`;
                    cell.appendChild(coordSpan);

                    // 加入數字的容器
                    const valSpan = document.createElement('span');
                    valSpan.className = 'cell-val';
                    cell.appendChild(valSpan);

                    // 判斷對角線奇偶數並上色
                    if ((i + j) % 2 === 0) {
                        cell.classList.add('even-diagonal');
                        // 加入對角線 parity 標記
                        const paritySpan = document.createElement('span');
                        paritySpan.className = 'cell-parity';
                        paritySpan.textContent = `S: Even`;
                        cell.appendChild(paritySpan);
                    } else {
                        cell.classList.add('odd-diagonal');
                        const paritySpan = document.createElement('span');
                        paritySpan.className = 'cell-parity';
                        paritySpan.textContent = `S: Odd`;
                        cell.appendChild(paritySpan);
                    }

                    container.appendChild(cell);
                    cells[i][j] = cell;
                }
            }

            const path = calculateMatrix(n);
            let step = 0;

            function animate() {
                if (step < path.length) {
                    const current = path[step];
                    const cellDOM = cells[current.row][current.col];
                    const valSpanDOM = cellDOM.querySelector('.cell-val');
                    
                    valSpanDOM.textContent = current.val;
                    cellDOM.classList.add('active');

                    step++;
                    animationTimeout = setTimeout(animate, 150);
                }
            }

            animate();
        }

        window.onload = startAnimation;
    </script>

</body>
</html>
