<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>勇者之塔 - 登頂挑戰</title>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 React 與 Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 載入 html2canvas 用於截圖功能 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- 引入 opencc-js 進行精準繁簡轉換 (支援港澳異體字) -->
    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        
        @keyframes hero-bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-5px) scale(1.1); }
        }
        .animate-hero { animation: hero-bounce 1s infinite ease-in-out; }

        @keyframes celebrate-bg {
            0%, 100% { background-color: #0f172a; }
            50% { background-color: #1e1b4b; }
        }
        .animate-victory { animation: celebrate-bg 2s infinite ease-in-out; }

        @keyframes reward-pop {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-reward { animation: reward-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.2s infinite; }

        /* 🌟 全域禁止反白選取文字，但保留輸入框與文字區塊的操作功能 🌟 */
        body { user-select: none; -webkit-user-select: none; }
        input, textarea, select { user-select: auto; -webkit-user-select: auto; }
    </style>
</head>
<body class="bg-slate-950">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        const shuffleArray = (array) => {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        };

        const generateDailyCode = () => {
            const now = new Date();
            return now.getFullYear() * (now.getMonth() + 1) * now.getDate();
        };

        const parseCSV = (text) => {
            const result = [];
            let row = [];
            let col = '';
            let inQuotes = false;
            
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];
                
                if (inQuotes) {
                    if (char === '"' && nextChar === '"') {
                        col += '"'; 
                        i++; 
                    } else if (char === '"') {
                        inQuotes = false;
                    } else {
                        col += char;
                    }
                } else {
                    if (char === '"') {
                        inQuotes = true;
                    } else if (char === ',') {
                        row.push(col);
                        col = '';
                    } else if (char === '\r' || char === '\n') {
                        if (char === '\r' && nextChar === '\n') i++;
                        row.push(col);
                        if (row.some(f => f.trim() !== '')) result.push(row);
                        row = [];
                        col = '';
                    } else {
                        col += char;
                    }
                }
            }
            if (col !== '' || row.length > 0) {
                row.push(col);
                if (row.some(f => f.trim() !== '')) result.push(row);
            }
            return result;
        };

        const decodeBase64Data = (base64String) => {
            try {
                const cleanBase64 = base64String.replace(/\s/g, '');
                const binaryString = atob(cleanBase64);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                
                try {
                    const utf8Decoder = new TextDecoder('utf-8', { fatal: true });
                    return utf8Decoder.decode(bytes);
                } catch (utf8Error) {
                    return new TextDecoder('big5').decode(bytes);
                }
            } catch (e) { 
                return null; 
            }
        };

        function App() {
            // =========================================================================
            // 🌟 老師設定區 🌟
            // =========================================================================
            const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxUnCVvOKbWEniRP3n8gqtAFWW7P5hKUe9huBRJAT-KLZjPJdWcHyekXfHF8hXoeNlj/exec"; 
            const DEFAULT_DAT_FILE = ""; 
            
            const [gameState, setGameState] = useState('intro');
            const [studentClass, setStudentClass] = useState(''); 
            const [playerName, setPlayerName] = useState(''); 
            const [level, setLevel] = useState(1);
            const [questions, setQuestions] = useState([]);
            const [statusMsg, setStatusMsg] = useState({ text: '', isError: false });
            const [victoryCode, setVictoryCode] = useState(generateDailyCode());
            const [userAnswer, setUserAnswer] = useState('');
            const [hideOptions, setHideOptions] = useState(false); 
            const [isAutoLoaded, setIsAutoLoaded] = useState(false);
            
            // 🌟 新增：記錄測驗的檔案名稱
            const [testdate, setTestdate] = useState('未載入題庫');
            
            const [formLocked, setFormLocked] = useState(false);
            
            // 抓取學生 IP
            const [clientIp, setClientIp] = useState("獲取中...");

            const hasSubmittedScoreRef = useRef(false);
            // 🌟 更新：將 testdate 加入到遊戲進度 Ref 中
            const gameDataRef = useRef({ studentClass: '', playerName: '', level: 1, clientIp: '', testdate: '未載入題庫' });
            
            const [feedback, setFeedback] = useState({ 
                show: false, type: '', correctAns: '', countdown: 8, isTimeout: false, learningMode: false, canProceed: true 
            });
            const [showReward, setShowReward] = useState({ show: false, type: '' });
            
            const [hintCount, setHintCount] = useState(1);
            const [reviveCount, setReviveCount] = useState(1);
            const [jetpackCount, setJetpackCount] = useState(0);
            
            const [gameTimer, setGameTimer] = useState(30); 
            const [hintActive, setHintActive] = useState({ show: false, countdown: 8 });

            const [wordInput, setWordInput] = useState('');

            const answerInputRef = useRef(null);
            const fileInputRef = useRef(null);
            const timerRef = useRef(null);
            const floorContainerRef = useRef(null);
            const globalTimerRef = useRef(null);
            const feedbackOpenTime = useRef(0);

            // 啟動時自動抓取 IP
            useEffect(() => {
                fetch("https://api.ipify.org?format=json")
                    .then(res => res.json())
                    .then(data => {
                        setClientIp(data.ip);
                    })
                    .catch(() => {
                        setClientIp("未知IP");
                    });
            }, []);

            // 隨時更新最新的遊戲進度 Ref
            useEffect(() => {
                gameDataRef.current = { studentClass, playerName, level, clientIp, testdate };
            }, [studentClass, playerName, level, clientIp, testdate]);

            // 全域防作弊攔截
            useEffect(() => {
                const preventDefaultAction = (e) => e.preventDefault();
                const preventCopyShortcut = (e) => {
                    if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'C')) {
                        e.preventDefault();
                    }
                };

                document.addEventListener('contextmenu', preventDefaultAction); 
                document.addEventListener('copy', preventDefaultAction);        
                document.addEventListener('keydown', preventCopyShortcut);      

                return () => {
                    document.removeEventListener('contextmenu', preventDefaultAction);
                    document.removeEventListener('copy', preventDefaultAction);
                    document.removeEventListener('keydown', preventCopyShortcut);
                };
            }, []);

            // 自動載入預設題庫
            useEffect(() => {
                if (DEFAULT_DAT_FILE && DEFAULT_DAT_FILE.trim() !== "") {
                    setStatusMsg({ text: `⏳ 嘗試自動載入題庫: ${DEFAULT_DAT_FILE}...`, isError: false });
                    
                    const cacheBusterUrl = `${DEFAULT_DAT_FILE}?v=${new Date().getTime()}`;
                    
                    fetch(cacheBusterUrl)
                        .then(response => {
                            if (!response.ok) throw new Error('找不到檔案');
                            return response.text();
                        })
                        .then(content => {
                            if (DEFAULT_DAT_FILE.toLowerCase().endsWith('.dat')) {
                                const decoded = decodeBase64Data(content);
                                if (!decoded) throw new Error('DAT 解碼失敗');
                                content = decoded;
                            }
                            const allRows = parseCSV(content);
                            const qs = shuffleArray(allRows.slice(1).map((r, i) => ({
                                question: (r[0] || '').replace(/\\n/g, '\n'),
                                answer: (r[1] || '').trim(),
                                optA: (r[2] || '').trim(), optB: (r[3] || '').trim(), optC: (r[4] || '').trim(), optD: (r[5] || '').trim(),
                            }))).filter(q => q.question && q.answer).map((q, i) => ({ ...q, level: i + 1 }));

                            if (qs.length === 0) throw new Error('無效題庫格式');
                            
                            setQuestions(qs);
                            setIsAutoLoaded(true);
                            // 🌟 提取無附檔名的檔名作為 testdate
                            const fileNameWithoutExt = DEFAULT_DAT_FILE.split('/').pop().replace(/\.[^/.]+$/, "");
                            setTestdate(fileNameWithoutExt);
                            setStatusMsg({ text: `✅ 已自動載入題庫！共 ${qs.length} 題，請直接輸入資料開始。`, isError: false });
                        })
                        .catch(err => {
                            console.warn("自動載入失敗：", err);
                            setStatusMsg({ text: `找不到或無法讀取預設題庫 (${DEFAULT_DAT_FILE})，請手動載入。`, isError: true });
                        });
                }
            }, []);

            const dotPlaceholder = useMemo(() => {
                const currentQ = questions[level - 1];
                if (!currentQ || !currentQ.answer) return "..";
                return currentQ.answer.replace(/[^\s]/g, '.');
            }, [level, questions]);

            // 🌟 更新傳送邏輯：加入 testdate 欄位
            const sendScoreToGoogleSheet = useCallback((className, name, finalLevel, status, isExit = false) => {
                if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.trim() === "") return;
                
                if (!isExit) {
                    hasSubmittedScoreRef.current = true;
                }

                const payload = {
                    timestamp: new Date().toLocaleString('zh-TW', { hour12: false }),
                    className: className.trim() || "未分類", 
                    name: name.trim(),
                    level: finalLevel,
                    status: status,
                    ip: gameDataRef.current.clientIp,
                    testdate: gameDataRef.current.testdate // 加入題庫檔名
                };

                if (isExit && navigator.sendBeacon) {
                    const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
                    navigator.sendBeacon(GOOGLE_SCRIPT_URL, blob);
                } else {
                    fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        keepalive: isExit,
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload)
                    }).catch(err => console.error("雲端傳送失敗", err));
                }
            }, []);

            // 防中途跳出監聽器
            useEffect(() => {
                const handleBeforeUnload = (e) => {
                    const { studentClass, playerName, level } = gameDataRef.current;
                    if (playerName && !hasSubmittedScoreRef.current) {
                        sendScoreToGoogleSheet(studentClass, playerName, level, '⚠️ 中途跳出', true);
                        e.preventDefault();
                        e.returnValue = '尚未提交最終成績，確定要離開嗎？';
                        return '尚未提交最終成績，確定要離開嗎？';
                    }
                };
                window.addEventListener('beforeunload', handleBeforeUnload);
                return () => window.removeEventListener('beforeunload', handleBeforeUnload);
            }, [sendScoreToGoogleSheet]);

            useEffect(() => {
                if (gameState === 'playing' && floorContainerRef.current) {
                    const currentFloor = floorContainerRef.current.querySelector('.current-floor');
                    if (currentFloor) currentFloor.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, [level, gameState]);

            const playSound = (type) => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    if (type === 'success') {
                        osc.frequency.setValueAtTime(523.25, ctx.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(1046.50, ctx.currentTime + 0.4);
                        gain.gain.setValueAtTime(0.05, ctx.currentTime);
                    } else if (type === 'item' || type === 'reward') {
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(440, ctx.currentTime);
                        osc.frequency.linearRampToValueAtTime(880, ctx.currentTime + 0.1);
                        osc.frequency.linearRampToValueAtTime(1320, ctx.currentTime + 0.2);
                        gain.gain.setValueAtTime(0.05, ctx.currentTime);
                    } else if (type === 'jet') {
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(100, ctx.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.5);
                        gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    } else if (type === 'error') {
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(150, ctx.currentTime);
                        gain.gain.setValueAtTime(0.05, ctx.currentTime);
                    } else if (type === 'victory') {
                        const notes = [523.25, 659.25, 783.99, 1046.50, 783.99, 1046.50, 1318.51];
                        notes.forEach((freq, index) => {
                            const o = ctx.createOscillator();
                            const g = ctx.createGain();
                            o.type = 'triangle'; o.connect(g); g.connect(ctx.destination);
                            const startTime = ctx.currentTime + (index * 0.15);
                            o.frequency.setValueAtTime(freq, startTime);
                            g.gain.setValueAtTime(0, startTime);
                            g.gain.linearRampToValueAtTime(0.15, startTime + 0.05);
                            g.gain.exponentialRampToValueAtTime(0.01, startTime + 0.4);
                            o.start(startTime); o.stop(startTime + 0.5);
                        });
                        return;
                    }
                    osc.start(); osc.stop(ctx.currentTime + 0.4);
                } catch (e) {}
            };

            const captureScreenshot = () => {
                const target = document.body;
                window.html2canvas(target, { backgroundColor: '#020617' }).then(canvas => {
                    const fileName = `勇者之塔_挑戰成績_${studentClass}_${playerName}_${level}F.jpg`;
                    const imgData = canvas.toDataURL('image/jpeg', 0.9);
                    const link = document.createElement('a');
                    link.download = fileName;
                    link.href = imgData;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }).catch(err => {
                    console.error("截圖發生錯誤:", err);
                });
            };

            const applyNextLevelLock = (callbackFn) => {
                callbackFn();
                setFormLocked(true); 
                setTimeout(() => {
                    setFormLocked(false); 
                }, 800);
            };

            // 監聽鎖定狀態與視窗關閉，確保解鎖後立刻精準聚焦
            useEffect(() => {
                if (gameState === 'playing' && !formLocked && !feedback.show && !showReward.show && !hintActive.show) {
                    const focusTimer = setTimeout(() => {
                        if (answerInputRef.current) {
                            answerInputRef.current.focus();
                        }
                    }, 50); 
                    return () => clearTimeout(focusTimer);
                }
            }, [gameState, formLocked, feedback.show, showReward.show, hintActive.show, level]);

            const handleFeedbackClose = useCallback(() => {
                clearTimeout(timerRef.current);
                const isCorrect = feedback.type === 'success';
                const isLearning = feedback.learningMode;
                
                setFeedback({ show: false, type: '', correctAns: '', countdown: 8, isTimeout: false, learningMode: false, canProceed: true });
                setUserAnswer('');

                if (isLearning) {
                    applyNextLevelLock(() => setGameTimer(30));
                    return;
                }

                if (isCorrect) {
                    if (level >= questions.length) {
                        setGameState('won'); 
                        playSound('victory');
                        sendScoreToGoogleSheet(studentClass, playerName, level, '🏆 成功登頂');
                    } else {
                        const jetpackLevels = [17, 37, 57, 77];
                        const hintLevels = [5, 12, 24, 33, 45, 55, 68, 80, 92];
                        if (level % 15 === 0) { setShowReward({ show: true, type: 'revive' }); playSound('reward'); }
                        else if (jetpackLevels.includes(level)) { setShowReward({ show: true, type: 'jetpack' }); playSound('reward'); }
                        else if (hintLevels.includes(level)) { setShowReward({ show: true, type: 'hint' }); playSound('reward'); }
                        else { 
                            applyNextLevelLock(() => {
                                setLevel(prev => prev + 1); 
                                setGameTimer(30); 
                            });
                        }
                    }
                } else {
                    applyNextLevelLock(() => {
                        hasSubmittedScoreRef.current = false;
                        setLevel(1); setHintCount(1); setReviveCount(1); setJetpackCount(0); setGameTimer(30);
                    });
                }
                setHideOptions(false);
            }, [feedback, level, questions, playerName, studentClass, sendScoreToGoogleSheet]);

            const collectReward = useCallback(() => {
                const type = showReward.type;
                setShowReward({ show: false, type: '' });
                if (type === 'revive') setReviveCount(prev => prev + 1);
                else if (type === 'jetpack') setJetpackCount(prev => prev + 1);
                else setHintCount(prev => prev + 1);
                
                applyNextLevelLock(() => {
                    setLevel(prev => prev + 1); 
                    setGameTimer(30);
                });
            }, [showReward]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'Enter' && gameState === 'playing') {
                        if (feedback.show) {
                            e.preventDefault();
                            if (!feedback.canProceed) return; 
                            if (feedback.type === 'error' && reviveCount > 0 && !feedback.learningMode) return; 
                            handleFeedbackClose();
                        } else if (showReward.show) {
                            e.preventDefault();
                            collectReward();
                        } else if (hintActive.show) {
                            e.preventDefault();
                            setHintActive({ show: false, countdown: 8 });
                            applyNextLevelLock(() => {}); 
                        }
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [gameState, feedback, showReward, hintActive, reviveCount, handleFeedbackClose, collectReward]);

            useEffect(() => {
                if (gameState === 'playing' && !feedback.show && !showReward.show && !hintActive.show) {
                    if (gameTimer > 0) {
                        globalTimerRef.current = setTimeout(() => setGameTimer(prev => prev - 1), 1000);
                    } else {
                        playSound('error');
                        feedbackOpenTime.current = Date.now();
                        setFeedback({ show: true, type: 'error', correctAns: questions[level - 1]?.answer, countdown: 8, isTimeout: true, learningMode: false, canProceed: false });
                        
                        if (reviveCount === 0) {
                            sendScoreToGoogleSheet(studentClass, playerName, level, '⏰ 超時失敗');
                        }
                    }
                }
                return () => clearTimeout(globalTimerRef.current);
            }, [gameState, gameTimer, feedback.show, showReward.show, hintActive.show, level, questions, reviveCount, playerName, studentClass, sendScoreToGoogleSheet]);

            const useHint = () => { if (hintCount > 0 && !hintActive.show && !feedback.show && !showReward.show) { setHintCount(p => p - 1); setHintActive({ show: true, countdown: 8 }); playSound('item'); } };
            const useRevive = () => { if (reviveCount > 0) { setReviveCount(p => p - 1); setFeedback(p => ({ ...p, learningMode: true, countdown: 8, canProceed: false })); } };
            const useJetpack = () => {
                if (jetpackCount <= 0 || hintActive.show || feedback.show || showReward.show) return;
                setJetpackCount(prev => prev - 1);
                playSound('jet');
                feedbackOpenTime.current = Date.now();
                setFeedback({ show: true, type: 'success', correctAns: questions[level - 1].answer, countdown: 3, isTimeout: false, learningMode: false, canProceed: false });
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                // 🌟 記錄手動上傳的檔案名稱 (去除副檔名)
                const fileNameWithoutExt = file.name.replace(/\.[^/.]+$/, "");
                setTestdate(fileNameWithoutExt);

                const reader = new FileReader();
                reader.onload = (event) => {
                    let content = event.target.result;
                    if (file.name.toLowerCase().endsWith('.dat')) {
                        const decoded = decodeBase64Data(content);
                        if (!decoded) { setStatusMsg({ text: `❌ DAT 解碼失敗`, isError: true }); return; }
                        content = decoded;
                    }
                    const allRows = parseCSV(content);
                    const qs = shuffleArray(allRows.slice(1).map((r, i) => ({
                        question: (r[0] || '').replace(/\\n/g, '\n'),
                        answer: (r[1] || '').trim(),
                        optA: (r[2] || '').trim(), 
                        optB: (r[3] || '').trim(), 
                        optC: (r[4] || '').trim(), 
                        optD: (r[5] || '').trim(),
                    }))).filter(q => q.question && q.answer).map((q, i) => ({ ...q, level: i + 1 }));

                    if (qs.length === 0) { setStatusMsg({ text: `❌ 無效題庫`, isError: true }); return; }
                    setQuestions(qs);
                    setStatusMsg({ text: `✅ 載入成功！共 ${qs.length} 題`, isError: false });
                };
                reader.readAsText(file);
                e.target.value = ''; 
            };

            const handleTextInputLoad = () => {
                if (!wordInput.trim()) { setStatusMsg({ text: `❌ 請在右側貼上題目內容`, isError: true }); return; }
                
                // 🌟 若手動貼上文字，則標記來源為「手動文字貼上」
                setTestdate("手動文字貼上");

                const lines = wordInput.split(/\r?\n/).filter(line => line.trim() !== '');
                const parsedData = lines.map(line => {
                    const parts = line.split('\t');
                    return {
                        question: (parts[0] || '').replace(/\\n/g, '\n'),
                        answer: (parts[1] || '').trim(),
                        optA: (parts[2] || '').trim(),
                        optB: (parts[3] || '').trim(),
                        optC: (parts[4] || '').trim(),
                        optD: (parts[5] || '').trim()
                    };
                }).filter(q => q.question && q.answer);

                if (parsedData.length === 0) { setStatusMsg({ text: `❌ 格式錯誤，請檢查`, isError: true }); return; }

                const qs = shuffleArray(parsedData).map((q, i) => ({ ...q, level: i + 1 }));
                setQuestions(qs);
                setStatusMsg({ text: `✅ 文字題庫載入成功！共 ${qs.length} 題`, isError: false });
            };

            const submitAnswer = (e) => {
                if (e) e.preventDefault();
                if (formLocked) return;

                let input = userAnswer.trim().toLowerCase();
                const currentQ = questions[level - 1];
                if (!currentQ || hintActive.show || feedback.show || showReward.show) return;
                
                let isCorrect = false;

                if (input === 'pass') {
                    isCorrect = true;
                } else {
                    const optionMap = { 
                        "1": "optA", "2": "optB", "3": "optC", "4": "optD",
                        "a": "optA", "b": "optB", "c": "optC", "d": "optD"
                    };
                    if (optionMap[input] && currentQ[optionMap[input]]) {
                        input = currentQ[optionMap[input]].toLowerCase();
                    }

                    const normalizeStr = (str) => {
                        let s = String(str).replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '').toLowerCase();
                        if (window.OpenCC) {
                            try {
                                if (!window.__opencc_converter) {
                                    window.__opencc_converter = window.OpenCC.Converter({ from: 'hk', to: 'cn' });
                                }
                                s = window.__opencc_converter(s);
                            } catch(err) {}
                        }
                        return s;
                    };
                    
                    isCorrect = normalizeStr(input) === normalizeStr(currentQ.answer);
                }
                
                playSound(isCorrect ? 'success' : 'error');
                feedbackOpenTime.current = Date.now();
                setFeedback({ show: true, type: isCorrect ? 'success' : 'error', correctAns: currentQ.answer, countdown: 8, isTimeout: false, learningMode: false, canProceed: false });

                if (!isCorrect && reviveCount === 0) {
                    sendScoreToGoogleSheet(studentClass, playerName, level, '💀 答錯失敗');
                }
            };

            useEffect(() => {
                if (!feedback.show) return;
                const isFinalDeath = feedback.type === 'error' && reviveCount === 0 && !feedback.learningMode;
                if (isFinalDeath) return;
                
                if (feedback.countdown > 0) {
                    timerRef.current = setTimeout(() => setFeedback(prev => ({ ...prev, countdown: prev.countdown - 1 })), 1000);
                } else if (feedback.countdown === 0) {
                    if (feedback.canProceed) handleFeedbackClose();
                }
                return () => clearTimeout(timerRef.current);
            }, [feedback.show, feedback.countdown, feedback.type, feedback.learningMode, reviveCount, feedback.canProceed, handleFeedbackClose]);

            const floorBlocks = useMemo(() => {
                const MAX_BLOCKS = 15;
                const len = questions.length;
                if (len === 0) return [];
                const bSize = Math.ceil(len / MAX_BLOCKS);
                const nBlocks = Math.ceil(len / bSize);
                const res = [];
                for (let i = 0; i < nBlocks; i++) {
                    const start = i * bSize + 1;
                    const end = Math.min((i + 1) * bSize, len);
                    res.push({ start, end, index: i });
                }
                return res;
            }, [questions]);

            if (gameState === 'intro') {
                const canStart = studentClass.trim() !== '' && playerName.trim() !== '' && questions.length > 0;
                return (
                    <div className="min-h-screen text-white flex flex-col items-center justify-center p-4 relative">
                        <div className="absolute top-4 left-4 text-xs font-mono text-slate-700">IP: {clientIp}</div>
                        <div className="max-w-xl w-full bg-slate-900 p-8 rounded-[2.5rem] border border-slate-800 shadow-2xl space-y-6 relative z-10">
                            <div className="text-center">
                                <h1 className="text-5xl font-black text-yellow-400">勇者之塔</h1>
                                <p className="text-slate-500 mt-2 font-bold uppercase tracking-widest text-[10px]">自動紀錄題庫檔名版</p>
                            </div>
                            
                            {!isAutoLoaded ? (
                                <>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-slate-800/40 p-4 rounded-3xl border border-slate-700/50">
                                            <button onClick={() => fileInputRef.current.click()} className="w-full h-full bg-slate-700 hover:bg-slate-600 py-3 rounded-xl transition font-bold text-xs">📂 上傳 CSV/DAT</button>
                                            <input type="file" accept=".csv,.dat" onChange={handleFileUpload} className="hidden" ref={fileInputRef} />
                                        </div>
                                        <div className="bg-slate-800/40 p-4 rounded-3xl border border-slate-700/50">
                                            <div className="flex gap-2 h-full">
                                                <button onClick={handleTextInputLoad} className="flex-grow bg-emerald-700 hover:bg-emerald-600 py-3 rounded-xl transition font-bold text-xs">📥 載入文字</button>
                                                <button onClick={() => setWordInput('')} className="bg-slate-700 hover:bg-slate-600 px-3 py-3 rounded-xl transition font-bold text-xs shrink-0">🗑️ 清空</button>
                                            </div>
                                        </div>
                                    </div>
                                    <textarea className="w-full bg-slate-900/60 border border-slate-700/50 rounded-2xl p-3 text-xs font-mono h-24 text-slate-300 focus:border-emerald-500 outline-none custom-scrollbar" placeholder="在此貼上 Tab 分隔的題目內容..." value={wordInput} onChange={(e) => setWordInput(e.target.value)}></textarea>
                                </>
                            ) : (
                                <div className="bg-emerald-900/30 p-6 rounded-3xl border border-emerald-700/50 flex justify-center items-center gap-4 animate-pulse">
                                    <span className="text-4xl">📄</span>
                                    <div className="text-left">
                                        <p className="text-emerald-400 font-black">題庫已自動就緒！</p>
                                        <p className="text-xs text-emerald-600 font-bold mt-1">來源：{testdate}</p>
                                    </div>
                                </div>
                            )}

                            <div className={`text-center text-[10px] font-bold ${statusMsg.isError ? 'text-red-400' : 'text-emerald-400'}`}>{statusMsg.text || "請先載入題庫，再輸入資料開始"}</div>
                            
                            <form onSubmit={(e) => { e.preventDefault(); if(canStart) setGameState('playing'); }} className="space-y-4 pt-4 border-t border-slate-800">
                                <div className="grid grid-cols-3 gap-3">
                                    <select 
                                        value={studentClass} 
                                        onChange={e => setStudentClass(e.target.value)} 
                                        className="col-span-1 px-2 py-4 bg-slate-800 border-2 border-slate-700 rounded-2xl text-center text-xl font-black text-white focus:border-yellow-500 outline-none cursor-pointer" 
                                        required
                                    >
                                        <option value="" disabled hidden>選擇班級</option>
                                        <option value="初一A">初一A</option>
                                        <option value="初一B">初一B</option>
                                        <option value="初一C">初一C</option>
                                        <option value="高一A">高一A</option>
                                        <option value="高一B">高一B</option>
                                        <option value="高一C">高一C</option>
                                    </select>
                                    <input type="text" value={playerName} onChange={e => setPlayerName(e.target.value)} className="col-span-2 px-4 py-4 bg-slate-800 border-2 border-slate-700 rounded-2xl text-center text-xl font-black focus:border-yellow-500 outline-none" placeholder="輸入姓名" required />
                                </div>
                                <button type="submit" disabled={!canStart} className={`w-full font-black py-5 rounded-2xl transition text-2xl shadow-xl ${!canStart ? 'bg-slate-800 text-slate-600' : 'bg-yellow-500 text-slate-950 hover:bg-yellow-400'}`}>開始挑戰</button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (gameState === 'won') {
                return (
                    <div className="min-h-screen animate-victory text-white flex flex-col items-center justify-center p-4 text-center">
                        <div className="text-9xl mb-4 animate-bounce">🏆</div>
                        <h1 className="text-6xl font-black text-yellow-400">傳說誕生！</h1>
                        <p className="text-2xl mt-4">[{studentClass}] {playerName} 已登頂！</p>
                        <div className="mt-8 bg-white p-8 rounded-3xl text-slate-950 font-black text-7xl font-mono">{victoryCode}</div>
                        <div className="mt-8 flex gap-4 justify-center">
                            <button onClick={captureScreenshot} className="bg-blue-500 hover:bg-blue-400 py-5 px-12 rounded-2xl text-xl text-white font-black shadow-xl active:scale-95 transition-all">📸 儲存截圖</button>
                            <button onClick={() => location.reload()} className="bg-yellow-500 hover:bg-yellow-400 py-5 px-12 rounded-2xl text-xl text-slate-950 font-black shadow-xl active:scale-95 transition-all">返回首頁</button>
                        </div>
                    </div>
                );
            }

            const currentAnswer = questions[level-1]?.answer || "";
            const getAdaptiveFontSize = (text) => {
                const len = text.length;
                if (len <= 10) return "text-4xl md:text-6xl";
                if (len <= 25) return "text-2xl md:text-4xl";
                return "text-lg md:text-2xl";
            };

            const isFinalDeath = feedback.type === 'error' && reviveCount === 0 && !feedback.learningMode;

            return (
                <div className="min-h-screen flex flex-col p-4 bg-slate-950 text-slate-200">
                    <div className="w-full max-w-7xl mx-auto flex justify-between items-center mb-4 shrink-0">
                        <button onClick={() => location.reload()} className="text-slate-600 font-bold hover:text-white transition">放棄</button>
                        <div className="flex gap-3 items-center">
                            <div className="flex gap-2">
                                <div className={`bg-slate-900 px-3 py-1.5 rounded-xl border flex items-center gap-2 ${hintCount > 0 ? 'border-yellow-500' : 'border-slate-800 opacity-40'}`}>
                                    <span className="text-lg">😇</span><span className="text-yellow-500 font-black text-xs">{hintCount}</span>
                                    {hintCount > 0 && <button type="button" onClick={useHint} className="ml-1 bg-yellow-500 hover:bg-yellow-400 text-slate-950 px-2 py-0.5 rounded text-[10px] font-black transition-all active:scale-95">用</button>}
                                </div>
                                <div className={`bg-slate-900 px-3 py-1.5 rounded-xl border flex items-center gap-2 ${jetpackCount > 0 ? 'border-cyan-400' : 'border-slate-800 opacity-40'}`}>
                                    <span className="text-lg">🚀</span><span className="text-cyan-400 font-black text-xs">{jetpackCount}</span>
                                    {jetpackCount > 0 && <button type="button" onClick={useJetpack} className="ml-1 bg-cyan-500 hover:bg-cyan-400 text-white px-2 py-0.5 rounded text-[10px] font-black transition-all active:scale-95">跳</button>}
                                </div>
                                <div className={`bg-slate-900 px-3 py-1.5 rounded-xl border flex items-center gap-2 ${reviveCount > 0 ? 'border-orange-500' : 'border-slate-800 opacity-40'}`}>
                                    <span className="text-lg">🏅</span><span className="text-orange-500 font-black text-xs">{reviveCount}</span>
                                </div>
                            </div>
                            <div className="bg-slate-900 px-6 py-2 rounded-xl border border-slate-800 text-sm">
                                <span className="text-slate-500 mr-4 font-bold">英雄：[{studentClass}] {playerName}</span>
                                <span>F <span className="text-yellow-500 font-black">{level}</span> / {questions.length}</span>
                            </div>
                        </div>
                    </div>

                    <div className="w-full max-w-7xl mx-auto flex-grow flex gap-6 overflow-hidden">
                        <div className="w-16 md:w-20 bg-slate-900/60 rounded-3xl p-1 flex flex-col border border-slate-800 shrink-0">
                            <div ref={floorContainerRef} className="w-full flex flex-col-reverse overflow-y-auto custom-scrollbar h-full rounded-2xl relative">
                                {floorBlocks.map((block) => {
                                    const isCurrent = level >= block.start && level <= block.end;
                                    const label = block.start === block.end ? `${block.start}F` : `${block.start}-${block.end}F`;
                                    return (
                                        <div key={block.index} className={`w-full flex-grow border-b border-white/5 flex flex-col items-center justify-center ${isCurrent ? 'bg-yellow-500/20 current-floor' : ''}`}>
                                            {isCurrent && <div className="animate-hero text-xl">👨‍🎤</div>}
                                            <span className={`text-[9px] font-black ${isCurrent ? 'text-yellow-500' : 'text-slate-700'}`}>{label}</span>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        <div className="flex-grow flex flex-col gap-4 overflow-hidden relative">
                            <div className="w-full bg-slate-900 h-5 rounded-full overflow-hidden border border-slate-800 relative">
                                <div className={`h-full transition-all duration-1000 ease-linear ${gameTimer <= 5 ? 'bg-red-500 animate-pulse' : 'bg-emerald-500'}`} style={{ width: `${(gameTimer / 30) * 100}%` }}></div>
                                <div className="absolute inset-0 flex items-center justify-center text-[10px] font-black text-white mix-blend-difference">TIME: {gameTimer}S</div>
                            </div>

                            <div className="bg-white rounded-[2.5rem] flex flex-col border border-slate-300 flex-grow overflow-hidden shadow-2xl relative">
                                <div className={`flex-grow p-8 flex flex-col justify-center items-center text-center ${gameTimer <= 5 ? 'animate-shake' : ''}`}>
                                    <div className="text-slate-800 text-3xl md:text-5xl font-black whitespace-pre-wrap leading-relaxed z-10">{questions[level-1]?.question}</div>
                                </div>
                                
                                {!hideOptions && questions[level-1]?.optA && (
                                    <div className="px-8 py-4 bg-slate-50 border-y border-slate-100 grid grid-cols-2 md:grid-cols-4 gap-4">
                                        {['optA', 'optB', 'optC', 'optD'].map((k, i) => (
                                            <div key={k} className="bg-white p-3 rounded-xl border border-slate-200 flex items-center gap-2 text-sm shadow-sm overflow-hidden">
                                                <span className="bg-slate-200 text-slate-500 px-2 rounded font-black shrink-0">{String.fromCharCode(65 + i)}</span>
                                                <span className="text-slate-600 font-bold truncate">{questions[level-1]?.[k]}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                <div className="p-8 bg-slate-900 flex items-stretch gap-6 min-h-[120px]">
                                    <button onClick={() => setHideOptions(!hideOptions)} className={`w-16 h-16 rounded-2xl flex items-center justify-center transition-all ${hideOptions ? 'bg-yellow-500 text-slate-950' : 'bg-slate-800 text-slate-500'}`}>
                                        <span className="text-3xl">{hideOptions ? '🙈' : '👁️'}</span>
                                    </button>
                                    <form onSubmit={submitAnswer} className="flex-grow flex gap-4">
                                        <input 
                                            ref={answerInputRef} 
                                            type="text" 
                                            value={userAnswer} 
                                            onChange={e => setUserAnswer(e.target.value)} 
                                            disabled={formLocked}
                                            className={`flex-grow pl-10 px-8 bg-slate-800 border-2 rounded-3xl text-4xl font-black text-white outline-none focus:border-yellow-500 transition-all tracking-widest font-mono ${formLocked ? 'border-slate-600 opacity-60 cursor-not-allowed' : 'border-slate-700'}`} 
                                            placeholder={formLocked ? "請準備..." : dotPlaceholder} 
                                            autoFocus 
                                            autoComplete="off" 
                                        />
                                        <button 
                                            type="submit" 
                                            disabled={hintActive.show || showReward.show || feedback.show || formLocked} 
                                            className={`px-12 rounded-3xl text-2xl shadow-lg border-b-4 transition-all font-black shrink-0 ${formLocked ? 'bg-slate-700 border-slate-800 text-slate-500 cursor-not-allowed' : 'bg-yellow-500 hover:bg-yellow-400 text-slate-950 border-yellow-700 active:border-b-0 active:translate-y-1'}`}
                                        >
                                            {formLocked ? '鎖定中' : '提交'}
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    {feedback.show && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/95 backdrop-blur-xl p-4">
                            <div className={`bg-white rounded-[3rem] p-10 max-w-2xl w-full text-center border-t-[16px] ${feedback.type === 'success' ? 'border-emerald-500' : 'border-red-600'}`}>
                                <div className="text-8xl mb-4">{feedback.type === 'success' ? '✨' : '💥'}</div>
                                <h3 className={`text-4xl font-black mb-6 ${feedback.type === 'success' ? 'text-emerald-600' : 'text-red-600'}`}>
                                    {feedback.type === 'success' ? '回答正確！' : (feedback.isTimeout ? '時間終了！' : '不幸答錯！')}
                                </h3>

                                {feedback.type === 'error' && (
                                    <div className="bg-slate-900 border-4 border-slate-700 py-6 px-8 rounded-3xl mb-8 flex flex-col items-center gap-2">
                                        <span className="text-slate-400 text-xl font-bold">{studentClass}</span>
                                        <div className="flex items-center gap-10">
                                            <span className="text-white text-6xl font-black">{playerName}</span>
                                            <span className="text-yellow-500 text-8xl font-black font-mono">{level}F</span>
                                        </div>
                                    </div>
                                )}

                                <div className="bg-slate-50 p-6 rounded-3xl mb-8 border-2 border-slate-100">
                                    <p className="text-slate-400 text-xs font-black mb-2">正確答案</p>
                                    <div className={`font-black text-slate-800 break-all leading-tight ${getAdaptiveFontSize(feedback.correctAns)}`}>{feedback.correctAns}</div>
                                </div>

                                <div className="flex gap-3">
                                    {feedback.type === 'error' && reviveCount > 0 && !feedback.learningMode ? (
                                        <button 
                                            onClick={useRevive} 
                                            disabled={!feedback.canProceed}
                                            className={`py-5 rounded-2xl text-2xl font-black shadow-lg transition-all ${!feedback.canProceed ? 'bg-slate-300 text-slate-500 opacity-80 cursor-not-allowed' : 'bg-orange-500 text-white animate-pulse hover:bg-orange-400'}`}
                                        >
                                            {!feedback.canProceed ? '🔒 鎖定中...' : '🏅 使用免死金牌'}
                                        </button>
                                    ) : (
                                        <>
                                            {feedback.type === 'error' && (
                                                <button onClick={captureScreenshot} className="bg-blue-500 text-white px-6 py-5 rounded-2xl text-xl font-black shadow-lg">📸 截圖</button>
                                            )}
                                            <button 
                                                onClick={handleFeedbackClose} 
                                                disabled={!feedback.canProceed}
                                                className={`flex-grow py-5 rounded-2xl text-2xl font-black shadow-lg relative overflow-hidden transition-all ${
                                                    !feedback.canProceed 
                                                        ? 'bg-slate-300 text-slate-500 cursor-not-allowed opacity-80' 
                                                        : (feedback.type === 'success' ? 'bg-yellow-500 text-slate-950 hover:bg-yellow-400' : 'bg-slate-800 text-white hover:bg-slate-700')
                                                }`}
                                            >
                                                <div className="absolute left-0 top-0 h-full bg-white/10 transition-all duration-[8000ms] ease-linear" style={{ width: (!isFinalDeath && feedback.show) ? '100%' : '0%' }}></div>
                                                <span className="relative z-10">
                                                    {!feedback.canProceed ? '🔒 鎖定中...' : (feedback.type === 'success' ? '🚀 下一層 (Enter)' : '🔄 重來 (Enter)')}
                                                    {feedback.canProceed && !isFinalDeath && ` (${feedback.countdown})`}
                                                </span>
                                            </button>
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {showReward.show && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-slate-950/90 backdrop-blur-md p-4">
                            <div className={`bg-slate-900 border-4 rounded-[3rem] p-12 max-w-md w-full text-center animate-reward ${showReward.type === 'revive' ? 'border-orange-500' : (showReward.type === 'jetpack' ? 'border-cyan-500' : 'border-yellow-500')}`}>
                                <div className="text-9xl mb-6">{showReward.type === 'revive' ? '🏅' : (showReward.type === 'jetpack' ? '🚀' : '😇')}</div>
                                <h2 className="text-4xl font-black text-white mb-8">取得新寶物！</h2>
                                <button onClick={collectReward} className="w-full bg-yellow-500 py-5 rounded-2xl text-2xl text-slate-950 font-black shadow-xl">收下寶物 (Enter)</button>
                            </div>
                        </div>
                    )}

                    {hintActive.show && (
                        <div className="fixed inset-0 z-40 flex items-center justify-center bg-slate-950/80 backdrop-blur-sm p-8">
                            <div className="bg-white rounded-[3rem] p-10 text-center shadow-2xl border-4 border-yellow-500 max-w-2xl w-full">
                                <div className="text-6xl mb-4 animate-bounce">😇</div>
                                <h4 className="text-slate-400 font-black uppercase text-xs tracking-widest mb-4">天神的神諭，請記住答案...</h4>
                                <div className="bg-amber-50 p-8 rounded-[2rem] border-2 border-amber-100/50 mb-8 overflow-hidden">
                                    <div className={`font-black text-slate-800 break-all leading-tight ${getAdaptiveFontSize(currentAnswer)}`}>{currentAnswer}</div>
                                </div>
                                <button onClick={() => setHintActive({ show: false, countdown: 8 })} className="w-full bg-yellow-500 py-4 rounded-2xl text-xl text-slate-950 font-black shadow-lg">記住了 (Enter) ({hintActive.countdown})</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
