        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #0f172a;
            color: white;
            overflow: hidden;
        }
        /* 滾動動畫效果 */
        .slot-machine {
            position: relative;
            height: 250px;
            overflow: hidden;
            background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.02) 100%);
            border: 3px solid #3b82f6;
            border-radius: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 30px rgba(59, 130, 246, 0.2);
        }
        .name-display {
            font-size: 6rem;
            font-weight: 900;
            text-shadow: 0 0 25px rgba(59, 130, 246, 0.6);
            transition: all 0.05s ease-out;
        }
        .class-card {
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
        }
        .class-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: #60a5fa;
            background: rgba(59, 130, 246, 0.2);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
        }
        .glow-text {
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(1); text-shadow: 0 0 10px rgba(255,255,255,0.5); }
            to { transform: scale(1.1); text-shadow: 0 0 30px rgba(59, 130, 246, 1); }
        }

        // 檢查並更新未保存提示的小紅點
        function updateUnsavedBadge() {
            const badge = document.getElementById('unsaved-badge');
            if (Object.keys(sessionScores).length > 0 && !hasExported) {
                badge.classList.remove('hidden');
            } else {

        // 音效開關切換
        function toggleMute() {
            isMuted = !isMuted;
            const icon = document.getElementById('mute-icon');
            icon.innerText = isMuted ? '🔇' : '🔊';
            if (!isMuted && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // 粵語 TTS 語音功能
        function speakCantonese(text) {
            if (isMuted) return; // 靜音模式下不播放
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-HK'; 
                utterance.rate = 0.9; 
                
                const voices = window.speechSynthesis.getVoices();
                const hkVoice = voices.find(voice => voice.lang === 'zh-HK' || voice.lang === 'yue-HK');
                if (hkVoice) utterance.voice = hkVoice;
                
                window.speechSynthesis.speak(utterance);
            }
        }

        // 音效引擎
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, duration, vol) {
            if (isMuted) return; // 靜音模式下不播放
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

                    colors: ['#3b82f6', '#8b5cf6', '#10b981', '#f59e0b']
                });
            }
        }

                const card = document.createElement('div');
                const count = ALL_CLASSES[name].length;
                card.className = "class-card border border-slate-700 p-8 rounded-3xl text-center shadow-sm";
                card.innerHTML = `
                    <div class="text-2xl font-black text-white mb-2">${name}</div>
                    <div class="text-blue-400/60 text-xs font-bold uppercase tracking-widest">${count} Students</div>
                `;
                card.onclick = () => selectClass(name);
                classSelectionDiv.appendChild(card);
            });
            updateUnsavedBadge(); // 初始化時檢查是否有未保存資料
        }

        function selectClass(name) {
            if (ALL_CLASSES[name].length === 0) {
                alert('此班級目前沒有名單，請先在程式碼中添加學生資料。');
                return;
            }
            currentClassName = name;
            document.getElementById('current-class-label').innerText = `正在點名: ${name}`;
            classSelectionDiv.classList.add('hidden');
            lotteryUIDiv.classList.remove('hidden');
            backBtn.classList.remove('hidden');
            displayName.innerText = "READY";
            displayName.classList.remove('glow-text');
        }

        backBtn.onclick = () => {
            currentClassName = null;
            classSelectionDiv.classList.remove('hidden');
            lotteryUIDiv.classList.add('hidden');
            backBtn.classList.add('hidden');
            if(animationId) cancelAnimationFrame(animationId);
            isSpinning = false;
        };

        function startSpin() {
            if (isSpinning || !currentClassName) return;
            if (!isMuted && audioCtx.state === 'suspended') audioCtx.resume();
            
            isSpinning = true;
            const students = ALL_CLASSES[currentClassName];
            const startTime = performance.now();
            const duration = 2500; 
            
            function update(now) {
                const elapsed = now - startTime;
                const progress = elapsed / duration;
                
                if (progress < 1) {
                    const randomIndex = Math.floor(Math.random() * students.length);
                    displayName.innerText = students[randomIndex].name;
                    
                    if (Math.random() > progress * 0.8) {
                        playSound(200 + (Math.random() * 300), 'sine', 0.1, 0.05);
                    }
                    animationId = requestAnimationFrame(update);
                } else {
                    finalize();
                }
            }
            animationId = requestAnimationFrame(update);
        }

        function finalize() {
            isSpinning = false;
            const students = ALL_CLASSES[currentClassName];
            let winnerIndex;
            
            // 核心優化：防連抽機制。如果班上大於1人，且抽中上一位，就重抽。
            do {
                winnerIndex = Math.floor(Math.random() * students.length);
            } while (students.length > 1 && students[winnerIndex].sid === lastWinnerSid);
            
            const winner = students[winnerIndex];
            lastWinnerSid = winner.sid; // 記錄本次中獎者
            
            displayName.innerText = winner.name;
            displayName.classList.add('glow-text');
            
            [523.25, 659.25, 783.99].forEach((f, i) => {
                setTimeout(() => playSound(f, 'square', 0.5, 0.05), i * 100);
            });

            setTimeout(() => showModal(winner), 500);
        }

        function showModal(winner) {
            currentWinner = winner; 
            
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modal-content');
            document.getElementById('winner-name').innerText = winner.name;
            document.getElementById('winner-sid').innerText = winner.sid;
            document.getElementById('winner-id').innerText = winner.id;
            
            const scoreBtn = document.getElementById('add-score-btn');
            scoreBtn.innerText = "答對，多加 1 分 🌟 (Space)";
            scoreBtn.disabled = false;
            scoreBtn.className = "w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-2xl text-xl shadow-[0_0_20px_rgba(16,185,129,0.3)] transition-all active:scale-95";

            modal.classList.replace('hidden', 'flex');
            setTimeout(() => {
                modalContent.classList.replace('scale-0', 'scale-100');
                fireConfetti(); // 顯示彈窗時噴發彩帶
            }, 50);

            speakCantonese(`${winner.name}同學，請回答。`);
        }

        function addScore() {
            const scoreBtn = document.getElementById('add-score-btn');
            if (!currentWinner || scoreBtn.disabled) return;
            
            const sid = currentWinner.sid;
            if (!sessionScores[sid]) {
                sessionScores[sid] = {
                    sid: currentWinner.sid,
                    id: currentWinner.id,
                    name: currentWinner.name,
                    score: 0
                };
            }
            
            sessionScores[sid].score += 1;
            hasExported = false; 
            
            // 核心優化：將紀錄寫入 LocalStorage
            localStorage.setItem('classroom_scores', JSON.stringify(sessionScores));
            updateUnsavedBadge();
            
            playSound(1000, 'sine', 0.1, 0.1);
            setTimeout(() => playSound(1500, 'sine', 0.15, 0.1), 100);

            scoreBtn.innerText = `已加分！(目前共 ${sessionScores[sid].score} 分) ✅`;
            scoreBtn.disabled = true;
            scoreBtn.className = "w-full bg-slate-800 text-emerald-400 font-bold py-4 rounded-2xl text-xl border border-emerald-500/30 cursor-not-allowed transition-all";
        }

        function showAndCopyExport() {
            const exportModal = document.getElementById('export-modal');
            const exportText = document.getElementById('export-text');
            const copyBtn = document.getElementById('copy-btn');
            
            let resultText = "";
            let count = 0;
            
            for (let sid in sessionScores) {
                const student = sessionScores[sid];
                resultText += `${student.sid}, ${student.score}, ${student.id}, ${student.name}\n`;
                count++;
            }
            
            if (count === 0) {
                resultText = "目前還沒有學生加分記錄喔！";
                copyBtn.innerText = "沒有資料可複製";
                copyBtn.className = "flex-1 bg-slate-600 text-white font-bold py-3 rounded-xl cursor-not-allowed";
            } else {
                hasExported = true; 
                updateUnsavedBadge(); // 消除紅點
                copyBtn.innerText = "✅ 已自動複製 (點此可再複製)";
                copyBtn.className = "flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl transition-all";
            }
            
            exportText.value = resultText;
            exportModal.classList.replace('hidden', 'flex'); 
            
            if (count > 0) {
                exportText.select();
                document.execCommand('copy');
                exportText.blur();
            }
        }

        function manualCopy() {
            const exportText = document.getElementById('export-text');
            if (exportText.value === "目前還沒有學生加分記錄喔！") return;
            
            exportText.select();
            document.execCommand('copy');
            document.getElementById('copy-btn').innerText = "✅ 已複製到剪貼簿！";
        }

        function closeExport() {
            document.getElementById('export-modal').classList.replace('flex', 'hidden');
        }

        // 清除本地紀錄功能
        function clearRecords() {
            if(confirm("確定要清除今天的加分紀錄嗎？清除後無法復原。建議您先確定已經複製並匯出資料。")) {
                localStorage.removeItem('classroom_scores');
                sessionScores = {};
                hasExported = true;
                updateUnsavedBadge();
                closeExport();
                alert("紀錄已成功清除，您可以開始新的課堂了！");
            }
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modal-content');
            modalContent.classList.replace('scale-100', 'scale-0');
            setTimeout(() => {
                modal.classList.replace('flex', 'hidden');
                displayName.classList.remove('glow-text');
                displayName.innerText = "NEXT?";
            }, 300);
        }

        function drawAnother() {
            closeModal();
            setTimeout(() => {
                startSpin();
            }, 350); 
        }

        document.getElementById('spin-btn').onclick = startSpin;
        
        window.addEventListener('beforeunload', function (e) {
            if (Object.keys(sessionScores).length > 0 && !hasExported) {
                const confirmationMessage = '你好像未儲存複制今天回答情況，確定要離開嗎？';
                e.returnValue = confirmationMessage; 
                return confirmationMessage;
            }
        });

        window.addEventListener('keydown', (e) => {
            const modal = document.getElementById('modal');
            const exportModal = document.getElementById('export-modal');
            
            // 如果匯出視窗開著，暫停快捷鍵功能避免誤觸
            if (!exportModal.classList.contains('hidden')) {
                if (e.key === 'Escape') closeExport();
                return;
            }

            if (e.code === 'Space') {
                e.preventDefault();
                if (!currentClassName) return;
                if (modal.classList.contains('hidden')) startSpin();
                else addScore(); 
            }
            
            if (e.key.toLowerCase() === 'x') {
                if (!modal.classList.contains('hidden')) drawAnother(); 
            }

            if (e.key === 'Escape') {
                if (!modal.classList.contains('hidden')) closeModal();
            }

            if (e.key.toLowerCase() === 'r') {
                if (currentClassName) {
                    displayName.innerText = "READY";
                    displayName.classList.remove('glow-text');
                } else {
                    location.reload();
                }
            }
        });

        initClassList();
    </script>
</body>
</html>
