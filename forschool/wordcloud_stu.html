<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課堂互動系統 - 學生端</title>
    <!-- 引入 Tailwind CSS 確保現代化與響應式外觀 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Font Awesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 💡 老師專屬：在這裡修改您的提問題目與參考解答 -->
    <script>
        const TEACHER_DATA = {
            1: { 
                q: "澳門的人口大約是多少？", 
                a: "大約 68.3 萬人（根據近年最新統計數據，介於 65 萬至 70 萬人之間均屬合理）。" 
            },
            2: { 
                q: "請寫出一個能印出 1 到 10 數字的 Python 迴圈代碼。", 
                a: "for i in range(1, 11):\n    print(i)" 
            },
            3: { 
                q: "網頁開發的三大核心技術（前端黃金三角）是什麼？", 
                a: "1. HTML（定義結構與內容）\n2. CSS（設計網頁外觀樣式）\n3. JavaScript（控制動態交互行為）" 
            },
            4: { 
                q: "在 Python 中，List（列表）的宣告方式與特點是什麼？", 
                a: "使用中括號 [] 宣告。特點是有序、可變（Mutable）、且允許存放重複的元素。" 
            },
            5: { 
                q: "澳門的官方語言是什麼？", 
                a: "根據《基本法》，澳門的官方語言是中文（繁體字）與葡萄牙文。" 
            },
            6: { 
                q: "請寫出在 Python 中定義一個名為 calculate_area 函式的語法骨架。", 
                a: "def calculate_area(width, height):\n    # 在此處編寫計算邏輯\n    return width * height" 
            },
            7: { 
                q: "請簡述什麼是 CSS Grid（網格佈局）？", 
                a: "Grid 是一種二維（網格）佈局系統，能夠同時對「行 (Rows)」與「列 (Columns)」進行強大的排版控制。" 
            },
            8: { 
                q: "在 JavaScript 中，const 與 let 宣告變數有何不同？", 
                a: "let 用於宣告可以被重新賦值的變數；const 則用於宣告唯讀的常數，一經賦值便無法修改。兩者都具有區塊作用域。" 
            },
            9: { 
                q: "請寫出 Python 讀取名為 data.txt 文字檔案的安全寫法。", 
                a: "with open('data.txt', 'r', encoding='utf-8') as f:\n    content = f.read()\n# 使用 with 語句可在讀取完畢後自動關閉檔案" 
            },
            10: { 
                q: "請簡單解釋什麼是 API（應用程式介面）？", 
                a: "API 是一組定義好的規則與協議，它扮演著橋樑的角色，允許不同的軟體或系統之間彼此進行通訊與資料交換。" 
            }
        };

        // 💡 記憶體變數：用於存放已成功被學生解鎖過的密碼。
        // 當瀏覽器分頁關閉、或重新整理網頁時，此變數將被完全清空，適合下一位學生重新使用。
        const usedPasswords = new Set();
    </script>

    <style>
        /* 漸變背景與平滑過渡效果 */
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        .card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="py-8 px-4 sm:px-6 lg:px-8">
    <div class="max-w-3xl mx-auto">
        <!-- 標頭區區塊 -->
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-gray-800 tracking-tight sm:text-4xl">
                <i class="fa-solid fa-graduation-cap text-indigo-600 mr-2"></i>課堂即時互動系統
            </h1>
            <p class="mt-2 text-sm text-gray-600">請確認您的姓名，並在對應的題號輸入老師口頭提問的答案。</p>
        </header>

        <!-- 學生基本資料卡 (動態自雲端載入) -->
        <div class="bg-white rounded-2xl shadow-xl p-6 mb-6 card">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                <div class="flex items-center space-x-3">
                    <div class="p-3 bg-indigo-100 rounded-full text-indigo-600">
                        <i class="fa-solid fa-user-graduate text-xl"></i>
                    </div>
                    <div>
                        <h2 class="text-lg font-bold text-gray-900">確認學生身分</h2>
                        <p class="text-xs text-gray-500">回答送出時會以此姓名記錄在 Excel</p>
                    </div>
                </div>
                <div class="w-full sm:w-64">
                    <!-- 💡 此下拉選單的選項將在網頁載入時，自動從試算表的「學生名冊」分頁獲取並生成 -->
                    <select id="studentName" class="block w-full rounded-lg border-gray-300 bg-gray-50 border p-3 text-gray-800 font-medium focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                        <option value="" disabled selected>-- 正在連線載入名冊... --</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 狀態提示框 (自訂 Toast 訊息) -->
        <div id="toast" class="hidden fixed bottom-5 right-5 z-50 max-w-md bg-gray-900 text-white px-4 py-3 rounded-xl shadow-2xl flex items-center space-x-3 transform translate-y-2 opacity-0 transition-all duration-300">
            <span id="toastIcon" class="text-lg"></span>
            <span id="toastMessage" class="text-sm font-medium"></span>
        </div>

        <!-- 隱藏的表單與 iframe：用於 100% 繞過 iframe 內 Fetch CORS 重新導向被瀏覽器阻擋的限制 -->
        <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>
        <form id="submit_form" method="POST" target="hidden_iframe" class="hidden">
            <input type="hidden" name="studentName" id="form_studentName">
            <input type="hidden" name="questionNum" id="form_questionNum">
            <input type="hidden" name="answer" id="form_answer">
        </form>

        <!-- 10個問題回答區 -->
        <div class="space-y-4">
            <!-- 動態生成 10 個問題輸入區 -->
            <script>
                const questionsCount = 10;
                for (let i = 1; i <= questionsCount; i++) {
                    const questionObj = TEACHER_DATA[i] || { q: `第 ${i} 題 (口頭提問)`, a: "" };
                    document.write(`
                        <div class="bg-white rounded-2xl shadow-md p-5 card border border-gray-100" id="card-${i}">
                            <div class="flex flex-col space-y-3">
                                <!-- 題號標籤與控制列 -->
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center space-x-3">
                                        <span class="flex items-center justify-center w-8 h-8 rounded-full bg-indigo-50 text-indigo-600 font-bold text-sm border border-indigo-200">
                                            Q${i}
                                        </span>
                                        <span class="font-bold text-gray-700">${questionObj.q}</span>
                                    </div>
                                    <span id="badge-${i}" class="hidden text-xs px-2 py-1 rounded bg-emerald-100 text-emerald-800 font-semibold">
                                        <i class="fa-solid fa-circle-check mr-1"></i>已成功傳送
                                    </span>
                                </div>
                                
                                <!-- 答案多行輸入框 (高度適中，支援代碼寫作) -->
                                <div class="w-full">
                                    <textarea id="ans-${i}" rows="4"
                                              class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition text-gray-800 placeholder-gray-400 font-mono text-sm leading-relaxed" 
                                              placeholder="請輸入你的解答... (支援多行文字與程式碼)"></textarea>
                                </div>
                                
                                <!-- 送出按鈕與老師參考答案解鎖區 -->
                                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 pt-2 border-t border-slate-100">
                                    
                                    <!-- 🔑 老師參考答案解密區 -->
                                    <div class="flex items-center space-x-2" id="unlock-area-${i}">
                                        <div class="relative rounded-md shadow-xs">
                                            <div class="absolute inset-y-0 left-0 pl-2.5 flex items-center pointer-events-none">
                                                <i class="fa-solid fa-key text-gray-400 text-xs"></i>
                                            </div>
                                            <input type="text" id="pass-${i}" 
                                                   class="block w-28 pl-7 pr-2 py-1.5 text-xs border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 font-mono text-center placeholder-gray-400" 
                                                   placeholder="輸入解碼密碼">
                                        </div>
                                        <button onclick="unlockAnswer(${i})" 
                                                class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 active:bg-slate-900 text-white text-xs font-bold rounded-lg shadow-sm transition">
                                            解鎖老師答案
                                        </button>
                                    </div>

                                    <!-- 答案顯示區 (預設隱藏) -->
                                    <div id="teacher-ans-box-${i}" class="hidden flex-1 bg-emerald-50 border border-emerald-200 rounded-xl p-3 text-left">
                                        <p class="text-xs font-bold text-emerald-800 mb-1">
                                            <i class="fa-solid fa-circle-check mr-1"></i>老師的參考答案：
                                        </p>
                                        <pre id="teacher-ans-text-${i}" class="text-xs text-emerald-950 font-mono whitespace-pre-wrap leading-relaxed bg-white/60 p-2.5 rounded-lg border border-emerald-100/50"></pre>
                                    </div>

                                    <!-- 送出按鈕 -->
                                    <div class="flex justify-end sm:w-auto w-full">
                                        <button onclick="submitAnswer(${i})" id="btn-${i}"
                                                class="w-full sm:w-auto inline-flex items-center justify-center px-6 py-2 border border-transparent text-sm font-semibold rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 shadow-sm transition duration-150">
                                            <i class="fa-solid fa-paper-plane mr-2" id="icon-${i}"></i>
                                            <span id="text-${i}">送答案到老師屏幕</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `);
                }
            </script>
        </div>
        
        <!-- 頁尾 -->
        <footer class="mt-12 text-center text-xs text-gray-500">
            <p>© 2026 課堂互動教學系統. 學生端版面</p>
        </footer>
    </div>

    <!-- 交互邏輯 Javascript -->
    <script>
        // 您的 Google Apps Script Web App 部署網址 (已安全地硬編碼於此)
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxyScuB1McshIxPAMHT-t54Z_i_9rADd9yr_cDzBZkUCGwNpHd2NwF01tQMm8bXnUT_/exec";

        // 頁面一載入時，立刻向後端 Google 試算表動態同步並生成最新學生名冊
        window.onload = function() {
            const select = document.getElementById('studentName');
            
            fetch(SCRIPT_URL, {
                method: 'GET',
                mode: 'cors'
            })
            .then(res => res.json())
            .then(data => {
                select.innerHTML = '<option value="" disabled selected>-- 請選擇你的姓名 --</option>';
                // 檢查是否有回傳動態名冊
                if (data._studentList && data._studentList.length > 0) {
                    data._studentList.forEach(name => {
                        const option = document.createElement('option');
                        option.value = name;
                        option.textContent = name;
                        select.appendChild(option);
                    });
                } else {
                    select.innerHTML = '<option value="" disabled selected>-- 雲端尚未設定名冊 --</option>';
                    showToast('發現試算表內無學生名冊，請在試算表中維護「學生名冊」分頁。', 'info');
                }
            })
            .catch(err => {
                console.error("名單載入失敗：", err);
                select.innerHTML = '<option value="" disabled selected>-- 載入失敗，請重新整理 --</option>';
                showToast('無法取得學生名單，請確認網路連線或 API 網址是否正確！', 'error');
            });
        };

        // 自訂通知 UI (Toast)
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const toastIcon = document.getElementById('toastIcon');

            toastMessage.textContent = message;
            
            if (type === 'success') {
                toastIcon.className = 'fa-solid fa-circle-check text-emerald-400';
            } else if (type === 'error') {
                toastIcon.className = 'fa-solid fa-circle-exclamation text-rose-400';
            } else {
                toastIcon.className = 'fa-solid fa-circle-info text-sky-400';
            }

            toast.classList.remove('hidden', 'translate-y-2', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');

            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-2', 'opacity-0');
                setTimeout(() => toast.classList.add('hidden'), 300);
            }, 4000);
        }

        // 送出答案邏輯
        function submitAnswer(questionNum) {
            const studentName = document.getElementById('studentName').value;
            const answer = document.getElementById(`ans-${questionNum}`).value.trim();

            // 檢查是否選擇姓名
            if (!studentName) {
                showToast('請在上方「確認學生身分」選擇您的姓名！', 'error');
                document.getElementById('studentName').focus();
                return;
            }

            // 檢查是否輸入答案
            if (!answer) {
                showToast(`請先輸入第 ${questionNum} 題的解答再送出！`, 'error');
                document.getElementById(`ans-${questionNum}`).focus();
                return;
            }

            // 鎖定 UI，防止重複點擊
            setButtonLoading(questionNum, true);

            // 1. 將資料填入隱藏的表單中
            const form = document.getElementById('submit_form');
            form.action = SCRIPT_URL;
            document.getElementById('form_studentName').value = studentName;
            document.getElementById('form_questionNum').value = questionNum;
            document.getElementById('form_answer').value = answer;

            try {
                // 2. 透過隱藏表單提交資料到隱藏的 iframe (完美繞過 CORS/沙盒限制)
                form.submit();

                // 3. 由於 iframe 提交是極速且不可阻擋的，直接在前端進行成功的 UI 變更反饋
                setTimeout(() => {
                    showToast(`第 ${questionNum} 題答案已成功傳送到老師屏幕！`, 'success');
                    setButtonSuccess(questionNum);
                }, 1200); // 1.2 秒的加載感，讓體驗更真實

            } catch (error) {
                console.error('Submission Error:', error);
                showToast('傳送失敗，請確認網路連線！', 'error');
                setButtonLoading(questionNum, false);
            }
        }

        // 🔑 老師參考答案解鎖邏輯 (驗證數字之和能被 11 整除，且不重複使用)
        function unlockAnswer(questionNum) {
            const passInput = document.getElementById(`pass-${questionNum}`);
            const password = passInput.value.trim();

            if (!password) {
                showToast("請先輸入解碼密碼！", "error");
                passInput.focus();
                return;
            }

            // 1. 格式檢查：密碼必須完全由數字組成
            if (!/^\d+$/.test(password)) {
                showToast("密碼格式不正確，必須全部為數字！", "error");
                passInput.value = "";
                passInput.focus();
                return;
            }

            // 2. 重複使用檢查：檢查密碼是否已被解鎖過其他題目
            if (usedPasswords.has(password)) {
                showToast("此密碼已被使用過！為維持公平，每組密碼僅能使用一次，請向老師獲取新密碼。", "error");
                passInput.value = "";
                passInput.focus();
                return;
            }

            // 3. 演算法校驗：計算所有數位之和
            let sum = 0;
            for (let i = 0; i < password.length; i++) {
                sum += parseInt(password[i], 10);
            }

            // 4. 整除校驗 (💡 已修正：改為數字和能被 11 整除且和大於 0，大幅提升破解難度)
            if (sum > 0 && sum % 11 === 0) {
                // 驗證成功！記錄密碼防止重複使用
                usedPasswords.add(password);

                // 獲取該題目的解答內容
                const qData = TEACHER_DATA[questionNum];
                const solution = qData ? qData.a : "此題無設定參考解答。";

                // UI 更新：隱藏解鎖輸入區，顯示解密後的答案
                document.getElementById(`unlock-area-${questionNum}`).classList.add("hidden");
                
                const ansBox = document.getElementById(`teacher-ans-box-${questionNum}`);
                const ansText = document.getElementById(`teacher-ans-text-${questionNum}`);
                
                ansText.textContent = solution;
                ansBox.classList.remove("hidden");

                showToast(`Q${questionNum} 參考解答已成功解密開啟！`, "success");
            } else {
                // 驗證失敗
                showToast("解碼失敗！密碼不正確，請重新確認老師所說的數字。", "error");
                passInput.value = "";
                passInput.focus();
            }
        }

        // 按鈕加載動畫切換
        function setButtonLoading(questionNum, isLoading) {
            const btn = document.getElementById(`btn-${questionNum}`);
            const icon = document.getElementById(`icon-${questionNum}`);
            const text = document.getElementById(`text-${questionNum}`);

            if (isLoading) {
                btn.disabled = true;
                btn.classList.replace('bg-indigo-600', 'bg-indigo-400');
                btn.classList.add('cursor-not-allowed');
                icon.className = 'fa-solid fa-spinner fa-spin mr-2';
                text.textContent = '傳送中...';
            } else {
                btn.disabled = false;
                btn.classList.replace('bg-indigo-400', 'bg-indigo-600');
                btn.classList.remove('cursor-not-allowed');
                icon.className = 'fa-solid fa-paper-plane mr-2';
                text.textContent = '送答案到老師屏幕';
            }
        }

        // 成功送出後的按鈕與文本框鎖定樣式
        function setButtonSuccess(questionNum) {
            const btn = document.getElementById(`btn-${questionNum}`);
            const icon = document.getElementById(`icon-${questionNum}`);
            const text = document.getElementById(`text-${questionNum}`);
            const textarea = document.getElementById(`ans-${questionNum}`);
            const badge = document.getElementById(`badge-${questionNum}`);
            const card = document.getElementById(`card-${questionNum}`);

            // 1. 鎖定按鈕為灰色且不可點擊
            btn.disabled = true;
            btn.className = "w-full sm:w-auto inline-flex items-center justify-center px-6 py-2.5 border border-transparent text-sm font-semibold rounded-lg text-white bg-gray-400 cursor-not-allowed shadow-sm transition duration-150";
            icon.className = 'fa-solid fa-check-double mr-2';
            text.textContent = '已成功送出';

            // 2. 將文本框設為唯讀，並變更背景為淡灰色，標示已完成
            textarea.readOnly = true;
            textarea.classList.add('bg-gray-50', 'text-gray-500', 'cursor-not-allowed');
            
            // 3. 顯示「已成功傳送」的小徽章
            badge.classList.remove('hidden');

            // 4. 卡片微調邊框，提供視覺上的完成感
            card.classList.add('border-emerald-200', 'bg-emerald-50/10');
        }
    </script>
</body>
</html>
