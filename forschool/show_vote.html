<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生科技作品展 - 現場投票系統</title>
    <!-- 使用 Tailwind CSS 快速生成美觀且具響應式的介面 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 SweetAlert2 用於美觀的彈出提示框 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* 科技感背景網格 */
        body {
            background-color: #0f172a;
            background-image: 
                linear-gradient(rgba(6, 182, 212, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* 隱藏捲軸但保持可滾動，增加美觀 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #06b6d4; }
        
        /* 卡片選中時的動畫過渡 */
        .team-card { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .selected-card {
            border-color: #22d3ee !important; /* Tailwind Cyan 400 */
            background-color: rgba(15, 23, 42, 0.95) !important;
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.35), inset 0 0 10px rgba(34, 211, 238, 0.1);
        }
        
        /* 螢光文字效果 */
        .neon-text {
            text-shadow: 0 0 8px rgba(34, 211, 238, 0.5);
        }
        
        /* 針對行動裝置觸控點擊的優化效果 */
        button, .team-card {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="text-slate-300 font-sans min-h-screen flex flex-col">

    <!-- 頂部導航列 -->
    <header class="bg-slate-950 border-b border-cyan-500/50 shadow-[0_0_15px_rgba(6,182,212,0.2)] text-white p-3 md:p-4 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-lg md:text-2xl font-black tracking-wider text-cyan-400 neon-text flex items-center gap-1.5">
                <span>🚀</span> 科技作品展 <span class="font-light text-slate-500">|</span> 投票系統
            </h1>
            <div id="header-status" class="hidden text-xs md:text-sm font-medium bg-slate-800 border border-cyan-500/30 px-3 py-1 rounded-full shadow-[0_0_10px_rgba(6,182,212,0.1)]">
                系統授權餘額: <span id="votes-left-display" class="text-cyan-400 font-bold text-base md:text-xl ml-1">5</span>
            </div>
        </div>
    </header>

    <!-- 頁面一：登入/密碼驗證區 -->
    <main id="page-login" class="flex-grow flex items-center justify-center p-4 transition-opacity duration-500">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl shadow-[0_0_30px_rgba(0,0,0,0.5)] p-6 md:p-8 max-w-md w-full relative overflow-hidden">
            <!-- 裝飾用光暈 -->
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-cyan-500 rounded-full mix-blend-screen filter blur-3xl opacity-20"></div>
            
            <div class="text-center mb-6 md:mb-8 relative z-10">
                <div class="inline-block p-3.5 bg-slate-900 border border-cyan-500/30 shadow-[0_0_15px_rgba(6,182,212,0.2)] rounded-full mb-4">
                    <svg class="w-10 h-10 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <h2 class="text-xl md:text-2xl font-bold text-white mb-2 tracking-widest">身分驗證程序</h2>
                <p class="text-cyan-500/70 text-xs md:text-sm">請輸入您的 6 位數存取金鑰</p>
            </div>
            
            <div class="space-y-4 md:space-y-5 relative z-10">
                <div>
                    <input type="text" id="password-input" maxlength="8" placeholder="輸入 8 位金鑰" class="w-full text-center text-xl md:text-2xl tracking-[0.4em] md:tracking-[0.5em] px-3 py-3 md:py-4 bg-slate-900 border-2 border-slate-700 rounded-xl focus:border-cyan-400 focus:ring-0 text-cyan-300 transition-all uppercase outline-none placeholder-slate-600 font-mono">
                </div>
                <button id="btn-verify" onclick="verifyPassword()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3.5 px-4 rounded-xl transition-all shadow-[0_0_15px_rgba(6,182,212,0.4)] hover:shadow-[0_0_25px_rgba(6,182,212,0.6)] flex justify-center items-center tracking-widest text-sm md:text-base">
                    <span>初始化驗證並登入</span>
                </button>
            </div>
            <div class="mt-6 md:mt-8 text-center text-[10px] md:text-xs text-slate-500 flex items-center justify-center gap-2">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                安全連線已建立 | 終端記錄啟用中
            </div>
        </div>
    </main>

    <!-- 頁面二：隊伍投票區 (預設隱藏) -->
    <main id="page-voting" class="hidden flex-grow max-w-6xl mx-auto p-4 md:p-6 w-full pb-36 md:pb-32 transition-opacity duration-500">
        <div class="mb-5 md:mb-6 bg-slate-800/80 border-l-4 border-cyan-500 p-4 rounded-r-lg shadow-[0_4px_15px_rgba(0,0,0,0.2)]">
            <div class="flex items-center gap-2 mb-1.5">
                <svg class="w-4 h-4 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <p class="font-bold text-cyan-400 text-sm md:text-base tracking-wider">操作指令：</p>
            </div>
            <p class="text-xs md:text-sm text-slate-300 leading-relaxed">您的授權額度為 <span id="instruction-max-votes" class="font-black text-cyan-400 text-sm md:text-base mx-1 neon-text"></span> 票。請點擊隊伍卡片右上角的「載入」進行分配。每票比重相同。分配完畢後請點擊下方按鈕進行最終資料庫鎖定。</p>
        </div>

        <!-- 隊伍網格：在手機端為 1 欄，平板端 2 欄，桌機端 3 欄 -->
        <div id="teams-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
            <!-- 隊伍卡片生成位置 -->
        </div>
    </main>

    <!-- 底部固定送出欄位 (頁面二顯示) -->
    <div id="bottom-submit-bar" class="hidden fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-cyan-500/20 shadow-[0_-10px_30px_rgba(0,0,0,0.5)] p-3 md:p-4 z-50 backdrop-blur-md bg-opacity-90">
        <div class="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-3">
            <div class="text-slate-300 font-medium flex items-center justify-between sm:justify-start gap-3 w-full sm:w-auto">
                <div class="bg-slate-800/80 px-3 py-1.5 md:py-2 rounded-lg border border-slate-700/80 flex items-center">
                    已授權: <span id="selected-count" class="text-cyan-400 font-bold text-xl md:text-2xl mx-1.5 neon-text">0</span> 模組
                </div>
                <div class="text-xs md:text-sm text-slate-500">
                    (剩餘額度: <span id="bottom-votes-left" class="text-cyan-400 font-bold">5</span>)
                </div>
            </div>
            <button id="btn-submit-votes" onclick="submitVotes()" disabled class="bg-slate-700 cursor-not-allowed text-slate-400 font-bold py-2.5 md:py-3 px-6 md:px-8 rounded-xl transition-all w-full sm:w-auto text-sm md:text-base tracking-widest border border-slate-600">
                鎖定資料庫並送出
            </button>
        </div>
    </div>


    <script>
        // ==========================================
        // 老師您好！請在這裡修改您的核心變數設定：
        // ==========================================

        // 1. 設置每位觀眾可以投的票數 (已升級到 5 票)
        const MAX_VOTES = 5; 

        // 2. 貼上您剛剛部署好的 Google Apps Script Web App URL
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx3MhI6axtOZv38viowTQHoI7H57ejb06ZcHsWhXufNeGyazcGFkf6lhEqAWTAPxH4oFw/exec"; 

        // 3. 隊伍資料陣列 (已完整預設 15 組模擬資料，適合手機端排版)
        const teamsData = [
            { id: 1, name: "極冷領域", project: "量子計算機散熱模組", members: "艾德華, 阿爾馮斯" },
            { id: 2, name: "未來科技先鋒", project: "AI 智能校園垃圾分類桶", members: "陳小明, 林小華" },
            { id: 3, name: "天空之眼", project: "無人機校園安全巡邏系統", members: "王大錘, 趙子龍" },
            { id: 4, name: "追光者", project: "太陽能光電跟蹤矩陣", members: "張大山, 李美麗" },
            { id: 5, name: "賽博格工坊", project: "仿生機械義肢控制系統", members: "周星, 吳孟" },
            { id: 6, name: "視界穿梭", project: "擴增實境(AR)校園導覽", members: "鄭成, 黃飛" },
            { id: 7, name: "去中心化聯盟", project: "區塊鏈學生證打卡系統", members: "郭台, 蔡英" },
            { id: 8, name: "綠能特攻", project: "智能溫室環境監測網", members: "劉德, 張學" },
            { id: 9, name: "意念驅動", project: "腦波控制輪椅原型", members: "黎明, 郭富" },
            { id: 10, name: "守護者矩陣", project: "深度學習跌倒偵測系統", members: "林青, 霞霞" },
            { id: 11, name: "智動搬運工", project: "自動避障搬運機器人", members: "彭于, 晏晏" },
            { id: 12, name: "幻影光學", project: "全息投影互動展示台", members: "金城, 武武" },
            { id: 13, name: "數據信號", project: "智慧城市交通最佳化", members: "張曼, 玉玉" },
            { id: 14, name: "分子沉浸", project: "虛擬實境(VR)化學實驗室", members: "王祖, 賢賢" },
            { id: 15, name: "永續泉源", project: "微型水力發電便攜裝置", members: "梁朝, 偉偉" }
        ];

        // ==========================================
        // 系統運作邏輯
        // ==========================================
        
        let validPassword = "";
        let selectedTeams = []; // 存放已選擇的隊伍 ID
        let deviceInfo = ""; // 存放 IP + UUID

        // 網頁載入時初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 初始化 UI 文字
            document.getElementById('instruction-max-votes').textContent = MAX_VOTES;
            updateVoteCounters();
            
            // 獲取設備識別資訊 (IP + 生成UUID)
            initDeviceTracking();
            
            // 生成隊伍列表
            renderTeams();
        });

        // 獲取 IP 並生成 UUID (替代 MAC 地址的最佳方案)
        async function initDeviceTracking() {
            // 生成一個存儲在瀏覽器的 UUID 作為設備指紋
            let uuid = localStorage.getItem('voter_uuid');
            if (!uuid) {
                uuid = crypto.randomUUID ? crypto.randomUUID() : 'uuid-' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('voter_uuid', uuid);
            }
            
            try {
                // 調用免費的 IP 查詢 API
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                deviceInfo = `IP:${data.ip} | ID:${uuid.substring(0,8)}`;
            } catch (e) {
                console.log("獲取IP失敗，將僅使用UUID");
                deviceInfo = `ID:${uuid}`;
            }
        }

        // 生成隊伍卡片 UI (優化手機觸控與資訊主次層級)
        function renderTeams() {
            const grid = document.getElementById('teams-grid');
            grid.innerHTML = ''; // 清空
            
            teamsData.forEach(team => {
                const card = document.createElement('div');
                card.id = `card-${team.id}`;
                card.className = "team-card bg-slate-800/60 border-2 border-slate-700/80 rounded-xl p-4 md:p-5 shadow-lg relative overflow-hidden flex flex-col justify-between";
                
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-center mb-3">
                            <div class="bg-slate-900 border border-cyan-500/30 text-cyan-400 font-mono font-bold text-base px-2.5 py-0.5 rounded shadow-[0_0_8px_rgba(6,182,212,0.15)]">
                                # ${team.id.toString().padStart(2, '0')}
                            </div>
                            <!-- 觸控按鈕：加大熱區與更換科幻風格 -->
                            <button id="btn-vote-${team.id}" onclick="toggleVote(${team.id})" class="flex items-center gap-1 border border-slate-600 bg-slate-700/30 text-slate-300 hover:border-cyan-400 hover:text-cyan-300 px-3.5 py-1.5 rounded-lg font-bold transition-all text-xs tracking-wider">
                                <span class="btn-icon font-mono">+</span>
                                <span class="btn-text">載入</span>
                            </button>
                        </div>
                        <!-- 作品名大而醒目 -->
                        <h3 class="text-lg md:text-xl font-black text-white mb-1.5 leading-snug tracking-wide">${team.project}</h3>
                        <div class="text-cyan-500/90 font-bold text-xs mb-3 tracking-wider">組別：${team.name}</div>
                    </div>
                    
                    <!-- 隊員姓名縮小、弱化顏色，使用工程師開發代碼風格 -->
                    <div class="mt-2 pt-2.5 border-t border-slate-700/50">
                        <div class="text-slate-500 text-[11px] flex items-center gap-1.5 font-mono">
                            <svg class="w-3.5 h-3.5 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                            <span>dev: ${team.members}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 第一頁：驗證密碼
        async function verifyPassword() {
            const pwdInput = document.getElementById('password-input').value.trim();
            if (pwdInput.length < 1) {
                Swal.fire({title: '提示', text: '請輸入金鑰', icon: 'warning', background: '#1e293b', color: '#e2e8f0'});
                return;
            }

            const btn = document.getElementById('btn-verify');
            const originalBtnText = btn.innerHTML;
            btn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 驗證中...`;
            btn.disabled = true;

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({
                        action: 'verify',
                        password: pwdInput,
                        ip: deviceInfo
                    })
                });

                const result = await response.json();

                if (result.success) {
                    validPassword = pwdInput;
                    Swal.fire({
                        icon: 'success',
                        title: '存取核准',
                        text: '歡迎進入系統！',
                        timer: 1500,
                        background: '#1e293b',
                        color: '#e2e8f0',
                        showConfirmButton: false
                    }).then(() => {
                        document.getElementById('page-login').classList.add('hidden');
                        document.getElementById('page-voting').classList.remove('hidden');
                        document.getElementById('header-status').classList.remove('hidden');
                        document.getElementById('bottom-submit-bar').classList.remove('hidden');
                    });
                } else {
                    Swal.fire({title: '驗證失敗', text: result.message, icon: 'error', background: '#1e293b', color: '#e2e8f0'});
                }
            } catch (error) {
                console.error('Error:', error);
                Swal.fire({title: '連線錯誤', text: '無法連接到伺服器，請確認網路連線。', icon: 'error', background: '#1e293b', color: '#e2e8f0'});
            } finally {
                btn.innerHTML = originalBtnText;
                btn.disabled = false;
            }
        }

        // 處理單一隊伍的投票切換
        function toggleVote(teamId) {
            const index = selectedTeams.indexOf(teamId);
            
            if (index > -1) {
                selectedTeams.splice(index, 1);
                updateCardUI(teamId, false);
            } 
            else {
                if (selectedTeams.length >= MAX_VOTES) {
                    Swal.fire({title: '提示', text: `授權額度已滿，您最多只能載入 ${MAX_VOTES} 個模組！`, icon: 'info', background: '#1e293b', color: '#e2e8f0'});
                    return;
                }
                selectedTeams.push(teamId);
                updateCardUI(teamId, true);
            }
            
            updateVoteCounters();
            checkSubmitButton();
        }

        // 更新單張卡片的視覺狀態 (包含觸控點擊色彩反饋)
        function updateCardUI(teamId, isSelected) {
            const card = document.getElementById(`card-${teamId}`);
            const btn = document.getElementById(`btn-vote-${teamId}`);
            const icon = btn.querySelector('.btn-icon');
            const text = btn.querySelector('.btn-text');

            if (isSelected) {
                card.classList.add('selected-card');
                btn.classList.remove('border-slate-600', 'bg-slate-700/30', 'text-slate-300');
                btn.classList.add('bg-cyan-500', 'border-cyan-400', 'text-slate-900', 'shadow-[0_0_15px_rgba(34,211,238,0.5)]');
                icon.textContent = '■';
                text.textContent = '已載入';
            } else {
                card.classList.remove('selected-card');
                btn.classList.remove('bg-cyan-500', 'border-cyan-400', 'text-slate-900', 'shadow-[0_0_15px_rgba(34,211,238,0.5)]');
                btn.classList.add('border-slate-600', 'bg-slate-700/30', 'text-slate-300');
                icon.textContent = '+';
                text.textContent = '載入';
            }
        }

        // 更新票數文字與變量
        function updateVoteCounters() {
            const votesLeft = MAX_VOTES - selectedTeams.length;
            
            document.getElementById('votes-left-display').textContent = votesLeft;
            document.getElementById('selected-count').textContent = selectedTeams.length;
            document.getElementById('bottom-votes-left').textContent = votesLeft;
        }

        // 檢查最終送出按鈕的狀態
        function checkSubmitButton() {
            const submitBtn = document.getElementById('btn-submit-votes');
            if (selectedTeams.length > 0) {
                submitBtn.disabled = false;
                submitBtn.classList.remove('bg-slate-700', 'cursor-not-allowed', 'text-slate-400', 'border-slate-600');
                submitBtn.classList.add('bg-cyan-600', 'hover:bg-cyan-500', 'cursor-pointer', 'text-white', 'border-cyan-400', 'shadow-[0_0_20px_rgba(6,182,212,0.4)]');
            } else {
                submitBtn.disabled = true;
                submitBtn.classList.add('bg-slate-700', 'cursor-not-allowed', 'text-slate-400', 'border-slate-600');
                submitBtn.classList.remove('bg-cyan-600', 'hover:bg-cyan-500', 'cursor-pointer', 'text-white', 'border-cyan-400', 'shadow-[0_0_20px_rgba(6,182,212,0.4)]');
            }
        }

        // 最終送出鎖定
        async function submitVotes() {
            const result = await Swal.fire({
                title: '確認鎖定資料庫？',
                text: `已配置 ${selectedTeams.length} 個模組 (#${selectedTeams.sort((a,b)=>a-b).join(', ')})。資料寫入後將無法覆寫！`,
                icon: 'warning',
                background: '#1e293b',
                color: '#e2e8f0',
                showCancelButton: true,
                confirmButtonColor: '#0ea5e9',
                cancelButtonColor: '#475569',
                confirmButtonText: '執行鎖定',
                cancelButtonText: '終止操作'
            });

            if (!result.isConfirmed) return;

            const submitBtn = document.getElementById('btn-submit-votes');
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.innerHTML = "傳輸中 [///...]";
            submitBtn.disabled = true;

            try {
                const sortedVotes = [...selectedTeams].sort((a, b) => a - b);

                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({
                        action: 'submit',
                        password: validPassword,
                        votes: sortedVotes,
                        ip: deviceInfo
                    })
                });

                const resData = await response.json();

                if (resData.success) {
                    Swal.fire({
                        title: '寫入成功！',
                        text: '資料庫已鎖定，感謝您的參與。',
                        icon: 'success',
                        background: '#1e293b',
                        color: '#e2e8f0',
                        confirmButtonColor: '#0ea5e9',
                        confirmButtonText: '結束連線',
                        allowOutsideClick: false
                    }).then(() => {
                        window.location.reload();
                    });
                } else {
                    Swal.fire({title: '寫入失敗', text: resData.message, icon: 'error', background: '#1e293b', color: '#e2e8f0'});
                    submitBtn.innerHTML = originalBtnText;
                    submitBtn.disabled = false;
                }

            } catch (error) {
                console.error('Submit Error:', error);
                Swal.fire({title: '傳輸錯誤', text: '連線中斷，請確認網路狀態。', icon: 'error', background: '#1e293b', color: '#e2e8f0'});
                submitBtn.innerHTML = originalBtnText;
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
